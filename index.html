<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truffl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 560px;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .accent {
      color: #c8a46e;
    }

    p {
      font-size: 1.15rem;
      line-height: 1.6;
      color: #999;
      margin-bottom: 2rem;
    }

    .badge {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      border: 1px solid #333;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #c8a46e;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>truffl<span class="accent">.</span></h1>
    <p>Something good is coming. Stay tuned.</p>
    <span class="badge">Coming Soon</span>
  </div>
</body>
</html>
