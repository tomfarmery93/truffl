<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Carer — Truffl Pets</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2; --warm-white: #FFFDF9; --sage: #8B9E7E; --sage-light: #C2D1B5;
    --sage-dark: #6B7E5E; --terracotta: #C4755B; --terracotta-light: #D4917B;
    --blush: #E8C4B8; --brown: #3D2B1F; --brown-light: #5C4033; --brown-muted: #8B7355;
    --text-primary: #3D2B1F; --text-secondary: #6B5B4E; --text-muted: #9B8B7E;
    --border: #E8E0D6; --border-focus: #C4755B;
    --error: #C0392B; --error-bg: #FDF0EE; --success: #5B8C5A; --success-bg: #EDF5ED;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .nav {
    position: sticky; top: 0; z-index: 100; background: var(--warm-white);
    border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-back { font-size: 0.85rem; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .nav-back:hover { color: var(--terracotta); }

  .page-wrapper { max-width: 560px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  .page-header { text-align: center; margin-bottom: 2rem; }
  .page-header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 2rem; color: var(--brown); margin-bottom: 0.4rem; }
  .page-header p { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.6; }

  .form-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
  .form-card h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 1.3rem; color: var(--brown); margin-bottom: 0.4rem; }
  .form-card > p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1.5rem; line-height: 1.5; }

  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
  .field label .optional { color: var(--text-muted); font-weight: 400; font-size: 0.78rem; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text-primary);
    background: var(--warm-white); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(196,117,91,0.12); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .field-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

  .btn-row { display: flex; gap: 12px; margin-top: 1.5rem; }
  .btn { padding: 12px 28px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; outline: none; }
  .btn-primary { background: var(--terracotta); color: white; flex: 1; }
  .btn-primary:hover { background: var(--terracotta-light); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text-muted); }

  .msg { padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 1.25rem; display: none; line-height: 1.5; }
  .msg.error { background: var(--error-bg); color: var(--error); display: block; }
  .msg.success { background: var(--success-bg); color: var(--success); display: block; }

  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Provider summary card at top */
  .provider-summary {
    display: flex; align-items: center; gap: 14px; padding: 16px;
    background: var(--cream); border-radius: 12px; margin-bottom: 1.5rem;
  }
  .ps-avatar {
    width: 48px; height: 48px; border-radius: 50%; background: var(--blush);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--brown); flex-shrink: 0;
  }
  .ps-name { font-size: 0.95rem; font-weight: 500; color: var(--text-primary); }
  .ps-suburb { font-size: 0.8rem; color: var(--text-muted); }
  .ps-verified {
    display: inline-flex; align-items: center; gap: 3px; font-size: 0.7rem; font-weight: 600;
    color: var(--sage-dark); background: var(--success-bg); padding: 2px 8px; border-radius: 20px; margin-left: 6px;
  }

  /* Service selection cards */
  .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .service-option {
    padding: 14px 12px; border: 2px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s; user-select: none; text-align: center;
  }
  .service-option:hover { border-color: var(--sage-light); }
  .service-option.selected { border-color: var(--terracotta); background: rgba(196,117,91,0.05); }
  .service-option .svc-name { font-size: 0.85rem; font-weight: 500; color: var(--text-primary); }
  .service-option input { display: none; }

  /* Pet selection cards */
  .pet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pet-option {
    padding: 14px 12px; border: 2px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s; user-select: none;
    display: flex; align-items: center; gap: 10px;
  }
  .pet-option:hover { border-color: var(--sage-light); }
  .pet-option.selected { border-color: var(--terracotta); background: rgba(196,117,91,0.05); }
  .pet-option .pet-icon { font-size: 1.4rem; }
  .pet-option .pet-name { font-size: 0.88rem; font-weight: 500; color: var(--text-primary); }
  .pet-option .pet-breed { font-size: 0.75rem; color: var(--text-muted); }
  .pet-option input { display: none; }

  /* Success */
  .success-card { text-align: center; padding: 3rem 2rem; }
  .success-icon { width: 64px; height: 64px; background: var(--success-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .success-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; color: var(--brown); margin-bottom: 0.75rem; }
  .success-card p { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.6; max-width: 400px; margin: 0 auto; }

  /* Login prompt */
  .login-prompt { text-align: center; padding: 3rem 2rem; }
  .login-prompt h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--brown); margin-bottom: 0.5rem; }
  .login-prompt p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .login-prompt a {
    display: inline-block; padding: 12px 32px; background: var(--terracotta); color: white;
    border-radius: 10px; font-weight: 500; text-decoration: none; transition: all 0.2s;
  }
  .login-prompt a:hover { background: var(--terracotta-light); }

  @media (max-width: 600px) {
    .page-wrapper { padding: 1.5rem 1rem 3rem; }
    .form-card { padding: 1.5rem; }
    .field-row { grid-template-columns: 1fr; }
    .service-grid { grid-template-columns: 1fr; }
    .pet-grid { grid-template-columns: 1fr; }
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo" aria-label="Truffl Pets home">
    <svg width="150" height="48" viewBox="0 0 180 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="5.5" r="6" fill="none" stroke="#C4866A" stroke-width="2.5"/>
      <circle cx="20" cy="5.5" r="2.8" fill="#FFFDF9"/>
      <rect x="16.5" y="10.5" width="7" height="9" rx="3" fill="#C4866A"/>
      <circle cx="20" cy="33" r="20" fill="#C4866A"/>
      <circle cx="20" cy="33" r="15.5" fill="none" stroke="#B8795C" stroke-width="0.6" opacity="0.45"/>
      <line x1="7" y1="33" x2="33" y2="33" stroke="#FFFDF9" stroke-width="0.5" opacity="0.3"/>
      <text x="20" y="35.5" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-style="italic" font-weight="400" fill="#FFFDF9" text-anchor="middle" letter-spacing="-0.3">truffl</text>
      <text x="52" y="30" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-style="italic" font-weight="400" fill="#3D2B1F" letter-spacing="-0.5">truffl</text>
      <text x="52" y="50" font-family="'DM Sans', sans-serif" font-size="12" font-weight="600" fill="#B0A090" letter-spacing="4">PETS</text>
    </svg>
  </a>
  <a href="javascript:history.back()" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back
  </a>
</nav>

<div class="page-wrapper">
  <div id="formMsg" class="msg"></div>
  <div id="bookingContent">
    <div style="text-align:center;padding:3rem;"><div style="display:inline-flex;gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--terracotta);animation:bounce 1.2s infinite;"></span><span style="width:8px;height:8px;border-radius:50%;background:var(--terracotta);animation:bounce 1.2s infinite 0.15s;"></span><span style="width:8px;height:8px;border-radius:50%;background:var(--terracotta);animation:bounce 1.2s infinite 0.3s;"></span></div><div style="margin-top:1rem;font-size:0.85rem;color:var(--text-muted);">Loading...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';

const SERVICE_LABELS = {
  dog_walking: 'Dog walking', dog_sitting: 'Dog sitting', dog_boarding: 'Dog boarding',
  cat_sitting: 'Cat sitting', cat_boarding: 'Cat boarding', pet_sitting: 'Other pet sitting'
};

const SPECIES_ICONS = { dog: '🐕', cat: '🐈', other: '🐾' };

let authToken = null, authUid = null;
let providerData = null, providerProfile = null, providerServices = [];
let customerProfile = null, customerPets = [];
let selectedServiceId = null, selectedPetId = null;

function headers(token) {
  const h = { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  if (token) h['Authorization'] = `Bearer ${token}`;
  return h;
}

async function sbGet(table, params, token) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: headers(token) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Query failed'); }
  return await r.json();
}

async function sbInsert(table, row, token) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST', headers: { ...headers(token), 'Prefer': 'return=representation' }, body: JSON.stringify(row)
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Insert failed'); }
  return await r.json();
}

function showMsg(t, type) { const el = document.getElementById('formMsg'); el.textContent = t; el.className = `msg ${type}`; }
function clearMsg() { document.getElementById('formMsg').className = 'msg'; }
function setLoading(btn, on) {
  if (on) { btn.disabled = true; btn._t = btn.textContent; btn.innerHTML = '<span class="spinner"></span>Submitting...'; }
  else { btn.disabled = false; btn.textContent = btn._t || 'Submit'; }
}

function selectService(el, serviceId) {
  document.querySelectorAll('.service-option').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected'); selectedServiceId = serviceId;
}

function selectPet(el, petId) {
  document.querySelectorAll('.pet-option').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected'); selectedPetId = petId;
}

function renderBookingForm() {
  const area = document.getElementById('bookingContent');
  const initials = ((providerData.first_name||'')[0]||'') + ((providerData.last_name||'')[0]||'');
  const verified = providerProfile.is_verified ? `<span class="ps-verified"><svg width="8" height="8" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Verified</span>` : '';

  const servicesHtml = providerServices.map(s => `
    <label class="service-option" onclick="selectService(this, '${s.id}')">
      <input type="radio" name="service" value="${s.id}">
      <div class="svc-name">${SERVICE_LABELS[s.service_type] || s.service_type.replace(/_/g, ' ')}</div>
    </label>
  `).join('');

  const petsHtml = customerPets.map((p, i) => `
    <label class="pet-option ${i === 0 ? 'selected' : ''}" onclick="selectPet(this, '${p.id}')">
      <input type="radio" name="pet" value="${p.id}" ${i === 0 ? 'checked' : ''}>
      <span class="pet-icon">${SPECIES_ICONS[p.species] || '🐾'}</span>
      <div><div class="pet-name">${p.name}</div>${p.breed ? `<div class="pet-breed">${p.breed}</div>` : ''}</div>
    </label>
  `).join('');

  // Auto-select first pet
  if (customerPets.length > 0) selectedPetId = customerPets[0].id;

  // Default date to tomorrow
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const defaultDate = tomorrow.toISOString().split('T')[0];

  area.innerHTML = `
    <div class="page-header">
      <h1>Request a booking</h1>
      <p>Choose a service, pick a time, and we'll send your request to the carer.</p>
    </div>

    <div class="form-card fade-in">
      <div class="provider-summary">
        <div class="ps-avatar">${initials}</div>
        <div>
          <div class="ps-name">${providerData.first_name} ${providerData.last_name}${verified}</div>
          <div class="ps-suburb">${providerProfile.suburb || 'Sydney'}</div>
        </div>
      </div>

      <div class="field">
        <label>What service do you need?</label>
        <div class="service-grid">${servicesHtml}</div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="bookDate" value="${defaultDate}" min="${defaultDate}">
        </div>
        <div class="field">
          <label>Time</label>
          <select id="bookTime">
            <option value="07:00">7:00 AM</option>
            <option value="07:30">7:30 AM</option>
            <option value="08:00" selected>8:00 AM</option>
            <option value="08:30">8:30 AM</option>
            <option value="09:00">9:00 AM</option>
            <option value="09:30">9:30 AM</option>
            <option value="10:00">10:00 AM</option>
            <option value="10:30">10:30 AM</option>
            <option value="11:00">11:00 AM</option>
            <option value="11:30">11:30 AM</option>
            <option value="12:00">12:00 PM</option>
            <option value="12:30">12:30 PM</option>
            <option value="13:00">1:00 PM</option>
            <option value="13:30">1:30 PM</option>
            <option value="14:00">2:00 PM</option>
            <option value="14:30">2:30 PM</option>
            <option value="15:00">3:00 PM</option>
            <option value="15:30">3:30 PM</option>
            <option value="16:00">4:00 PM</option>
            <option value="16:30">4:30 PM</option>
            <option value="17:00">5:00 PM</option>
            <option value="17:30">5:30 PM</option>
            <option value="18:00">6:00 PM</option>
          </select>
        </div>
      </div>

      ${customerPets.length > 1 ? `<div class="field"><label>Which pet?</label><div class="pet-grid">${petsHtml}</div></div>` : ''}

      <div class="field">
        <label>Notes for the carer <span class="optional">(optional)</span></label>
        <textarea id="bookNotes" placeholder="Gate code, special instructions, anything they should know..."></textarea>
      </div>

      <div style="background:var(--cream);border-radius:10px;padding:12px 16px;margin-top:0.5rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:0.85rem;color:var(--text-secondary);">Platform fee</span>
          <span style="font-size:0.85rem;font-weight:500;color:var(--success);">$0 — free during launch</span>
        </div>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">You'll arrange payment directly with the carer.</div>
      </div>

      <div class="btn-row">
        <a href="/carer/?id=${new URLSearchParams(window.location.search).get('provider')}" class="btn btn-secondary" style="text-decoration:none;text-align:center;">Back to profile</a>
        <button class="btn btn-primary" onclick="submitBooking()">Send booking request</button>
      </div>
    </div>
  `;
}

async function submitBooking() {
  clearMsg();
  if (!selectedServiceId) return showMsg('Please select a service.', 'error');
  if (!selectedPetId && customerPets.length > 0) selectedPetId = customerPets[0].id;
  if (!selectedPetId) return showMsg('No pet found on your account. Please add a pet first.', 'error');

  const date = document.getElementById('bookDate').value;
  const time = document.getElementById('bookTime').value;
  const notes = document.getElementById('bookNotes').value.trim();

  if (!date || !time) return showMsg('Please select a date and time.', 'error');

  const scheduledAt = new Date(`${date}T${time}:00`).toISOString();

  const btn = document.querySelector('.btn-primary');
  setLoading(btn, true);

  try {
    await sbInsert('bookings', {
      customer_id: customerProfile.id,
      provider_id: providerProfile.id,
      pet_id: selectedPetId,
      service_id: selectedServiceId,
      status: 'pending',
      scheduled_at: scheduledAt,
      total_cents: 0,
      customer_notes: notes || null
    }, authToken);

    document.getElementById('bookingContent').innerHTML = `
      <div class="form-card success-card fade-in">
        <div class="success-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#5B8C5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h2>Booking request sent!</h2>
        <p>${providerData.first_name} will review your request and confirm. We'll let you know once they respond.</p>
        <div style="margin-top:2rem;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="/search/" style="display:inline-block;padding:12px 28px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">Browse more carers</a>
          <a href="/carer/?id=${new URLSearchParams(window.location.search).get('provider')}" style="display:inline-block;padding:12px 28px;border:1px solid var(--border);color:var(--text-secondary);border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">Back to profile</a>
        </div>
      </div>
    `;
    clearMsg();
  } catch(e) { showMsg(e.message, 'error'); } finally { setLoading(btn, false); }
}

async function init() {
  const area = document.getElementById('bookingContent');
  const params = new URLSearchParams(window.location.search);
  const providerId = params.get('provider');

  if (!providerId) {
    area.innerHTML = `<div class="login-prompt"><h2>No carer specified</h2><p>Head to <a href="/search/" style="color:var(--terracotta);">search</a> to find a carer and book them.</p></div>`;
    return;
  }

  // Check if user is logged in — try to restore session from localStorage
  const storedSession = localStorage.getItem('truffl_session');
  if (storedSession) {
    try {
      const session = JSON.parse(storedSession);
      authToken = session.access_token;
      authUid = session.user_id;
    } catch(e) {}
  }

  if (!authToken) {
    area.innerHTML = `
      <div class="login-prompt fade-in">
        <h2>Sign in to book</h2>
        <p>You need an account to request a booking. It only takes a minute.</p>
        <a href="/login/?redirect=/book/?provider=${providerId}">Sign in or create an account</a>
      </div>
    `;
    return;
  }

  try {
    // Load provider info
    const [users, profiles, services] = await Promise.all([
      sbGet('users', `id=eq.${providerId}&select=first_name,last_name`, authToken),
      sbGet('provider_profiles', `user_id=eq.${providerId}&select=*`, authToken),
      sbGet('provider_services', `provider_id=eq.${providerId}&select=id,service_type,is_available&is_available=eq.true`, authToken)
    ]);

    if (!users.length || !profiles.length) {
      area.innerHTML = `<div class="login-prompt"><h2>Carer not found</h2><p><a href="/search/" style="color:var(--terracotta);">Back to search</a></p></div>`;
      return;
    }

    providerData = users[0];
    providerProfile = profiles[0];
    providerServices = services;

    // Load customer info
    const custProfiles = await sbGet('customer_profiles', `user_id=eq.${authUid}&select=*`, authToken);
    if (!custProfiles.length) {
      area.innerHTML = `<div class="login-prompt fade-in"><h2>Complete your profile first</h2><p>You need to set up your profile and add a pet before booking.</p><a href="/login/">Complete your profile</a></div>`;
      return;
    }
    customerProfile = custProfiles[0];

    const pets = await sbGet('pets', `customer_id=eq.${customerProfile.id}&select=*&is_active=eq.true`, authToken);
    if (!pets.length) {
      area.innerHTML = `<div class="login-prompt fade-in"><h2>Add a pet first</h2><p>You need to add a pet to your account before you can book a carer.</p><a href="/login/">Add a pet</a></div>`;
      return;
    }
    customerPets = pets;

    renderBookingForm();
  } catch(e) {
    area.innerHTML = `<div class="login-prompt"><h2>Something went wrong</h2><p>${e.message}</p></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
