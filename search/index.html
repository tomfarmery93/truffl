<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Carer — Truffl Pets</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2; --warm-white: #FFFDF9;
    --sage: #8B9E7E; --sage-light: #C2D1B5; --sage-dark: #6B7E5E;
    --terracotta: #C4755B; --terracotta-light: #D4917B; --blush: #E8C4B8;
    --brown: #3D2B1F; --brown-muted: #8B7355;
    --text-primary: #3D2B1F; --text-secondary: #6B5B4E; --text-muted: #9B8B7E;
    --border: #E8E0D6; --border-focus: #C4755B;
    --success: #5B8C5A; --success-bg: #EDF5ED;
    --warning: #C0862B; --warning-bg: #FEF3E2;
    --terracotta-soft: rgba(196,117,91,0.08);
    --sage-soft: rgba(139,158,126,0.10);
    --shadow-card: 0 4px 16px rgba(61,43,31,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* ── Nav ── */
  .nav { position: sticky; top: 0; z-index: 100; background: var(--warm-white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a { font-size: 0.85rem; color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--terracotta); }
  .btn-nav { padding: 8px 18px; background: var(--terracotta); color: white !important; border-radius: 8px; font-weight: 500; transition: all 0.2s; font-size: 0.85rem; }
  .btn-nav:hover { background: var(--terracotta-light); }

  /* ── Layout shell ── */
  .page-shell { max-width: 1240px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; display: grid; grid-template-columns: 300px 1fr; gap: 2rem; }

  /* ── Mobile-only elements: hidden on desktop, revealed in the mobile media query ── */
  .mobile-summary { display: none; }
  .sheet, .sheet-backdrop { display: none; }

  /* ── Sidebar ── */
  .sidebar { position: sticky; top: 80px; align-self: start; max-height: calc(100vh - 100px); overflow-y: auto; }
  .filter-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }
  .filter-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 500; font-size: 1.35rem; color: var(--brown); margin-bottom: 4px; }
  .filter-sub { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 1.25rem; }

  .field-label { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
  .filter-section { margin-bottom: 1.25rem; }
  .filter-section:last-of-type { margin-bottom: 0; }

  /* Suburb input */
  .input-pin { position: relative; }
  .input-pin svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  .input-pin input { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text-primary); background: var(--warm-white); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .input-pin input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(196,117,91,0.10); }

  /* Service tiles */
  .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .service-tile { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--warm-white); cursor: pointer; transition: all 0.18s; user-select: none; font-family: 'DM Sans', sans-serif; text-align: left; color: var(--text-primary); }
  .service-tile:hover { border-color: var(--sage-light); }
  .service-tile.active { background: var(--blush); border-color: var(--terracotta); color: var(--brown); }
  .service-tile .stile-icon { font-size: 1.1rem; line-height: 1; }
  .service-tile .stile-label { font-size: 0.82rem; font-weight: 500; }
  .service-tile .stile-sub { font-size: 0.7rem; color: var(--text-muted); line-height: 1.3; }
  .service-tile.active .stile-sub { color: var(--text-secondary); }

  /* Segmented (One-off / Recurring) */
  .segmented { display: flex; padding: 3px; background: var(--cream); border: 1px solid var(--border); border-radius: 999px; margin-bottom: 12px; }
  .segmented button { flex: 1; border: 0; background: transparent; padding: 7px 10px; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; color: var(--text-muted); border-radius: 999px; cursor: pointer; transition: all 0.18s; font-weight: 500; }
  .segmented button.active { background: var(--warm-white); color: var(--brown); box-shadow: 0 1px 3px rgba(61,43,31,0.06); }

  /* Day picker */
  .days { display: flex; gap: 4px; }
  .day-btn { flex: 1; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border); background: var(--warm-white); color: var(--text-secondary); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .day-btn:hover { border-color: var(--sage-light); }
  .day-btn.active { background: var(--terracotta); border-color: var(--terracotta); color: white; }

  /* Date / time inputs */
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  /* Grid items default to min-width:auto; date inputs have a large intrinsic
     min-width and would otherwise blow out of the 300px sidebar track. */
  .input-row > * { min-width: 0; }
  .input-base { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: var(--text-primary); background: var(--warm-white); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .input-base:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(196,117,91,0.10); }

  /* Pet size chips */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--warm-white); font-size: 0.78rem; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.18s; font-family: 'DM Sans', sans-serif; }
  .chip:hover { border-color: var(--sage-light); }
  .chip.active.size { background: var(--blush); border-color: var(--terracotta); color: var(--brown); }
  .chip.active.attr { background: var(--sage-soft); border-color: var(--sage); color: var(--sage-dark); }
  .chip.pet { padding: 6px 10px 6px 6px; gap: 8px; }
  .chip.pet .pet-bubble { width: 22px; height: 22px; border-radius: 50%; background: var(--blush); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 0.78rem; color: var(--brown); font-weight: 600; }
  .puppy-toggle { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 0.82rem; color: var(--text-secondary); cursor: pointer; user-select: none; }
  .puppy-toggle input { accent-color: var(--terracotta); cursor: pointer; }

  /* Expander */
  .expander-head { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; padding: 6px 0; }
  .expander-head .chev { transition: transform 0.2s; color: var(--text-muted); }
  .expander.open .chev { transform: rotate(180deg); }
  .expander-body { display: none; margin-top: 6px; }
  .expander.open .expander-body { display: block; }

  /* Update button */
  .btn-update { width: 100%; padding: 12px; border-radius: 999px; background: var(--terracotta); color: white; border: 0; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 6px; }
  .btn-update:hover { background: var(--terracotta-light); }
  .btn-update:active { transform: translateY(1px); }

  /* ── Results column ── */
  .results-header { display: flex; justify-content: space-between; align-items: flex-end; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .results-heading { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-style: italic; font-size: 2rem; line-height: 1.1; letter-spacing: -0.01em; color: var(--brown); margin: 0; }
  .results-heading .count { color: var(--terracotta); font-style: italic; }
  .results-context { font-size: 0.82rem; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
  .results-context .clear-all { color: var(--terracotta); text-decoration: underline; cursor: pointer; margin-left: 4px; background: none; border: 0; font: inherit; padding: 0; }

  .sort-pill { padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--warm-white); font-size: 0.82rem; color: var(--text-primary); display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
  .sort-pill:hover { border-color: var(--text-muted); }
  .sort-pill select { border: 0; background: transparent; font: inherit; color: inherit; outline: none; cursor: pointer; padding-right: 2px; appearance: none; -webkit-appearance: none; }

  /* ── Provider card ── */
  .provider-list { display: flex; flex-direction: column; gap: 12px; }
  .provider-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; display: grid; grid-template-columns: 56px 1fr auto; gap: 1rem; align-items: start; transition: all 0.2s; text-decoration: none; color: inherit; cursor: pointer; }
  .provider-card:hover { border-color: var(--sage-light); box-shadow: var(--shadow-card); transform: translateY(-1px); }

  .pc-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--blush); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--brown); flex-shrink: 0; overflow: hidden; }
  .pc-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .pc-name { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 1.15rem; color: var(--brown); display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .verified-badge { display: inline-flex; align-items: center; gap: 3px; font-family: 'DM Sans', sans-serif; font-size: 0.66rem; font-weight: 600; color: var(--sage-dark); background: var(--success-bg); padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em; }
  .pc-suburb { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .pc-rating { font-size: 0.82rem; color: var(--text-secondary); margin-top: 6px; display: flex; align-items: center; gap: 6px; }
  .pc-rating .stars { color: var(--terracotta); }
  .pc-rating .new-badge { font-size: 0.72rem; color: var(--text-muted); font-style: italic; background: var(--cream); padding: 2px 10px; border-radius: 999px; border: 1px solid var(--border); }
  .pc-services { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .svc-pill { font-size: 0.72rem; padding: 3px 10px; background: var(--sage-soft); border: 1px solid var(--sage-light); border-radius: 999px; color: var(--sage-dark); white-space: nowrap; }
  .svc-pill.more { background: var(--cream); border-color: var(--border); color: var(--text-muted); }
  .pc-attrs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 0.72rem; color: var(--text-muted); }
  .pc-attr { display: inline-flex; align-items: center; gap: 4px; }
  .pc-bio { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .pc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 80px; }
  .pc-right .from { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
  .pc-right .price { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; color: var(--brown); line-height: 1; }
  .pc-right .per { font-size: 0.7rem; color: var(--text-muted); }
  .pc-right .view-link { margin-top: 8px; font-size: 0.78rem; color: var(--terracotta); font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }

  /* ── Skeletons ── */
  @keyframes skeleton-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.85; } }
  .skeleton-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; display: grid; grid-template-columns: 56px 1fr 80px; gap: 1rem; align-items: start; }
  .skeleton-bar { background: var(--border); border-radius: 6px; animation: skeleton-pulse 1.4s ease infinite; }
  .skeleton-circle { width: 56px; height: 56px; border-radius: 50%; background: var(--border); animation: skeleton-pulse 1.4s ease infinite; }

  /* ── Empty / Error ── */
  .empty-state, .error-state { text-align: center; padding: 3rem 2rem; background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.6; }
  .empty-state h3, .error-state h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 500; color: var(--brown); margin-bottom: 0.5rem; }
  .empty-state p, .error-state p { color: var(--text-muted); font-size: 0.9rem; max-width: 420px; margin: 0 auto 1.25rem; line-height: 1.55; }
  .btn-secondary { padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: 999px; color: var(--text-secondary); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text-primary); }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .page-shell { grid-template-columns: 1fr; padding: 1rem 1rem 5rem; gap: 1rem; }
    .sidebar { display: none; }
    .nav { padding: 0 1rem; }

    .mobile-summary { display: block; background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 0.5rem; }
    .ms-row { display: flex; align-items: center; gap: 10px; }
    .ms-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--cream); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text-secondary); }
    .ms-text { flex: 1; min-width: 0; }
    .ms-primary { font-size: 0.88rem; color: var(--text-primary); font-weight: 500; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ms-secondary { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ms-refine { background: var(--terracotta); color: white; border: 0; padding: 8px 14px; border-radius: 999px; font-size: 0.78rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
    .ms-chips { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .ms-chips .chip-active { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; background: var(--sage-soft); border: 1px solid var(--sage-light); color: var(--sage-dark); font-size: 0.72rem; font-weight: 500; }

    .sheet-backdrop { display: block; position: fixed; inset: 0; background: rgba(61,43,31,0.45); opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 200; }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
    .sheet { display: block; position: fixed; left: 0; right: 0; bottom: 0; background: var(--warm-white); border-radius: 24px 24px 0 0; padding: 1.25rem; max-height: 88vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.28s cubic-bezier(.2,.7,.3,1); z-index: 201; box-shadow: 0 -10px 40px rgba(61,43,31,0.18); }
    .sheet.open { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 999px; margin: 0 auto 1rem; }
    .sheet-close { position: absolute; top: 12px; right: 12px; background: transparent; border: 0; padding: 8px; color: var(--text-muted); cursor: pointer; }

    .results-heading { font-size: 1.6rem; }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
</style>
</head>

/* ── FIX 1: Public REST helper — always uses anon key, never authToken ── */
/* Used for all provider search queries so unauthenticated users can browse */
async function sbPublic(t, p) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${p}`, {
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
    }
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'Query failed'); }
  return r.json();
}

/* Authenticated helper — only used for logged-in user data (saved pets etc.) */
function h(token) {
  const hd = { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  if (token) hd['Authorization'] = `Bearer ${token}`;
  return hd;
}
async function sbGet(t, p) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${p}`, { headers: h(authToken) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'Query failed'); }
  return r.json();
}

/* ── Utils ── */
function esc(s) {
  return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getInitials(first, last) {
  return ((first || '')[0] || '').toUpperCase() + ((last || '')[0] || '').toUpperCase();
}
function renderStars(rating) {
  if (!rating) return '';
  const full = Math.floor(rating);
  let s = '';
  for (let i = 0; i < 5; i++) s += i < full ? '★' : '☆';
  return s;
}
function priceDollars(cents) {
  if (cents == null || isNaN(cents)) return null;
  return '$' + Math.round(Number(cents) / 100);
}

/* ── URL params ── */
function readUrlParams() {
  const p = new URLSearchParams(window.location.search);
  state.service   = p.get('service') || '';
  state.suburb    = p.get('suburb')  || '';
  state.recurring = p.get('recurring') === 'true';
  state.date      = p.get('date') || '';
  state.dateEnd   = p.get('date_end') || '';
  state.time      = p.get('time') || '';
  state.size      = p.get('size') || '';
  state.puppy     = p.get('puppy') === 'true';
  state.petId     = p.get('pet') || '';
  const days = (p.get('days') || '').split(',').map(s => s.trim()).filter(Boolean);
  state.days = days.filter(d => DAYS.includes(d));
  const attrs = (p.get('attrs') || '').split(',').map(s => s.trim()).filter(Boolean);
  state.attributes = attrs.filter(a => FILTER_TO_ATTR[a] !== undefined);
  state.sort = p.get('sort') || 'best';
}
function writeUrlParams() {
  const url = new URL(window.location);
  const set = (k, v) => v ? url.searchParams.set(k, v) : url.searchParams.delete(k);
  set('service', state.service);
  set('suburb',  state.suburb);
  set('recurring', state.recurring ? 'true' : '');
  set('date', state.date);
  set('date_end', state.dateEnd);
  set('time', state.time);
  set('size', state.size);
  set('puppy', state.puppy ? 'true' : '');
  set('pet', state.petId);
  set('days', state.days.length ? state.days.join(',') : '');
  set('attrs', state.attributes.length ? state.attributes.join(',') : '');
  set('sort', state.sort && state.sort !== 'best' ? state.sort : '');
  window.history.replaceState({}, '', url);
}

      const v = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      const display = ((h % 12) || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h < 12 ? 'AM' : 'PM');
      opts.push(`<option value="${v}" ${state.time === v ? 'selected' : ''}>${display}</option>`);

  }
  return opts.join('');
}

function wireFilterForm(root) {
  const suburb = root.querySelector('#inputSuburb');
  if (suburb) suburb.addEventListener('input', e => { state.suburb = e.target.value; });

  root.querySelectorAll('.service-tile').forEach(tile => {
    tile.addEventListener('click', () => {
      const v = tile.dataset.svc;
      state.service = (state.service === v) ? '' : v;
      document.querySelectorAll('.service-tile').forEach(t => t.classList.toggle('active', t.dataset.svc === state.service));
      // Re-render when fields — multi-day vs single-date depends on service
      syncWhenSection();
    });
  });

  root.querySelectorAll('.segmented button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.recurring = btn.dataset.rec === 'true';
      document.querySelectorAll('.segmented button').forEach(b => b.classList.toggle('active', (b.dataset.rec === 'true') === state.recurring));
      document.querySelectorAll('#whenFields').forEach(el => el.innerHTML = renderWhenFields());
      wireWhenFields();
    });
  });

  wireWhenFields(root);

  root.querySelectorAll('[data-size]').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.size;
      state.size = (state.size === v) ? '' : v;
      document.querySelectorAll('[data-size]').forEach(b => b.classList.toggle('active', b.dataset.size === state.size));
    });
  });
  const puppy = root.querySelector('#puppyChk');
  if (puppy) puppy.addEventListener('change', e => { state.puppy = !!e.target.checked; document.querySelectorAll('#puppyChk').forEach(c => c.checked = state.puppy); });
  root.querySelectorAll('[data-pet]').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.pet;
      state.petId = (state.petId === v) ? '' : v;
      document.querySelectorAll('[data-pet]').forEach(b => b.classList.toggle('active', b.dataset.pet === state.petId));
    });
  });

  root.querySelectorAll('[data-attr]').forEach(btn => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.attr;
      const idx = state.attributes.indexOf(v);
      if (idx >= 0) state.attributes.splice(idx, 1);
      else state.attributes.push(v);
      document.querySelectorAll(`[data-attr="${v}"]`).forEach(b => b.classList.toggle('active', state.attributes.includes(v)));
    });
  });
  const head = root.querySelector('.expander-head');
  if (head) head.addEventListener('click', () => {
    document.querySelectorAll('.expander').forEach(ex => ex.classList.toggle('open'));
  });

  const update = root.querySelector('#btnUpdate');
  if (update) update.addEventListener('click', () => {
    closeSheet();
    runSearch();
  });
}

function wireWhenFields(root) {
  const scope = root || document;
  scope.querySelectorAll('#inputDate').forEach(input => {
    input.addEventListener('change', e => { state.date = e.target.value; });
  });
  scope.querySelectorAll('#inputDateEnd').forEach(input => {
    input.addEventListener('change', e => { state.dateEnd = e.target.value; });
  });
  scope.querySelectorAll('#inputTime').forEach(input => {
    input.addEventListener('change', e => { state.time = e.target.value; });
  });
  scope.querySelectorAll('[data-day]').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = btn.dataset.day;
      const idx = state.days.indexOf(d);
      if (idx >= 0) state.days.splice(idx, 1);
      else state.days.push(d);
      document.querySelectorAll(`[data-day="${d}"]`).forEach(b => {
        const active = state.days.includes(d);
        b.classList.toggle('active', active);
        b.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    });
  });
}

/* ── Search context line ── */
function buildContextLine(count) {
  const parts = [];
  if (state.recurring && state.days.length) parts.push('Recurring · ' + state.days.map(d => DAY_FULL[d]).join(', '));
  else if (state.recurring) parts.push('Recurring');
  if (state.size) parts.push((state.size === 'small' ? 'Small' : state.size === 'medium' ? 'Medium' : 'Large') + ' dog');
  if (state.puppy) parts.push('Puppy');
  if (state.attributes.length) parts.push(state.attributes.length + ' filter' + (state.attributes.length !== 1 ? 's' : ''));
  if (parts.length === 0 && count > 0) {
    return `Sorted by ${sortLabel(state.sort).toLowerCase()}${state.suburb ? ' near ' + esc(state.suburb) : ''}`;
  }
  let html = parts.map(esc).join(' · ');
  if (parts.length) html += ' · <button type="button" class="clear-all" id="btnClearAll">Clear all</button>';
  return html;
}
function sortLabel(s) {
  return ({ best: 'Best match', rating: 'Rating', price_asc: 'Price', distance: 'Distance', newest: 'Newest' })[s] || 'Best match';
}

/* ── FIX 2: All provider data queries use sbPublic, not sbGet ── */
/* This ensures unauthenticated users (no token or expired token) can always load carers */
async function fetchProviders() {
  try {
    return await sbPublic('provider_search_view', 'select=*');
  } catch (e) {
    return await fallbackSearch();
  }
}

async function fallbackSearch() {
  const profiles = await sbPublic('provider_profiles', 'select=id,user_id,bio,suburb,radius_km,avg_rating,total_reviews,is_verified,is_active&is_active=eq.true');
  const userIds = profiles.map(p => p.user_id).filter(Boolean);
  const profileIds = profiles.map(p => p.id);

  const users = userIds.length ? await sbPublic('users', `id=in.(${userIds.join(',')})&select=id,first_name,last_name,avatar_url`) : [];
  const services = profileIds.length ? await sbPublic('provider_services', `provider_id=in.(${profileIds.join(',')})&is_available=eq.true&select=provider_id,service_type`) : [];

  const userMap = Object.fromEntries(users.map(u => [u.id, u]));
  const serviceMap = {};
  services.forEach(s => {
    if (!serviceMap[s.provider_id]) serviceMap[s.provider_id] = [];
    serviceMap[s.provider_id].push(s.service_type);
  });

  return profiles.map(p => ({
    provider_profile_id: p.id,
    user_id: p.user_id,
    bio: p.bio,
    suburb: p.suburb,
    avg_rating: p.avg_rating,
    total_reviews: p.total_reviews,
    is_verified: p.is_verified,
    first_name: userMap[p.user_id]?.first_name || '',
    last_name: userMap[p.user_id]?.last_name || '',
    avatar_url: userMap[p.user_id]?.avatar_url || null,
    services: serviceMap[p.id] || [],
    created_at: p.created_at,
  }));
}

async function ensureAttributesLoaded() {
  if (allAttrMap) return allAttrMap;
  try {
    const rows = await sbPublic('provider_attributes', 'select=provider_id,attribute,value');
    const map = {};
    rows.forEach(r => {
      if (!r.value) return;
      if (!map[r.provider_id]) map[r.provider_id] = new Set();
      map[r.provider_id].add(r.attribute);
    });
    allAttrMap = map;
  } catch (e) {
    allAttrMap = {};
  }
  return allAttrMap;
}

async function fetchPricesForService(serviceType) {
  if (!serviceType) return {};
  try {
    const rows = await sbPublic('provider_services', `service_type=eq.${serviceType}&is_available=eq.true&select=provider_id,price_cents`);
    const map = {};
    rows.forEach(r => { map[r.provider_id] = r.price_cents; });
    return map;
  } catch (e) {
    return {};
  }
}

/* ── Sort + filter ── */
function sortProviders(list, sortBy) {
  switch (sortBy) {
    case 'rating':    return [...list].sort((a, b) => (b.avg_rating || 0) - (a.avg_rating || 0));
    case 'price_asc': return [...list].sort((a, b) => (a.price_cents == null ? 99999 : a.price_cents) - (b.price_cents == null ? 99999 : b.price_cents));
    case 'distance':  return [...list].sort((a, b) => (a.distance_km || 999) - (b.distance_km || 999));
    case 'newest':    return [...list].sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
    default:
      return [...list].sort((a, b) => {
        if (!!a.is_verified !== !!b.is_verified) return b.is_verified ? 1 : -1;
        return (b.avg_rating || 0) - (a.avg_rating || 0);
      });
  }
}

async function applyFilters(rawList) {
  let list = rawList;
  if (state.suburb) {
    const q = state.suburb.toLowerCase();
    list = list.filter(p => (p.suburb || '').toLowerCase().includes(q));
  }
  if (state.service) {
    list = list.filter(p => {
      const svcs = Array.isArray(p.services) ? p.services : (typeof p.services === 'string' ? p.services.split(',').map(s => s.trim()) : []);
      return svcs.some(s => (s || '').trim() === state.service);
    });
  }
  if (state.attributes.length) {
    const attrMap = await ensureAttributesLoaded();
    const required = state.attributes.map(v => FILTER_TO_ATTR[v]).filter(Boolean);
    list = list.filter(p => {
      const have = attrMap[p.provider_profile_id || p.id];
      if (!have) return false;
      return required.every(a => have.has(a));
    });
  }
  if (state.service) {
    const priceMap = await fetchPricesForService(state.service);
    list = list.map(p => ({ ...p, price_cents: priceMap[p.provider_profile_id || p.id] ?? null }));
  } else {
    list = list.map(p => ({ ...p, price_cents: null }));
  }
  return sortProviders(list, state.sort);
}

/* ── Card rendering ── */
function renderCard(p) {
  const initials = getInitials(p.first_name, p.last_name);
  const lastInitial = (p.last_name || '')[0] ? (p.last_name[0].toUpperCase() + '.') : '';
  const hasRating = p.avg_rating && p.total_reviews > 0;
  const services = Array.isArray(p.services) ? p.services : (typeof p.services === 'string' ? p.services.split(',').map(s => s.trim()).filter(Boolean) : []);
  const visibleSvcs = services.slice(0, 3);
  const moreSvcs = services.length - visibleSvcs.length;

  let attrsForDisplay = [];
  if (allAttrMap) {
    const set = allAttrMap[p.provider_profile_id || p.id];
    if (set) attrsForDisplay = [...set].slice(0, 3);
  }

  const verifiedHtml = p.is_verified
    ? `<span class="verified-badge"><svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Verified</span>`
    : '';

  const ratingHtml = hasRating
    ? `<div class="pc-rating"><span class="stars">${renderStars(p.avg_rating)}</span> <span>${Number(p.avg_rating).toFixed(1)}</span> · ${p.total_reviews} review${p.total_reviews !== 1 ? 's' : ''}</div>`
    : `<div class="pc-rating"><span class="new-badge">New carer</span></div>`;

  const svcHtml = visibleSvcs.length
    ? `<div class="pc-services">${visibleSvcs.map(s => `<span class="svc-pill">${esc(SERVICE_LABELS[s] || s.replace(/_/g, ' '))}</span>`).join('')}${moreSvcs > 0 ? `<span class="svc-pill more">+${moreSvcs} more</span>` : ''}</div>`
    : '';

  const attrsHtml = attrsForDisplay.length
    ? `<div class="pc-attrs">${attrsForDisplay.map(a => {
        const def = ATTR_LABELS[a];
        return def ? `<span class="pc-attr">${def.icon} ${esc(def.label)}</span>` : `<span class="pc-attr">${esc(a.replace(/_/g, ' '))}</span>`;
      }).join('')}</div>`
    : '';

  const priceHtml = p.price_cents != null
    ? `<span class="from">From</span><span class="price">${priceDollars(p.price_cents)}</span><span class="per">${state.service === 'dog_walking' ? 'per walk' : 'per booking'}</span>`
    : `<span class="from">Price</span><span class="price" style="font-size:1.2rem;">—</span><span class="per">on profile</span>`;

  const distanceHtml = (p.distance_km != null) ? ` · ${Math.round(Number(p.distance_km) * 10) / 10}km` : '';

  const avatarHtml = p.avatar_url
    ? `<div class="pc-avatar"><img src="${esc(p.avatar_url)}" alt=""></div>`
    : `<div class="pc-avatar">${esc(initials)}</div>`;

  return `
    <a class="provider-card fade-in" href="/carer/?id=${esc(p.user_id || '')}">
      ${avatarHtml}
      <div>
        <div class="pc-name">${esc(p.first_name || '')} ${esc(lastInitial)} ${verifiedHtml}</div>
        <div class="pc-suburb">${esc(p.suburb || 'Sydney')}${distanceHtml}</div>
        ${ratingHtml}
        ${svcHtml}
        ${attrsHtml}
        ${p.bio ? `<div class="pc-bio">${esc(p.bio)}</div>` : ''}
      </div>
      <div class="pc-right">
        ${priceHtml}
        <span class="view-link">View profile →</span>
      </div>
    </a>
  `;
}

/* ── Render results ── */
function renderResults(list) {
  const area = document.getElementById('resultsArea');
  const header = document.getElementById('resultsHeader');
  document.getElementById('resCount').textContent = list.length;
  document.getElementById('resHeading').textContent = list.length === 1 ? 'carer' + (state.suburb ? ' near ' + esc(state.suburb) : '') : 'carers' + (state.suburb ? ' near ' + esc(state.suburb) : '');
  document.getElementById('resContext').innerHTML = buildContextLine(list.length);
  header.style.display = 'flex';

  const sortSel = document.getElementById('sortSelect');
  if (sortSel.value !== state.sort) sortSel.value = state.sort;

  if (list.length === 0) {
    area.innerHTML = `
      <div class="empty-state fade-in">
        <div class="empty-icon">🔍</div>
        <h3>No carers found${state.suburb ? ' near ' + esc(state.suburb) : ''}</h3>
        <p>Try expanding your search area, choosing a different service, or removing some filters.</p>
        <button class="btn-secondary" id="btnEmptyClear">Clear filters</button>
      </div>
    `;
    document.getElementById('btnEmptyClear').addEventListener('click', clearFilters);
    return;
  }

  const cap = 20;
  const visible = list.slice(0, cap);
  const more = list.length > cap;
  area.innerHTML = `<div class="provider-list">${visible.map(renderCard).join('')}</div>${more ? `<div style="text-align:center;margin-top:1.5rem;"><button class="btn-secondary" id="btnLoadMore">Load more</button></div>` : ''}`;
  if (more) {
    document.getElementById('btnLoadMore').addEventListener('click', () => {
      area.querySelector('.provider-list').insertAdjacentHTML('beforeend', list.slice(cap).map(renderCard).join(''));
      document.getElementById('btnLoadMore').remove();
    });
  }

  const ctxClear = document.getElementById('btnClearAll');
  if (ctxClear) ctxClear.addEventListener('click', clearFilters);
}

function renderError(err) {
  const area = document.getElementById('resultsArea');
  area.innerHTML = `
    <div class="error-state fade-in">
      <h3>Couldn't load carers</h3>
      <p>${esc(err && err.message ? err.message : 'Network or server error.')}</p>
      <button class="btn-secondary" id="btnTryAgain">Try again</button>
    </div>
  `;
  document.getElementById('btnTryAgain').addEventListener('click', runSearch);
}

/* ── Top-level search runner ── */
async function runSearch() {
  if (isLoading) return;
  isLoading = true;
  writeUrlParams();
  renderMobileSummary();

  document.getElementById('resultsArea').innerHTML = document.getElementById('initialSkeletons').outerHTML;

  try {
    if (providers.length === 0) {
      providers = await fetchProviders();
    }
    await ensureAttributesLoaded();
    renderedProviders = await applyFilters(providers);
    renderResults(renderedProviders);
  } catch (e) {
    renderError(e);
  } finally {
    isLoading = false;
  }
}

function clearFilters() {
  state.suburb = ''; state.service = ''; state.recurring = false; state.date = ''; state.dateEnd = '';
  state.time = ''; state.days = []; state.size = ''; state.puppy = false;
  state.petId = ''; state.attributes = []; state.sort = 'best';
  mountFilterForm();
  runSearch();
}

/* ── Boot ── */
async function init() {
  /* FIX 2: Wrap session restore in try/catch — a missing or corrupt
     session should never block the page from loading for guest users */
  try {
    const stored = localStorage.getItem('truffl_session');
    if (stored) {
      const s = JSON.parse(stored);
      authToken = s.access_token;
      authUid = s.user_id;
    }
  } catch (e) {
    // No session or parse error — continue as guest, authToken stays null
  }

  readUrlParams();

  // Saved pets — only attempted when logged in, using sbGet (auth required)
  if (authUid) {
    try {
      const cp = await sbGet('customer_profiles', `user_id=eq.${authUid}&select=id`);
      if (cp.length) {
        myPets = await sbGet('pets', `customer_id=eq.${cp[0].id}&is_active=eq.true&select=id,name,breed`);
      }
    } catch (e) { /* ignore — pet chips just won't show */ }
  }

  mountFilterForm();
  renderMobileSummary();

  document.getElementById('sortSelect').addEventListener('change', e => {
    state.sort = e.target.value;
    if (renderedProviders.length) {
      renderedProviders = sortProviders(renderedProviders, state.sort);
      renderResults(renderedProviders);
      writeUrlParams();
    }
  });

  document.getElementById('btnOpenSheet').addEventListener('click', openSheet);
  document.getElementById('btnCloseSheet').addEventListener('click', closeSheet);
  document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);

  runSearch();
}

document.addEventListener('DOMContentLoaded', init);
</script>
