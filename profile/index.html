<style>

    --sage-dark:#6B7E5E; --terracotta:#C4755B; --terracotta-light:#D4917B;
    --blush:#E8C4B8; --brown:#3D2B1F; --brown-muted:#8B7355;
    --text-primary:#3D2B1F; --text-secondary:#6B5B4E; --text-muted:#9B8B7E;
    --border:#E8E0D6; --border-focus:#C4755B;
    --error:#C0392B; --error-bg:#FDF0EE; --success:#5B8C5A; --success-bg:#EDF5ED;
    --warning:#C0862B; --warning-bg:#FEF3E2;

  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;}

  .nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;color:var(--brown);overflow:hidden;}
  .nav-avatar img{width:100%;height:100%;object-fit:cover;}
  .nav-name{font-size:0.85rem;font-weight:500;color:var(--text-primary);}
  .nav-msg{position:relative;display:inline-flex;align-items:center;color:var(--text-secondary);text-decoration:none;}

  .bc-msg-link{display:inline-flex;align-items:center;gap:5px;position:relative;}
  .bc-msg-badge{min-width:16px;height:16px;padding:0 5px;border-radius:999px;background:var(--terracotta);color:#fff;font-size:0.62rem;line-height:16px;text-align:center;font-weight:600;}

  .page-wrapper{max-width:560px;margin:0 auto;padding:1.5rem 1rem 4rem;}

  .welcome{margin-bottom:1.5rem;}
  .welcome h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.8rem;color:var(--brown);margin-bottom:4px;}
  .welcome p{color:var(--text-muted);font-size:0.9rem;}

  .tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
  .tab{padding:10px 18px;font-size:0.85rem;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
  .tab:hover{color:var(--text-secondary);}
  .tab.active{color:var(--terracotta);border-bottom-color:var(--terracotta);}
  .tab-content{display:none;}
  .tab-content.active{display:block;animation:fadeIn 0.25s ease;}

  .section-heading{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.1rem;color:var(--brown);margin-bottom:0.75rem;}

  /* Booking cards */
  .booking-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:0.75rem;}
  .bc-pet-name{font-size:0.95rem;font-weight:500;color:var(--text-primary);margin-bottom:2px;}
  .bc-meta{font-size:0.82rem;color:var(--text-secondary);margin-bottom:4px;}
  .bc-time{font-size:0.82rem;color:var(--text-muted);margin-bottom:8px;}

  .status-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:600;padding:2px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.03em;}
  .mg-chips{display:flex;flex-wrap:wrap;gap:8px;}
  .mg-chip{font:inherit;font-size:0.82rem;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--text-secondary);cursor:pointer;}
  .mg-chip-on{background:var(--terracotta);border-color:var(--terracotta);color:#fff;}
  .badge-pending{background:var(--warning-bg);color:var(--warning);}
  .badge-confirmed{background:var(--success-bg);color:var(--success);}
  .badge-in-progress{background:var(--success-bg);color:var(--success);}
  .badge-completed{background:rgba(139,158,126,0.12);color:var(--sage-dark);}
  .badge-cancelled{background:var(--error-bg);color:var(--error);}
  .badge-pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .bc-service{display:inline-block;font-size:0.75rem;padding:3px 10px;background:rgba(139,158,126,0.1);border-radius:20px;color:var(--sage-dark);margin-bottom:8px;}

  .bc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .btn-track{display:inline-block;padding:10px 18px;background:var(--terracotta);color:white;border-radius:10px;font-size:0.85rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
  .btn-track:hover{background:var(--terracotta-light);}
  .btn-ghost{padding:8px 14px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;transition:border-color 0.2s,color 0.2s;}
  .btn-ghost:hover{border-color:var(--text-muted);}
  .btn-ghost.danger{color:var(--error);}
  .btn-ghost.danger:hover{border-color:var(--error);}

  .cancel-confirm{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .cancel-confirm span{font-size:0.82rem;color:var(--text-secondary);}
  .cancel-confirm.series{flex-direction:column;align-items:flex-start;}
  .cancel-confirm-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .recurring-tag{display:inline-block;font-size:0.6rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--sage-dark);background:var(--success-bg);padding:2px 8px;border-radius:20px;vertical-align:middle;}
  /* TRU-136: owner-facing "Covered" badge */
  .covered-tag{display:inline-block;font-size:0.6rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#7a5c3d;background:#f3e8d9;padding:2px 8px;border-radius:20px;vertical-align:middle;cursor:help;}
  /* TRU-135/136: backup cover card */
  .cover-card{background:var(--warm-white,#fff);border:1px solid var(--border);border-radius:14px;padding:1.1rem 1.25rem;}
  .cover-card p{font-size:0.88rem;line-height:1.6;color:var(--text-muted);margin:0 0 10px;}

  .cover-field label{display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:4px;}

  .cover-check{display:flex;gap:9px;align-items:flex-start;font-size:0.85rem;line-height:1.55;color:var(--text);margin:12px 0;}

  .cover-meta{font-size:0.82rem;color:var(--text-muted);margin:4px 0 10px;}

  .btn-cancel-keep{padding:8px 14px;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;}

  .pet-name{font-size:0.95rem;font-weight:500;color:var(--text-primary);}

  .pet-actions{display:flex;gap:8px;flex-shrink:0;}
  .pet-edit-form{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}

  .pet-upload-status{font-size:0.78rem;color:var(--text-muted);}

  .btn-save{padding:8px 18px;background:var(--terracotta);color:white;border:none;border-radius:8px;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}

  .sign-out-btn{display:block;width:100%;padding:12px;background:transparent;border:1px solid var(--border);color:var(--error);border-radius:10px;font-size:0.88rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;margin-top:1.5rem;transition:border-color 0.2s;}
  .sign-out-btn:hover{border-color:var(--error);}

  .section-divider{margin:1.5rem 0;border:none;border-top:1px solid var(--border);}

  /* Empty state */
  .empty{text-align:center;padding:3rem 1rem;}
  .empty-emoji{font-size:2rem;margin-bottom:0.75rem;opacity:0.6;}

  .btn-primary{display:inline-block;padding:12px 28px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}

  .msg.success{background:var(--success-bg);color:var(--success);display:block;}
  .msg.info{background:var(--warning-bg);color:var(--warning);display:block;}

  .login-prompt{text-align:center;padding:4rem 2rem;}
  .login-prompt h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--brown);margin-bottom:0.5rem;}
  .login-prompt p{color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;}
  .login-prompt a{display:inline-block;padding:12px 32px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  @media(max-width:600px){
    .page-wrapper{padding:1rem 0.75rem 3rem;}
    .nav{padding:0 1rem;}
    .btn-track{width:100%;text-align:center;}
    .nav-name{display:none;}
    .row-2{grid-template-columns:1fr;}
  }
</style>

/* ── Supabase helpers ── */
function h(token) {
  const hd = { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  if (token) hd['Authorization'] = `Bearer ${token}`;
  return hd;
}
async function sbGet(t, p) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${p}`, { headers: h(authToken) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  return await r.json();
}
async function sbRpc(fn, args) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, { method: 'POST', headers: { ...h(authToken), 'Prefer': 'return=representation' }, body: JSON.stringify(args || {}) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'Request failed'); }
  return await r.json();
}
// Insert without reading the row back — for write-only tables (decline feedback)
// that have no SELECT policy by design.
async function sbInsertQuiet(t, row) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}`, { method: 'POST', headers: { ...h(authToken), 'Prefer': 'return=minimal' }, body: JSON.stringify(row) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'Insert failed'); }
}
async function sbPatch(t, col, val, upd) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${col}=eq.${val}`, { method: 'PATCH', headers: { ...h(authToken), 'Prefer': 'return=representation' }, body: JSON.stringify(upd) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  const data = await r.json();
  if (Array.isArray(data) && data.length === 0) throw new Error("Couldn't save — you may not have permission, or the record no longer exists.");
  return data;
}
async function sbInsert(t, row) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}`, { method: 'POST', headers: { ...h(authToken), 'Prefer': 'return=representation' }, body: JSON.stringify(row) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  return await r.json();
}
// Call a Supabase Edge Function (Stripe actions) as the logged-in user.
async function sbFn(name, body) {
  const r = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, { method: 'POST', headers: h(authToken), body: JSON.stringify(body || {}) });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `Request failed (${r.status})`);
  return data;
}

// Pet age derived from date of birth, so it stays current. Under a year, show months.
function ageFromDob(dob) {
  if (!dob) return null;
  const b = new Date(dob + 'T00:00:00');
  if (isNaN(b)) return null;
  const now = new Date();
  let months = (now.getFullYear() - b.getFullYear()) * 12 + (now.getMonth() - b.getMonth());
  if (now.getDate() < b.getDate()) months--;
  if (months < 0) return null;
  if (months < 12) return months + (months === 1 ? ' mo' : ' mos');
  const yrs = Math.floor(months / 12);
  return yrs + (yrs === 1 ? ' yr' : ' yrs');
}

  if (p.sex && PET_SEX_LABELS[p.sex]) parts.push(PET_SEX_LABELS[p.sex]);
  const age = ageFromDob(p.dob);
  if (age) parts.push(age);
  if (p.weight_kg != null) parts.push(p.weight_kg + 'kg');
  return parts.join(' · ');
}

/* ── Booking helpers ── */
function formatScheduledAt(iso) {
  const d = new Date(iso);
  const weekday = d.toLocaleDateString('en-AU', { weekday: 'long' });
  const day = d.toLocaleDateString('en-AU', { day: 'numeric' });
  const month = d.toLocaleDateString('en-AU', { month: 'long' });
  const time = d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
  return `${weekday} ${day} ${month} · ${time}`;
}
function statusBadge(status) {
  if (status === 'in_progress') {
    return `<div style="margin-bottom:10px;"><span class="status-badge badge-in-progress"><span class="badge-pulse"></span>Walk in progress</span></div>`;
  }
  const map = {
    pending: ['badge-pending', 'Awaiting confirmation'],
    confirmed: ['badge-confirmed', 'Confirmed'],
    completed: ['badge-completed', 'Completed'],
    cancelled: ['badge-cancelled', 'Cancelled']
  };
  const [cls, label] = map[status] || ['', status];
  return `<div style="margin-bottom:10px;"><span class="status-badge ${cls}">${label}</span></div>`;
}
function actionButtons(b) {
  if (b.status === 'in_progress') {
    return b._has_active_walk
      ? `<a href="/track/?booking=${b.id}" class="btn-track">Track live walk →</a>`
      : `<a href="/track/?booking=${b.id}" class="btn-ghost">View walk</a>`;
  }
  if (b.status === 'confirmed') {
    if (pendingCancelId === b.id) return cancelConfirmHtml(b);
    return `<a href="/track/?booking=${b.id}" class="btn-ghost">View booking</a><button class="btn-ghost danger" onclick="showCancelConfirm('${b.id}')">Cancel</button>`;
  }
  if (b.status === 'pending') {
    if (pendingCancelId === b.id) return cancelConfirmHtml(b);
    return `<button class="btn-ghost danger" onclick="showCancelConfirm('${b.id}')">Cancel</button>`;
  }
  if (b.status === 'completed') {
    const retryBtn = b.payment_status === 'failed'
      ? `<button class="btn-track" onclick="retryPayment('${b.id}')">Retry payment</button>` : '';
    const reviewBtn = b._has_review
      ? `<a href="/review/?booking=${b.id}" class="btn-ghost">Edit review</a>`
      : `<a href="/review/?booking=${b.id}" class="${retryBtn ? 'btn-ghost' : 'btn-track'}">Leave a review</a>`;
    const viewWalk = `<a href="/track/?booking=${b.id}" class="btn-ghost">View walk</a>`;
    const bookAgain = b._provider_user_id ? `<a href="/book/?provider=${b._provider_user_id}" class="btn-ghost">Book again</a>` : '';
    return [retryBtn, reviewBtn, viewWalk, bookAgain].filter(Boolean).join('');
  }
  return '';
}
// Per-booking payment state shown on completed bookings (TRU-149).
function paymentNotice(b) {
  if (b.status !== 'completed' || !b.payment_status) return '';
  if (b.payment_status === 'failed') {
    return `<div style="margin-bottom:10px;background:#fdeeee;border:1px solid #f3c9c9;border-radius:8px;padding:8px 12px;font-size:0.82rem;color:#9a3b3b;">Payment didn't go through — retry below to complete it.</div>`;
  }
  if (b.payment_status === 'refunded') return `<div style="margin-bottom:10px;font-size:0.8rem;color:var(--text-muted);">Refunded</div>`;

// An M&G card stays in the "active" list while it still needs the customer's
// attention: before completion, and after completion while the series awaits a
// proceed/decline decision.
function mgNeedsAction(b) {
  const s = seriesById[b.series_id];
  return b.status === 'confirmed' || (b.status === 'completed' && s && s.status === 'pending_meet_greet');
}
function firstName(full) { return (full || '').trim().split(/\s+/)[0] || 'your carer'; }
function mgScheduleSummary(s) {
  if (!s) return '';
  const fdate = d => new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
  const fwin = () => {
    if (!s.time_of_day) return '';
    const t = hhmm => { const [h, m] = hhmm.split(':'); const dd = new Date(); dd.setHours(+h, +m, 0); return dd.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true }); };
    return s.window_end_time ? ` between ${t(s.time_of_day)}–${t(s.window_end_time)}` : ` at ${t(s.time_of_day)}`;
  };
  if (s.booking_kind === 'multiday') return `${fdate(s.start_date)} to ${s.end_date ? fdate(s.end_date) : ''}`.trim();
  if (s.booking_kind === 'oneoff') return `${fdate(s.start_date)}${fwin()}`;
  // recurring
  let freq = 'every weekday';
  if (s.frequency_type === 'daily') freq = 'every day';
  else if (s.frequency_type === 'specific_days') freq = 'every ' + (s.days_of_week || []).slice().sort((a, b) => a - b).map(n => DAY_FULL_MG[n]).join(', ');
  return `${freq} from ${fdate(s.start_date)}${fwin()}`;
}
function mgCardHtml(b) {

function validate() {
  let ok = true;
  const fn = document.getElementById('f-first').value.trim();
  const ln = document.getElementById('f-last').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  setFieldError('first', !fn, 'First name is required.');
  setFieldError('last', !ln, 'Last name is required.');
  setFieldError('email', !EMAIL_RE.test(email), 'Enter a valid email address.');
  setFieldError('phone', phone !== '' && !PHONE_RE.test(phone), 'Enter a valid phone number.');
  if (!fn || !ln) ok = false;
  if (!EMAIL_RE.test(email)) ok = false;
  if (phone !== '' && !PHONE_RE.test(phone)) ok = false;
  return ok;
}
function setFieldError(key, isError, text) {
  const input = document.getElementById('f-' + key);
  const err = document.getElementById('err-' + key);
  if (!input || !err) return;
  input.classList.toggle('invalid', isError);
  err.textContent = text || '';
  err.classList.toggle('show', isError);
}
async function updateAuthEmail(newEmail) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    method: 'PUT',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: newEmail })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.msg || e.message || e.error_description || 'Could not update email.');
  }
  return await r.json();
}
async function saveProfile() {
  clearMsg();
  if (!validate()) { showMsg('Please fix the highlighted fields.', 'error'); return; }

  const fn = document.getElementById('f-first').value.trim();
  const ln = document.getElementById('f-last').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const suburb = document.getElementById('f-suburb').value.trim();

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const emailChanged = email.toLowerCase() !== (userData.email || '').toLowerCase();

  try {
    await sbPatch('users', 'id', authUid, { first_name: fn, last_name: ln, phone: phone || null });
    userData.first_name = fn; userData.last_name = ln; userData.phone = phone || null;

    if (profileRow) {
      const profilePatch = { suburb: suburb || null };
      if (userData.role === 'customer') {
        const address = document.getElementById('f-address').value.trim();
        const postcode = document.getElementById('f-postcode').value.trim();
        profilePatch.address = address || null;
        profilePatch.postcode = postcode || null;
      } else {
        // TRU-157: carers can now edit their public bio + experience
        const bioEl = document.getElementById('f-bio');
        const expEl = document.getElementById('f-experience');
        if (bioEl) profilePatch.bio = bioEl.value.trim() || null;
        if (expEl && expEl.value) profilePatch.experience_years = expEl.value;
      }
      await sbPatch(profileTable, 'user_id', authUid, profilePatch);
      profileRow.suburb = suburb || null;
      if (userData.role === 'customer') {
        profileRow.address = profilePatch.address;
        profileRow.postcode = profilePatch.postcode;
      } else {
        if ('bio' in profilePatch) profileRow.bio = profilePatch.bio;
        if ('experience_years' in profilePatch) profileRow.experience_years = profilePatch.experience_years;
      }
    }

    if (emailChanged) {
      await updateAuthEmail(email);
      try { await sbPatch('users', 'id', authUid, { email }); userData.email = email; } catch (e) { /* non-fatal */ }
    }

    renderAvatar();
    renderNav();

    if (emailChanged) {
      showMsg(`Saved. We've sent a confirmation link to ${email} — your login email will update once you confirm it.`, 'info');
    } else {
      showMsg('Your profile has been saved.', 'success');
    }
  } catch (e) {
    showMsg(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Save changes';
  }
}
function resetDetails() {
  clearMsg();
  if (userData.role === 'provider') renderProviderProfile();
  else renderAccountTab();
}

function avatarSectionHtml() {

        <div class="avatar-actions">

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  clearMsg();
  if (!ALLOWED_PHOTO_TYPES.includes(file.type)) {
    showMsg('Please choose a JPG, PNG or WebP image.', 'error');
    input.value = ''; return;
  }
  if (file.size > MAX_PHOTO_BYTES) {
    showMsg('That image is over 5MB — please choose a smaller file.', 'error');
    input.value = ''; return;
  }
  const status = document.getElementById('uploadStatus');
  status.innerHTML = '<span class="uploading">Uploading…</span>';
  try {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${authUid}/avatar_${Date.now()}.${ext}`;
    const up = await fetch(`${SUPABASE_URL}/storage/v1/object/profile-photos/${path}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': file.type },
      body: file
    });
    if (!up.ok) {
      const e = await up.json().catch(() => ({}));
      throw new Error(e.message || e.error || 'Upload failed.');
    }
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/profile-photos/${path}`;
    await sbPatch('users', 'id', authUid, { avatar_url: publicUrl });
    userData.avatar_url = publicUrl;
    renderAvatar();
    renderNav();
    const lbl = document.getElementById('photoBtnLabel');
    if (lbl) lbl.textContent = 'Change photo';
    status.innerHTML = '';
    showMsg('Photo updated.', 'success');
  } catch (e) {
    status.innerHTML = '';
    showMsg(e.message, 'error');
  } finally {
    input.value = '';
  }
}

        <button class="btn-ghost" onclick="openCoverForm()">Update access details</button>
        <button class="btn-ghost danger" onclick="turnOffCover()">Turn off</button>
      </div>
    </div>`;
  }
  return `<div class="cover-card">
    <p>Walkers are reliable, but life happens. If your walker has to cancel, we'll do everything we can to step in and walk your dog ourselves so your day isn't derailed.</p>

async function openCoverForm() {
  clearMsg(); coverPrefill = null;
  if (profileRow.backup_cover_enabled) {
    try { const rows = await sbRpc('get_backup_access', {}); coverPrefill = rows && rows[0] ? rows[0] : null; } catch (e) { /* prefill is best-effort */ }
  }
  editingCover = true; renderAccountTab();
}
function closeCoverForm() { editingCover = false; coverPrefill = null; renderAccountTab(); }
async function saveCover() {
  const wasOn = profileRow.backup_cover_enabled;
  const loc = document.getElementById('cov-loc').value.trim();
  const code = document.getElementById('cov-code').value.trim();
  const notes = document.getElementById('cov-notes').value.trim();
  const consent = document.getElementById('cov-consent').checked;
  const msg = document.getElementById('cov-msg');
  msg.textContent = ''; msg.className = 'msg';
  if (!loc || !code || !consent) {
    msg.textContent = !consent ? "Please tick the consent box — cover can't be active without it." : 'Please fill in the lockbox location and code.';
    msg.className = 'msg error'; return;
  }
  const btn = document.getElementById('cov-save'); btn.disabled = true; btn.textContent = 'Saving…';
  try {
    await sbRpc('set_backup_cover', {
      p_enable: true, p_external_storage_confirmed: true,
      p_access_location: loc, p_access_code: code, p_access_notes: notes || null,
      p_consent: true, p_consent_version: COVER_CONSENT_VERSION
    });
    profileRow.backup_cover_enabled = true;
    editingCover = false; coverPrefill = null;
    renderAccountTab(); renderBookingsTab();
    showMsg('Backup cover is on — your upcoming walks now show a Covered badge.', 'success');
  } catch (e) {
    msg.textContent = e.message; msg.className = 'msg error';
    btn.disabled = false; btn.textContent = wasOn ? 'Save changes' : 'Turn on backup cover';
  }
}
async function turnOffCover() {
  if (!confirm('Turn off backup cover? Your stored access details will be deleted.')) return;
  try {
    await sbRpc('set_backup_cover', { p_enable: false });
    profileRow.backup_cover_enabled = false;
    editingCover = false; coverPrefill = null;
    renderAccountTab(); renderBookingsTab();
    showMsg('Backup cover is off and your access details have been deleted.', 'success');
  } catch (e) { showMsg(e.message, 'error'); }
}

/* ── Service area (TRU-156): travel-time isochrone or simple radius ── */
let areaMode = null, areaCoverage = null;
const AREA_KM = [3, 5, 8, 10, 15, 20];
const AREA_MINS = [10, 15, 20, 30, 45, 60];
function serviceAreaHtml() {
  if (!profileRow) return '';

  const current = profileRow.travel_time_mins
    ? `up to ${profileRow.travel_time_mins} min drive from home`
    : `${profileRow.radius_km || 5} km from home`;
  const opts = mode === 'travel'
    ? AREA_MINS.map(m => `<option value="${m}" ${profileRow.travel_time_mins === m ? 'selected' : ''}>${m} minutes</option>`).join('')
    : AREA_KM.map(k => `<option value="${k}" ${(profileRow.radius_km || 5) === k ? 'selected' : ''}>${k} km</option>`).join('');
  return `<div class="cover-card">
    <p>How far will you go for a job? <b>Travel time</b> follows real roads — no jobs across the harbour unless you'd actually drive it. <b>Distance</b> is a simple circle around your suburb.</p>
    <div class="sa-seg">
      <button type="button" class="${mode === 'radius' ? 'active' : ''}" onclick="setAreaMode('radius')">Distance</button>

function coverageLine(names) {
  if (!names || !names.length) return 'No suburbs in range yet — make sure your suburb is set in My details.';
  const shown = names.slice(0, 18);

async function loadAreaCoverage() {

// Proceed: collect & save the customer's card via a Stripe SetupIntent (off-session, no
// charge), then activate the series. The DB gate requires a completed M&G to allow this.
// Each booking is charged on completion (Phase 3), off the saved card.
let mgStripe = null, mgElements = null;
async function proceedMg(seriesId) {
  mgOverlay(`
    <h2 style="margin-top:0;">Add a payment method</h2>
    <p style="font-size:0.9rem;">You're only ever charged after a service is finished — never before, and never for the meet &amp; greet.</p>

      <button class="btn-ghost" onclick="closeMgOverlay()">Not now</button>
      <button class="btn-track" id="mgProceedConfirm" onclick="confirmProceedMg('${seriesId}')" disabled>Save card &amp; go ahead</button>
    </div>`);
  try {
    if (!window.Stripe) throw new Error('Could not load the secure card form. Please refresh and try again.');
    const { client_secret } = await sbFn('stripe-api', { action: 'setup_intent' });
    mgStripe = mgStripe || Stripe(STRIPE_PK);
    mgElements = mgStripe.elements({ clientSecret: client_secret, appearance: { theme: 'flat', variables: { colorPrimary: '#C4866A' } } });
    const pe = mgElements.create('payment');
    pe.mount('#mgPaymentElement');
    pe.on('ready', () => {
      const b = document.getElementById('mgProceedConfirm'); if (b) b.disabled = false;
      const m = document.getElementById('mgOverlayMsg'); if (m) { m.textContent = ''; m.className = 'msg'; }

    const m = document.getElementById('mgOverlayMsg'); if (m) { m.textContent = e.message; m.className = 'msg error'; }
  }
}
async function confirmProceedMg(seriesId) {
  const btn = document.getElementById('mgProceedConfirm');
  const m = document.getElementById('mgOverlayMsg');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  if (m) { m.textContent = ''; m.className = 'msg'; }
  try {
    if (!mgStripe || !mgElements) throw new Error('Card form not ready — please try again.');
    // Save the card, no charge. redirect:'if_required' keeps card flows in-page.
    const { error, setupIntent } = await mgStripe.confirmSetup({ elements: mgElements, redirect: 'if_required' });
    if (error) throw new Error(error.message || 'Could not save your card.');
    // Make it the default so the per-booking charge on completion can use it off-session.
    if (setupIntent && setupIntent.payment_method) {
      try { await sbFn('stripe-api', { action: 'set_default_pm', payment_method: setupIntent.payment_method }); } catch (e) { /* non-fatal */ }
    }
    // Activate the series — the server-side M&G gate is still enforced.
    await sbPatch('booking_series', 'id', seriesId, { status: 'active' });
    const s = seriesById[seriesId];
    if (s) s.status = 'active';
    const carer = esc(firstName((bookings.find(b => b.series_id === seriesId) || {})._provider_name));
    const dog = esc((bookings.find(b => b.series_id === seriesId) || {})._pet_name || 'your dog');
    const svcNat = SERVICE_NATURAL[(bookings.find(b => b.series_id === seriesId) || {})._service_type] || 'visit';
    const startTxt = s && s.start_date ? new Date(s.start_date + 'T00:00:00').toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' }) : 'soon';
    mgOverlay(`
      <h2 style="margin-top:0;">You're all set</h2>
      <p>Wonderful. ${carer} can't wait to spend time with ${dog}. Your ${esc(svcNat)} starts ${startTxt}, and you're only ever charged once a service is done, never a moment before.</p>

  } catch(e) {
    if (m) { m.textContent = e.message; m.className = 'msg error'; }
    if (btn) { btn.disabled = false; btn.textContent = 'Save card & go ahead'; }
  }
}

async function confirmRetryPayment(bookingId) {

async function uploadPetPhoto(input, petId) {
  const file = input.files && input.files[0];
  if (!file) return;
  clearMsg();
  const statusId = petId ? `pet-edit-photo-status-${petId}` : 'new-pet-photo-status';
  const status = document.getElementById(statusId);
  if (!ALLOWED_PHOTO_TYPES.includes(file.type)) { showMsg('Please choose a JPG, PNG or WebP image.', 'error'); input.value = ''; return; }
  if (file.size > MAX_PHOTO_BYTES) { showMsg('That image is over 5MB — please choose a smaller file.', 'error'); input.value = ''; return; }

  if (status) status.textContent = 'Uploading…';
  try {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${authUid}/pet_${Date.now()}.${ext}`;
    const up = await fetch(`${SUPABASE_URL}/storage/v1/object/profile-photos/${path}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': file.type },
      body: file
    });
    if (!up.ok) { const e = await up.json().catch(() => ({})); throw new Error(e.message || e.error || 'Upload failed.'); }
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/profile-photos/${path}`;

    if (petId) {
      await sbPatch('pets', 'id', petId, { photo_url: publicUrl });
      const p = pets.find(x => x.id === petId);
      if (p) p.photo_url = publicUrl;
    } else {
      addPetPhotoUrl = publicUrl;
    }
    const control = input.closest('.pet-photo-control');
    if (control) {
      const avatar = control.querySelector('.pet-avatar');
      if (avatar) avatar.innerHTML = `<img src="${esc(publicUrl)}" alt="">`;
      const btn = control.querySelector('.pet-photo-btn');
      if (btn) btn.textContent = 'Change photo';
    }
    if (status) status.textContent = '';
  } catch(e) {
    if (status) status.textContent = '';
    showMsg(e.message, 'error');
  } finally {
    input.value = '';
  }
}

/* ── Init ── */
async function init() {
  const area = document.getElementById('profileContent');
  const stored = localStorage.getItem('truffl_session');
  if (stored) { try { const s = JSON.parse(stored); authToken = s.access_token; authUid = s.user_id; } catch (e) {} }

  if (!authToken) {
    area.innerHTML = `<div class="login-prompt"><h2>Sign in required</h2><p>You need to be logged in to manage your profile.</p><a href="/login/?redirect=/profile/">Sign in</a></div>`;
    return;
  }

  try {
    const users = await sbGet('users', `id=eq.${authUid}&select=first_name,last_name,email,phone,avatar_url,role`);
    if (!users.length) { signOut(); return; }
    userData = users[0];

    if (userData.role === 'provider') {
      profileTable = 'provider_profiles';
      const profiles = await sbGet('provider_profiles', `user_id=eq.${authUid}&select=id,suburb,radius_km,travel_time_mins,bio,experience_years`);
      profileRow = profiles.length ? profiles[0] : null;
      renderNav();
      renderProviderProfile();
      loadAreaCoverage();
      return;
    }

    // Customer
    profileTable = 'customer_profiles';
    const profiles = await sbGet('customer_profiles', `user_id=eq.${authUid}&select=id,suburb,address,postcode,backup_cover_enabled,backup_cover_eligible`);
    if (!profiles.length) {
      area.innerHTML = `<div class="login-prompt"><h2>Profile not set up</h2><p>Your customer profile isn't set up yet.</p><a href="/login/">Complete registration</a></div>`;
      return;
    }
    customerProfile = profiles[0];
    profileRow = profiles[0];

    // TRU-142: one parallel round for the page data, then batched IN-queries to
    // enrich bookings — replaces up to 6 SERIAL queries per booking (~10s for a
    // busy owner). RLS visibility is identical; it's the same reads, batched.
    const [creditsRows, rawBookings, seriesRows, myReviews, myPets] = await Promise.all([
      sbGet('customer_credits', 'select=amount_cents&redeemed_at=is.null').catch(() => []),
      sbGet('bookings', `customer_id=eq.${customerProfile.id}&select=*&order=scheduled_at.desc`),
      sbGet('booking_series', `customer_id=eq.${customerProfile.id}&select=id,status,booking_kind,frequency_type,days_of_week,time_of_day,window_end_time,start_date,end_date,locked_price_cents,service_id`).catch(() => []),
      sbGet('reviews', `customer_id=eq.${customerProfile.id}&select=booking_id`).catch(() => []),
      sbGet('pets', `customer_id=eq.${customerProfile.id}&is_active=eq.true&select=*`).catch(() => []),
    ]);
    myCredits = creditsRows;
    seriesById = {};
    seriesRows.forEach(s => { seriesById[s.id] = s; });
    const reviewedBookingIds = new Set(myReviews.map(r => r.booking_id));
    pets = myPets;

    if (rawBookings.length) {
      const provIds = [...new Set(rawBookings.map(b => b.provider_id).filter(Boolean))];
      const svcIds = [...new Set(rawBookings.map(b => b.service_id).filter(Boolean))];
      const bookingIds = rawBookings.map(b => b.id);
      const activeIds = rawBookings.filter(b => b.status === 'in_progress').map(b => b.id);

      const [provProfiles, bookingPets, svcs, sessions] = await Promise.all([
        provIds.length ? sbGet('provider_profiles', `id=in.(${provIds.join(',')})&select=id,user_id`).catch(() => []) : [],
        sbGet('booking_pets', `booking_id=in.(${bookingIds.join(',')})&select=booking_id,pet_id`).catch(() => []),
        svcIds.length ? sbGet('provider_services', `id=in.(${svcIds.join(',')})&select=id,service_type`).catch(() => []) : [],
        activeIds.length ? sbGet('walk_sessions', `booking_id=in.(${activeIds.join(',')})&status=eq.active&select=booking_id`).catch(() => []) : [],
      ]);

      const provUserById = Object.fromEntries(provProfiles.map(p => [p.id, p.user_id]));
      const provUserIds = [...new Set(provProfiles.map(p => p.user_id).filter(Boolean))];
      const petIdsByBooking = {};
      bookingPets.forEach(r => { (petIdsByBooking[r.booking_id] = petIdsByBooking[r.booking_id] || []).push(r.pet_id); });
      const fallbackPetIds = rawBookings.filter(b => !(petIdsByBooking[b.id] || []).length && b.pet_id).map(b => b.pet_id);
      const allPetIds = [...new Set([...bookingPets.map(r => r.pet_id), ...fallbackPetIds].filter(Boolean))];

      const [provUsers, petRowsAll] = await Promise.all([
        provUserIds.length ? sbGet('users', `id=in.(${provUserIds.join(',')})&select=id,first_name,last_name`).catch(() => []) : [],
        allPetIds.length ? sbGet('pets', `id=in.(${allPetIds.join(',')})&select=id,name,breed`).catch(() => []) : [],
      ]);
      const nameByUser = Object.fromEntries(provUsers.map(u => [u.id, `${u.first_name} ${u.last_name}`]));
      const petById = Object.fromEntries(petRowsAll.map(p => [p.id, p]));
      const svcById = Object.fromEntries(svcs.map(s => [s.id, s.service_type]));
      const activeWalk = new Set(sessions.map(s => s.booking_id));

      rawBookings.forEach(b => {
        const pu = provUserById[b.provider_id];
        if (pu) { b._provider_user_id = pu; if (nameByUser[pu]) b._provider_name = nameByUser[pu]; }
        const petIds = (petIdsByBooking[b.id] || []).length ? petIdsByBooking[b.id] : (b.pet_id ? [b.pet_id] : []);
        const petRows = petIds.map(id => petById[id]).filter(Boolean);
        if (petRows.length) {
          b._pet_name = petRows.map(p => p.name).filter(Boolean).join(' + ');
          b._pet_breed = petRows.length === 1 ? petRows[0].breed : null;
        }
        if (svcById[b.service_id]) b._service_type = svcById[b.service_id];
        if (b.status === 'in_progress') b._has_active_walk = activeWalk.has(b.id);
        b._has_review = reviewedBookingIds.has(b.id);
      });
    }
    bookings = rawBookings;

    renderNav();
    renderCustomerHub();
    refreshMsgBadge();
    setInterval(refreshMsgBadge, 10000);
  } catch (e) {
    area.innerHTML = `<div class="login-prompt"><h2>Something went wrong</h2><p>${esc(e.message)}</p><a href="/login/">Try signing in again</a></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
