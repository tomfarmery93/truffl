<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Profile — Truffl Pets</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#FAF7F2; --warm-white:#FFFDF9; --sage:#8B9E7E; --sage-light:#C2D1B5;
    --sage-dark:#6B7E5E; --terracotta:#C4755B; --terracotta-light:#D4917B;
    --blush:#E8C4B8; --brown:#3D2B1F; --brown-muted:#8B7355;
    --text-primary:#3D2B1F; --text-secondary:#6B5B4E; --text-muted:#9B8B7E;
    --border:#E8E0D6; --border-focus:#C4755B;
    --error:#C0392B; --error-bg:#FDF0EE; --success:#5B8C5A; --success-bg:#EDF5ED;
    --warning:#C0862B; --warning-bg:#FEF3E2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;}

  .nav{position:sticky;top:0;z-index:100;background:var(--warm-white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{display:flex;align-items:center;text-decoration:none;}
  .nav-right{display:flex;align-items:center;gap:8px;}
  .nav-link{font-size:0.85rem;color:var(--text-secondary);text-decoration:none;transition:color 0.2s;}
  .nav-link:hover{color:var(--terracotta);}
  .nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;color:var(--brown);overflow:hidden;}
  .nav-avatar img{width:100%;height:100%;object-fit:cover;}
  .nav-name{font-size:0.85rem;font-weight:500;color:var(--text-primary);}
  .nav-msg{position:relative;display:inline-flex;align-items:center;color:var(--text-secondary);text-decoration:none;}
  .nav-msg:hover{color:var(--terracotta);}
  .nav-msg-badge{position:absolute;top:-6px;right:-7px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--terracotta);color:#fff;font-size:0.62rem;line-height:16px;text-align:center;font-weight:600;}
  .bc-msg-link{display:inline-flex;align-items:center;gap:5px;position:relative;}
  .bc-msg-badge{min-width:16px;height:16px;padding:0 5px;border-radius:999px;background:var(--terracotta);color:#fff;font-size:0.62rem;line-height:16px;text-align:center;font-weight:600;}

  .page-wrapper{max-width:560px;margin:0 auto;padding:1.5rem 1rem 4rem;}

  .welcome{margin-bottom:1.5rem;}
  .welcome h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.8rem;color:var(--brown);margin-bottom:4px;}
  .welcome p{color:var(--text-muted);font-size:0.9rem;}

  .tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
  .tab{padding:10px 18px;font-size:0.85rem;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
  .tab:hover{color:var(--text-secondary);}
  .tab.active{color:var(--terracotta);border-bottom-color:var(--terracotta);}
  .tab-content{display:none;}
  .tab-content.active{display:block;animation:fadeIn 0.25s ease;}

  .section-heading{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.1rem;color:var(--brown);margin-bottom:0.75rem;}

  /* Booking cards */
  .booking-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:0.75rem;}
  .bc-pet-name{font-size:0.95rem;font-weight:500;color:var(--text-primary);margin-bottom:2px;}
  .bc-meta{font-size:0.82rem;color:var(--text-secondary);margin-bottom:4px;}
  .bc-time{font-size:0.82rem;color:var(--text-muted);margin-bottom:8px;}

  .status-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;font-weight:600;padding:2px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.03em;}
  .badge-pending{background:var(--warning-bg);color:var(--warning);}
  .badge-confirmed{background:var(--success-bg);color:var(--success);}
  .badge-in-progress{background:var(--success-bg);color:var(--success);}
  .badge-completed{background:rgba(139,158,126,0.12);color:var(--sage-dark);}
  .badge-cancelled{background:var(--error-bg);color:var(--error);}
  .badge-pulse{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .bc-service{display:inline-block;font-size:0.75rem;padding:3px 10px;background:rgba(139,158,126,0.1);border-radius:20px;color:var(--sage-dark);margin-bottom:8px;}

  .bc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .btn-track{display:inline-block;padding:10px 18px;background:var(--terracotta);color:white;border-radius:10px;font-size:0.85rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
  .btn-track:hover{background:var(--terracotta-light);}
  .btn-ghost{padding:8px 14px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;transition:border-color 0.2s,color 0.2s;}
  .btn-ghost:hover{border-color:var(--text-muted);}
  .btn-ghost.danger{color:var(--error);}
  .btn-ghost.danger:hover{border-color:var(--error);}

  .cancel-confirm{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .cancel-confirm span{font-size:0.82rem;color:var(--text-secondary);}
  .cancel-confirm.series{flex-direction:column;align-items:flex-start;}
  .cancel-confirm-btns{display:flex;gap:8px;flex-wrap:wrap;}
  .recurring-tag{display:inline-block;font-size:0.6rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--sage-dark);background:var(--success-bg);padding:2px 8px;border-radius:20px;vertical-align:middle;}
  .btn-cancel-yes{padding:8px 14px;background:var(--error);color:white;border:none;border-radius:8px;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-cancel-yes:hover{opacity:0.9;}
  .btn-cancel-keep{padding:8px 14px;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;}

  /* Pet cards */
  .pet-card{background:var(--warm-white);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.75rem;}
  .pet-card-header{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .pet-name{font-size:0.95rem;font-weight:500;color:var(--text-primary);}
  .pet-meta{font-size:0.8rem;color:var(--text-muted);margin-top:2px;}
  .pet-actions{display:flex;gap:8px;flex-shrink:0;}
  .pet-edit-form{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}

  /* Inline form elements (pet forms + inline edits) */
  .inline-field{margin-bottom:10px;}
  .inline-field label{display:block;font-size:0.78rem;font-weight:500;color:var(--text-secondary);margin-bottom:4px;}
  .inline-field input,.inline-field select,.inline-field textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text-primary);background:var(--warm-white);outline:none;transition:border-color 0.2s;}
  .inline-field input:focus,.inline-field select:focus,.inline-field textarea:focus{border-color:var(--border-focus);}
  .inline-field textarea{resize:vertical;min-height:48px;line-height:1.4;}
  .inline-field .opt{color:var(--text-muted);font-weight:400;}
  .pet-form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .pet-form-row>*{min-width:0;}
  .pet-checkbox{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);margin-bottom:10px;cursor:pointer;user-select:none;}
  .pet-checkbox input{width:auto;accent-color:var(--terracotta);cursor:pointer;}
  /* Pet photo */
  .pet-avatar{width:44px;height:44px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--brown);flex-shrink:0;overflow:hidden;}
  .pet-avatar img{width:100%;height:100%;object-fit:cover;}
  .pet-card-id{display:flex;align-items:center;gap:12px;min-width:0;}
  .pet-photo-control{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .pet-photo-btn{padding:7px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;font-size:0.8rem;color:var(--text-secondary);cursor:pointer;font-family:'DM Sans',sans-serif;}
  .pet-photo-btn:hover{border-color:var(--terracotta);color:var(--terracotta);}
  .pet-upload-status{font-size:0.78rem;color:var(--text-muted);}
  .inline-form-actions{display:flex;gap:8px;margin-top:12px;}
  .btn-save{padding:8px 18px;background:var(--terracotta);color:white;border:none;border-radius:8px;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
  .btn-save:hover{background:var(--terracotta-light);}
  .btn-discard{padding:8px 14px;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;}

  .btn-add-pet{display:flex;align-items:center;gap:8px;padding:12px 16px;background:transparent;border:1.5px dashed var(--border);border-radius:12px;color:var(--text-muted);font-size:0.85rem;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
  .btn-add-pet:hover{border-color:var(--terracotta);color:var(--terracotta);}

  /* Avatar (user profile photo) */
  .avatar-section{display:flex;align-items:center;gap:18px;background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;}
  .avatar-large{width:72px;height:72px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--brown);overflow:hidden;flex-shrink:0;}
  .avatar-large img{width:100%;height:100%;object-fit:cover;}
  .avatar-meta{flex:1;}
  .avatar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .btn-photo{display:inline-block;padding:8px 16px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color 0.2s,color 0.2s;}
  .btn-photo:hover{border-color:var(--terracotta);color:var(--terracotta);}
  .photo-hint{font-size:0.75rem;color:var(--text-muted);margin-top:6px;}
  .uploading{font-size:0.78rem;color:var(--terracotta);}

  /* Details card */
  .details-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:0.75rem;}
  /* Validated details form */
  .field{margin-bottom:1rem;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:0.78rem;font-weight:500;color:var(--text-secondary);margin-bottom:5px;}
  .field input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--text-primary);background:var(--warm-white);outline:none;transition:border-color 0.2s;}
  .field input:focus{border-color:var(--border-focus);}
  .field input.invalid{border-color:var(--error);background:var(--error-bg);}
  .field .field-hint{font-size:0.74rem;color:var(--text-muted);margin-top:5px;}
  .field .field-error{font-size:0.74rem;color:var(--error);margin-top:5px;display:none;}
  .field .field-error.show{display:block;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-actions{display:flex;gap:10px;margin-top:1.25rem;}
  .pf-save{padding:11px 24px;background:var(--terracotta);color:white;border:none;border-radius:9px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
  .pf-save:hover{background:var(--terracotta-light);}
  .pf-save:disabled{opacity:0.6;cursor:default;}
  .pf-discard{padding:11px 18px;background:transparent;border:1px solid var(--border);color:var(--text-muted);border-radius:9px;font-size:0.88rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .pf-discard:hover{border-color:var(--text-muted);}

  .sign-out-btn{display:block;width:100%;padding:12px;background:transparent;border:1px solid var(--border);color:var(--error);border-radius:10px;font-size:0.88rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;margin-top:1.5rem;transition:border-color 0.2s;}
  .sign-out-btn:hover{border-color:var(--error);}

  .section-divider{margin:1.5rem 0;border:none;border-top:1px solid var(--border);}

  /* Empty state */
  .empty{text-align:center;padding:3rem 1rem;}
  .empty-emoji{font-size:2rem;margin-bottom:0.75rem;opacity:0.6;}
  .empty h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--brown);margin-bottom:0.5rem;}
  .empty p{font-size:0.88rem;color:var(--text-muted);margin-bottom:1.5rem;}
  .btn-primary{display:inline-block;padding:12px 28px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;}
  .btn-primary:hover{background:var(--terracotta-light);}

  .msg{padding:12px 16px;border-radius:10px;font-size:0.85rem;margin-bottom:1rem;display:none;line-height:1.5;}
  .msg.error{background:var(--error-bg);color:var(--error);display:block;}
  .msg.success{background:var(--success-bg);color:var(--success);display:block;}
  .msg.info{background:var(--warning-bg);color:var(--warning);display:block;}

  .login-prompt{text-align:center;padding:4rem 2rem;}
  .login-prompt h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--brown);margin-bottom:0.5rem;}
  .login-prompt p{color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;}
  .login-prompt a{display:inline-block;padding:12px 32px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  @media(max-width:600px){
    .page-wrapper{padding:1rem 0.75rem 3rem;}
    .nav{padding:0 1rem;}
    .btn-track{width:100%;text-align:center;}
    .nav-name{display:none;}
    .row-2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo" aria-label="Truffl Pets home">
    <svg width="150" height="48" viewBox="0 0 180 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="5.5" r="6" fill="none" stroke="#C4866A" stroke-width="2.5"/>
      <circle cx="20" cy="5.5" r="2.8" fill="#FFFDF9"/>
      <rect x="16.5" y="10.5" width="7" height="9" rx="3" fill="#C4866A"/>
      <circle cx="20" cy="33" r="20" fill="#C4866A"/>
      <circle cx="20" cy="33" r="15.5" fill="none" stroke="#B8795C" stroke-width="0.6" opacity="0.45"/>
      <line x1="7" y1="33" x2="33" y2="33" stroke="#FFFDF9" stroke-width="0.5" opacity="0.3"/>
      <text x="20" y="35.5" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" font-style="italic" font-weight="400" fill="#FFFDF9" text-anchor="middle" letter-spacing="-0.3">truffl</text>
      <text x="52" y="30" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-style="italic" font-weight="400" fill="#3D2B1F" letter-spacing="-0.5">truffl</text>
      <text x="52" y="50" font-family="'DM Sans', sans-serif" font-size="12" font-weight="600" fill="#B0A090" letter-spacing="4">PETS</text>

  <div class="nav-right" id="navRight"></div>
</nav>

<div class="page-wrapper">
  <div id="profileContent">
    <div style="text-align:center;padding:3rem;color:var(--text-muted);font-size:0.85rem;">Loading your profile…</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';

const SERVICE_LABELS = {
  dog_walking:'Dog walking', dog_sitting:'Dog sitting', dog_boarding:'Dog boarding',
  pet_sitting:'Other pet sitting'
};

let authToken = null, authUid = null;
let userData = null;          // row from users
let customerProfile = null;   // customer_profiles row (id, suburb) — customers only
let profileRow = null;        // role-specific profile row holding suburb
let profileTable = null;      // 'customer_profiles' | 'provider_profiles'
let bookings = [], pets = [];
let pendingCancelId = null, editingPetId = null, addingPet = false;
let addPetPhotoUrl = null;

const ALLOWED_PHOTO_TYPES = ['image/png', 'image/jpeg', 'image/webp'];
const MAX_PHOTO_BYTES = 5 * 1024 * 1024;
const PET_SEX_LABELS = { male: 'Male', female: 'Female' };

/* ── Supabase helpers ── */
function h(token) {
  const hd = { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  if (token) hd['Authorization'] = `Bearer ${token}`;
  return hd;
}
async function sbGet(t, p) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${p}`, { headers: h(authToken) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  return await r.json();
}
async function sbPatch(t, col, val, upd) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${col}=eq.${val}`, { method: 'PATCH', headers: { ...h(authToken), 'Prefer': 'return=representation' }, body: JSON.stringify(upd) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  const data = await r.json();
  if (Array.isArray(data) && data.length === 0) throw new Error("Couldn't save — you may not have permission, or the record no longer exists.");
  return data;
}
async function sbInsert(t, row) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}`, { method: 'POST', headers: { ...h(authToken), 'Prefer': 'return=representation' }, body: JSON.stringify(row) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  return await r.json();
}

function esc(s) {
  return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showMsg(t, type) {
  const el = document.getElementById('pageMsg');
  if (!el) return;
  el.textContent = t;
  el.className = `msg ${type}`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function clearMsg() {
  const el = document.getElementById('pageMsg');
  if (el) el.className = 'msg';
}
function initials(fn, ln) {
  return ((fn || '')[0] || '').toUpperCase() + ((ln || '')[0] || '').toUpperCase();
}

/* ── Pet helpers ── */
function petFormFields(idp, p = {}) {
  return `
    <div class="inline-field"><label>Name</label><input id="${idp}name" value="${esc(p.name || '')}" placeholder="e.g. Flick"></div>
    <div class="pet-form-row">
      <div class="inline-field"><label>Breed <span class="opt">(optional)</span></label><input id="${idp}breed" value="${esc(p.breed || '')}" placeholder="e.g. Springer Spaniel"></div>
      <div class="inline-field"><label>Sex <span class="opt">(optional)</span></label><select id="${idp}sex"><option value="">—</option><option value="male" ${p.sex === 'male' ? 'selected' : ''}>Male</option><option value="female" ${p.sex === 'female' ? 'selected' : ''}>Female</option></select></div>
    </div>
    <div class="pet-form-row">
      <div class="inline-field"><label>Age (years) <span class="opt">(optional)</span></label><input id="${idp}age" type="number" min="0" max="40" value="${p.age_years ?? ''}"></div>
      <div class="inline-field"><label>Weight (kg) <span class="opt">(optional)</span></label><input id="${idp}weight" type="number" min="0" max="120" step="0.1" value="${p.weight_kg ?? ''}"></div>
    </div>
    <label class="pet-checkbox"><input type="checkbox" id="${idp}desexed" ${p.is_desexed ? 'checked' : ''}> Desexed</label>
    <div class="inline-field"><label>Microchip no. <span class="opt">(optional)</span></label><input id="${idp}chip" value="${esc(p.microchip_no || '')}"></div>
    <div class="pet-form-row">

/* ── Booking helpers ── */
function formatScheduledAt(iso) {
  const d = new Date(iso);
  const weekday = d.toLocaleDateString('en-AU', { weekday: 'long' });
  const day = d.toLocaleDateString('en-AU', { day: 'numeric' });
  const month = d.toLocaleDateString('en-AU', { month: 'long' });
  const time = d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
  return `${weekday} ${day} ${month} · ${time}`;
}
function statusBadge(status) {
  if (status === 'in_progress') {
    return `<div style="margin-bottom:10px;"><span class="status-badge badge-in-progress"><span class="badge-pulse"></span>Walk in progress</span></div>`;
  }
  const map = {
    pending: ['badge-pending', 'Awaiting confirmation'],
    confirmed: ['badge-confirmed', 'Confirmed'],
    completed: ['badge-completed', 'Completed'],
    cancelled: ['badge-cancelled', 'Cancelled']
  };
  const [cls, label] = map[status] || ['', status];
  return `<div style="margin-bottom:10px;"><span class="status-badge ${cls}">${label}</span></div>`;
}
function actionButtons(b) {
  if (b.status === 'in_progress') {
    return b._has_active_walk
      ? `<a href="/track/?booking=${b.id}" class="btn-track">Track live walk →</a>`
      : `<a href="/track/?booking=${b.id}" class="btn-ghost">View walk</a>`;
  }
  if (b.status === 'confirmed') {
    if (pendingCancelId === b.id) return cancelConfirmHtml(b);
    return `<a href="/track/?booking=${b.id}" class="btn-ghost">View booking</a><button class="btn-ghost danger" onclick="showCancelConfirm('${b.id}')">Cancel</button>`;
  }
  if (b.status === 'pending') {
    if (pendingCancelId === b.id) return cancelConfirmHtml(b);
    return `<button class="btn-ghost danger" onclick="showCancelConfirm('${b.id}')">Cancel</button>`;
  }
  if (b.status === 'completed') {
    const reviewBtn = b._has_review
      ? `<a href="/review/?booking=${b.id}" class="btn-ghost">Edit review</a>`
      : `<a href="/review/?booking=${b.id}" class="btn-track">Leave a review</a>`;
    const viewWalk = `<a href="/track/?booking=${b.id}" class="btn-ghost">View walk</a>`;
    const bookAgain = b._provider_user_id ? `<a href="/book/?provider=${b._provider_user_id}" class="btn-ghost">Book again</a>` : '';
    return [reviewBtn, viewWalk, bookAgain].filter(Boolean).join('');
  }
  return '';
}
function cancelConfirmHtml(b) {
  if (b.series_id) {
    return `<div class="cancel-confirm series">
      <span>This is a recurring walk — what would you like to cancel?</span>
      <div class="cancel-confirm-btns">
        <button class="btn-cancel-yes" onclick="doCancelBooking('${b.id}')">Just this walk</button>
        <button class="btn-cancel-yes" onclick="doCancelSeries('${b.series_id}')">All future walks</button>
        <button class="btn-cancel-keep" onclick="dismissCancel()">Keep</button>
      </div>
    </div>`;
  }
  return `<div class="cancel-confirm"><span>Are you sure?</span><button class="btn-cancel-yes" onclick="doCancelBooking('${b.id}')">Yes, cancel</button><button class="btn-cancel-keep" onclick="dismissCancel()">Keep booking</button></div>`;
}
function bookingCardHtml(b) {
  const petLabel = esc(b._pet_name || 'Your pet') + (b._pet_breed ? ' · ' + esc(b._pet_breed) : '');
  const serviceLabel = SERVICE_LABELS[b._service_type] || esc(b._service_type) || 'Service';
  const provLabel = esc(b._provider_name || 'Your carer');
  let dateStr = '';
  if (b.scheduled_at) {
    if (b.window_end_at) {
      const d = new Date(b.scheduled_at);
      const day = d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
      const t1 = d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
      const t2 = new Date(b.window_end_at).toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
      dateStr = `${day} · ${b.duration_mins ? b.duration_mins + '-min · ' : ''}between ${t1}–${t2}`;
    } else {
      dateStr = formatScheduledAt(b.scheduled_at);
    }
  }
  const actions = actionButtons(b);
  const msgLink = `<a href="/messages/?booking=${b.id}" class="btn-ghost bc-msg-link">Message <span class="bc-msg-badge" id="cardbadge-${b.id}" style="display:none;">0</span></a>`;
  const recurringTag = b.series_id ? ' <span class="recurring-tag">Recurring</span>' : '';
  return `
    <div class="booking-card">
      <div class="bc-pet-name">${petLabel}${recurringTag}</div>
      <div class="bc-meta">${serviceLabel} · ${provLabel}</div>
      <div class="bc-time">${esc(dateStr)}</div>
      ${statusBadge(b.status)}
      <div class="bc-actions">${actions}${msgLink}</div>
    </div>
  `;
}

function validate() {
  let ok = true;
  const fn = document.getElementById('f-first').value.trim();
  const ln = document.getElementById('f-last').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  setFieldError('first', !fn, 'First name is required.');
  setFieldError('last', !ln, 'Last name is required.');
  setFieldError('email', !EMAIL_RE.test(email), 'Enter a valid email address.');
  setFieldError('phone', phone !== '' && !PHONE_RE.test(phone), 'Enter a valid phone number.');
  if (!fn || !ln) ok = false;
  if (!EMAIL_RE.test(email)) ok = false;
  if (phone !== '' && !PHONE_RE.test(phone)) ok = false;
  return ok;
}
function setFieldError(key, isError, text) {
  const input = document.getElementById('f-' + key);
  const err = document.getElementById('err-' + key);
  if (!input || !err) return;
  input.classList.toggle('invalid', isError);
  err.textContent = text || '';
  err.classList.toggle('show', isError);
}
async function updateAuthEmail(newEmail) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    method: 'PUT',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: newEmail })
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.msg || e.message || e.error_description || 'Could not update email.');
  }
  return await r.json();
}
async function saveProfile() {
  clearMsg();
  if (!validate()) { showMsg('Please fix the highlighted fields.', 'error'); return; }

  const fn = document.getElementById('f-first').value.trim();
  const ln = document.getElementById('f-last').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const suburb = document.getElementById('f-suburb').value.trim();

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const emailChanged = email.toLowerCase() !== (userData.email || '').toLowerCase();

  try {
    await sbPatch('users', 'id', authUid, { first_name: fn, last_name: ln, phone: phone || null });
    userData.first_name = fn; userData.last_name = ln; userData.phone = phone || null;

    if (profileRow) {
      await sbPatch(profileTable, 'user_id', authUid, { suburb: suburb || null });
      profileRow.suburb = suburb || null;
    }

    if (emailChanged) {
      await updateAuthEmail(email);
      try { await sbPatch('users', 'id', authUid, { email }); userData.email = email; } catch (e) { /* non-fatal */ }
    }

    renderAvatar();
    renderNav();

    if (emailChanged) {
      showMsg(`Saved. We've sent a confirmation link to ${email} — your login email will update once you confirm it.`, 'info');
    } else {
      showMsg('Your profile has been saved.', 'success');
    }
  } catch (e) {
    showMsg(e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Save changes';
  }
}
function resetDetails() {
  clearMsg();
  if (userData.role === 'provider') renderProviderProfile();
  else renderAccountTab();

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  clearMsg();
  if (!ALLOWED_PHOTO_TYPES.includes(file.type)) {
    showMsg('Please choose a JPG, PNG or WebP image.', 'error');
    input.value = ''; return;
  }
  if (file.size > MAX_PHOTO_BYTES) {
    showMsg('That image is over 5MB — please choose a smaller file.', 'error');
    input.value = ''; return;
  }
  const status = document.getElementById('uploadStatus');
  status.innerHTML = '<span class="uploading">Uploading…</span>';
  try {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${authUid}/avatar_${Date.now()}.${ext}`;
    const up = await fetch(`${SUPABASE_URL}/storage/v1/object/profile-photos/${path}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': file.type },
      body: file
    });
    if (!up.ok) {
      const e = await up.json().catch(() => ({}));
      throw new Error(e.message || e.error || 'Upload failed.');
    }
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/profile-photos/${path}`;
    await sbPatch('users', 'id', authUid, { avatar_url: publicUrl });
    userData.avatar_url = publicUrl;
    renderAvatar();
    renderNav();
    const lbl = document.getElementById('photoBtnLabel');
    if (lbl) lbl.textContent = 'Change photo';
    status.innerHTML = '';
    showMsg('Photo updated.', 'success');
  } catch (e) {
    status.innerHTML = '';
    showMsg(e.message, 'error');
  } finally {
    input.value = '';
  }
}

  ` : `
    <button class="btn-add-pet" onclick="showAddPet()" style="margin-top:0.5rem;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add a pet
    </button>
  `;

  area.innerHTML = `
    <div class="section-heading">Profile photo</div>
    ${avatarSectionHtml()}
    <hr class="section-divider">
    <div class="section-heading">My pets</div>
    ${petsHtml}
    ${addPetHtml}
    <hr class="section-divider">
    <div class="section-heading">My details</div>
    ${detailsFormHtml()}
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  `;
  renderAvatar();
}

/* ── Provider profile render ── */
function renderProviderProfile() {
  document.getElementById('profileContent').innerHTML = `
    <div class="welcome">
      <h1>Your profile</h1>
      <p>Manage your account details — visible to customers who book you.</p>
    </div>
    <div id="pageMsg" class="msg"></div>
    <div class="section-heading">Profile photo</div>
    ${avatarSectionHtml()}
    <hr class="section-divider">
    <div class="section-heading">My details</div>
    ${detailsFormHtml()}
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  `;
  renderAvatar();
}

/* ── Cancel flow ── */
function showCancelConfirm(id) { pendingCancelId = id; renderBookingsTab(); }
function dismissCancel() { pendingCancelId = null; renderBookingsTab(); }
async function doCancelBooking(id) {
  try {
    await sbPatch('bookings', 'id', id, { status: 'cancelled' });
    const b = bookings.find(x => x.id === id);
    if (b) b.status = 'cancelled';
    pendingCancelId = null;
    renderBookingsTab();
  } catch(e) { showMsg(e.message, 'error'); }
}
async function doCancelSeries(seriesId) {
  try {
    await sbPatch('booking_series', 'id', seriesId, { status: 'cancelled' });
    const now = Date.now();
    bookings.forEach(b => {
      if (b.series_id === seriesId && (b.status === 'pending' || b.status === 'confirmed') && new Date(b.scheduled_at).getTime() > now) {
        b.status = 'cancelled';
      }
    });
    pendingCancelId = null;
    renderBookingsTab();
    showMsg('Recurring schedule cancelled — upcoming walks were cancelled. Past walks are unchanged.', 'success');
  } catch(e) { showMsg(e.message, 'error'); }
}

/* ── Pet management ── */
function showPetEdit(id) { editingPetId = id; renderAccountTab(); }
function cancelPetEdit() { editingPetId = null; renderAccountTab(); }
async function savePet(id) {
  const fields = collectPetForm('pet-edit-' + id + '-');
  if (!fields.name) return showMsg('Pet name is required.', 'error');
  try {
    const saved = await sbPatch('pets', 'id', id, fields);
    const row = Array.isArray(saved) ? saved[0] : saved;
    const p = pets.find(x => x.id === id);
    if (p && row) Object.assign(p, row);
    editingPetId = null;
    clearMsg();
    renderAccountTab();
  } catch(e) { showMsg(e.message, 'error'); }
}
async function removePet(id) {
  try {
    await sbPatch('pets', 'id', id, { is_active: false });
    pets = pets.filter(p => p.id !== id);
    renderAccountTab();
  } catch(e) { showMsg(e.message, 'error'); }
}
function showAddPet() { addingPet = true; addPetPhotoUrl = null; renderAccountTab(); }
function cancelAddPet() { addingPet = false; addPetPhotoUrl = null; renderAccountTab(); }
async function submitAddPet() {
  const fields = collectPetForm('new-pet-');
  if (!fields.name) return showMsg('Pet name is required.', 'error');
  try {
    const result = await sbInsert('pets', {
      customer_id: customerProfile.id,
      species: 'dog',
      is_active: true,
      photo_url: addPetPhotoUrl || null,
      ...fields,
    });
    const newPet = Array.isArray(result) ? result[0] : result;
    if (newPet) pets.push(newPet);
    addingPet = false;
    addPetPhotoUrl = null;
    clearMsg();
    renderAccountTab();
  } catch(e) { showMsg(e.message, 'error'); }
}
async function uploadPetPhoto(input, petId) {
  const file = input.files && input.files[0];
  if (!file) return;
  clearMsg();
  const statusId = petId ? `pet-edit-photo-status-${petId}` : 'new-pet-photo-status';
  const status = document.getElementById(statusId);
  if (!ALLOWED_PHOTO_TYPES.includes(file.type)) { showMsg('Please choose a JPG, PNG or WebP image.', 'error'); input.value = ''; return; }
  if (file.size > MAX_PHOTO_BYTES) { showMsg('That image is over 5MB — please choose a smaller file.', 'error'); input.value = ''; return; }

  if (status) status.textContent = 'Uploading…';
  try {
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    const path = `${authUid}/pet_${Date.now()}.${ext}`;
    const up = await fetch(`${SUPABASE_URL}/storage/v1/object/profile-photos/${path}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${authToken}`, 'Content-Type': file.type },
      body: file
    });
    if (!up.ok) { const e = await up.json().catch(() => ({})); throw new Error(e.message || e.error || 'Upload failed.'); }
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/profile-photos/${path}`;

    if (petId) {
      await sbPatch('pets', 'id', petId, { photo_url: publicUrl });
      const p = pets.find(x => x.id === petId);
      if (p) p.photo_url = publicUrl;
    } else {
      addPetPhotoUrl = publicUrl;
    }
    const control = input.closest('.pet-photo-control');
    if (control) {
      const avatar = control.querySelector('.pet-avatar');
      if (avatar) avatar.innerHTML = `<img src="${esc(publicUrl)}" alt="">`;
      const btn = control.querySelector('.pet-photo-btn');
      if (btn) btn.textContent = 'Change photo';
    }
    if (status) status.textContent = '';
  } catch(e) {
    if (status) status.textContent = '';
    showMsg(e.message, 'error');
  } finally {
    input.value = '';
  }
}

function signOut() {
  localStorage.removeItem('truffl_session');
  window.location.href = '/';
}

/* ── Unread message badges (customer header + per-booking-card) ── */
async function refreshMsgBadge() {
  if (!authToken || !authUid) return;
  try {
    const rows = await sbGet('messages', `sender_id=neq.${authUid}&read_at=is.null&select=id,booking_id`);
    const badge = document.getElementById('navMsgBadge');
    if (badge) { badge.textContent = rows.length > 9 ? '9+' : String(rows.length); badge.style.display = rows.length > 0 ? '' : 'none'; }
    const byBooking = {};
    rows.forEach(r => { byBooking[r.booking_id] = (byBooking[r.booking_id] || 0) + 1; });
    document.querySelectorAll('[id^="cardbadge-"]').forEach(el => {
      const id = el.id.slice('cardbadge-'.length);
      const n = byBooking[id] || 0;
      el.textContent = n > 9 ? '9+' : String(n);
      el.style.display = n > 0 ? '' : 'none';
    });
  } catch (e) { /* non-fatal */ }
}

/* ── Init ── */
async function init() {
  const area = document.getElementById('profileContent');
  const stored = localStorage.getItem('truffl_session');
  if (stored) { try { const s = JSON.parse(stored); authToken = s.access_token; authUid = s.user_id; } catch (e) {} }

  if (!authToken) {
    area.innerHTML = `<div class="login-prompt"><h2>Sign in required</h2><p>You need to be logged in to manage your profile.</p><a href="/login/?redirect=/profile/">Sign in</a></div>`;
    return;
  }

  try {
    const users = await sbGet('users', `id=eq.${authUid}&select=first_name,last_name,email,phone,avatar_url,role`);
    if (!users.length) { signOut(); return; }
    userData = users[0];

    if (userData.role === 'provider') {
      profileTable = 'provider_profiles';
      const profiles = await sbGet('provider_profiles', `user_id=eq.${authUid}&select=id,suburb`);
      profileRow = profiles.length ? profiles[0] : null;
      renderNav();
      renderProviderProfile();
      return;
    }

    // Customer
    profileTable = 'customer_profiles';
    const profiles = await sbGet('customer_profiles', `user_id=eq.${authUid}&select=id,suburb`);
    if (!profiles.length) {
      area.innerHTML = `<div class="login-prompt"><h2>Profile not set up</h2><p>Your customer profile isn't set up yet.</p><a href="/login/">Complete registration</a></div>`;
      return;
    }
    customerProfile = profiles[0];
    profileRow = profiles[0];

    const rawBookings = await sbGet('bookings', `customer_id=eq.${customerProfile.id}&select=*&order=scheduled_at.desc`);

    let reviewedBookingIds = new Set();
    try {
      const myReviews = await sbGet('reviews', `customer_id=eq.${customerProfile.id}&select=booking_id`);
      reviewedBookingIds = new Set(myReviews.map(r => r.booking_id));
    } catch(e) { /* none reviewed */ }

    for (const b of rawBookings) {
      try {
        const provProfiles = await sbGet('provider_profiles', `id=eq.${b.provider_id}&select=user_id`);
        if (provProfiles.length) {
          b._provider_user_id = provProfiles[0].user_id;
          const pUsers = await sbGet('users', `id=eq.${provProfiles[0].user_id}&select=first_name,last_name`);
          if (pUsers.length) b._provider_name = `${pUsers[0].first_name} ${pUsers[0].last_name}`;
        }
        let petRows = [];
        try {
          const bp = await sbGet('booking_pets', `booking_id=eq.${b.id}&select=pet_id`);
          const ids = bp.map(r => r.pet_id).filter(Boolean);
          if (ids.length) petRows = await sbGet('pets', `id=in.(${ids.join(',')})&select=name,breed`);
        } catch(e) {}
        if (!petRows.length && b.pet_id) petRows = await sbGet('pets', `id=eq.${b.pet_id}&select=name,breed`);
        if (petRows.length) {
          b._pet_name = petRows.map(p => p.name).filter(Boolean).join(' + ');
          b._pet_breed = petRows.length === 1 ? petRows[0].breed : null;
        }
        const svcs = await sbGet('provider_services', `id=eq.${b.service_id}&select=service_type`);
        if (svcs.length) b._service_type = svcs[0].service_type;
        if (b.status === 'in_progress') {
          const sessions = await sbGet('walk_sessions', `booking_id=eq.${b.id}&status=eq.active&select=id&limit=1`);
          b._has_active_walk = sessions.length > 0;
        }
        b._has_review = reviewedBookingIds.has(b.id);
      } catch(e) {}
    }
    bookings = rawBookings;

    pets = await sbGet('pets', `customer_id=eq.${customerProfile.id}&is_active=eq.true&select=*`);

    renderNav();
    renderCustomerHub();
    refreshMsgBadge();
    setInterval(refreshMsgBadge, 10000);
  } catch (e) {
    area.innerHTML = `<div class="login-prompt"><h2>Something went wrong</h2><p>${esc(e.message)}</p><a href="/login/">Try signing in again</a></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
