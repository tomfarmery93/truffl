<body>
<div>Taking you to your account…</div>
<script>
/* TRU-76: /my has been folded into /profile (role-aware hub).
   Redirect customers to /profile, providers to their dashboard.
   The file is kept so old links/bookmarks don't 404. */
(function () {
  const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';

  function go(url) { window.location.replace(url); }

  let token = null, uid = null;
  try {
    const s = JSON.parse(localStorage.getItem('truffl_session') || '{}');
    token = s.access_token; uid = s.user_id;
    // If the stored session already knows the role, redirect immediately.
    if (s.role === 'provider') return go('/dashboard/');
    if (s.role === 'customer') return go('/profile/');
  } catch (e) {}

  if (!token || !uid) { return go('/profile/'); }

  // Fall back to looking up the role when it isn't in the stored session.
  fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${uid}&select=role`, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` }
  })
    .then(r => r.ok ? r.json() : [])
    .then(rows => go(rows[0] && rows[0].role === 'provider' ? '/dashboard/' : '/profile/'))
    .catch(() => go('/profile/'));
})();
</script>
