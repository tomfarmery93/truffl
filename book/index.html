<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Carer — Truffl Pets</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2; --warm-white: #FFFDF9; --sage: #8B9E7E; --sage-light: #C2D1B5;
    --sage-dark: #6B7E5E; --terracotta: #C4755B; --terracotta-light: #D4917B;
    --blush: #E8C4B8; --brown: #3D2B1F; --brown-light: #5C4033; --brown-muted: #8B7355;
    --text-primary: #3D2B1F; --text-secondary: #6B5B4E; --text-muted: #9B8B7E;
    --border: #E8E0D6; --border-focus: #C4755B;
    --error: #C0392B; --error-bg: #FDF0EE; --success: #5B8C5A; --success-bg: #EDF5ED;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  .nav {
    position: sticky; top: 0; z-index: 100; background: var(--warm-white);
    border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-back { font-size: 0.85rem; color: var(--text-secondary); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .nav-back:hover { color: var(--terracotta); }
  .nav-right { display: flex; align-items: center; gap: 18px; }
  .nav-msg { position: relative; display: inline-flex; align-items: center; color: var(--text-secondary); }
  .nav-msg:hover { color: var(--terracotta); }
  .nav-msg-badge { position: absolute; top: -6px; right: -7px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px; background: var(--terracotta); color: #fff; font-size: 0.62rem; line-height: 16px; text-align: center; font-weight: 600; }

  .page-wrapper { max-width: 560px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
  .page-header { text-align: center; margin-bottom: 2rem; }
  .page-header h1 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 2rem; color: var(--brown); margin-bottom: 0.4rem; }
  .page-header p { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.6; }

  .form-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
  .form-card h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 1.3rem; color: var(--brown); margin-bottom: 0.4rem; }
  .form-card > p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1.5rem; line-height: 1.5; }

  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
  .field label .optional { color: var(--text-muted); font-weight: 400; font-size: 0.78rem; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text-primary);
    background: var(--warm-white); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(196,117,91,0.12); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  /* Recurring controls */
  .seg { display: flex; padding: 3px; background: var(--cream); border: 1px solid var(--border); border-radius: 999px; margin-bottom: 14px; }
  .seg button { flex: 1; border: 0; background: transparent; padding: 8px 10px; font-size: 0.82rem; font-family: 'DM Sans', sans-serif; color: var(--text-muted); border-radius: 999px; cursor: pointer; font-weight: 500; transition: all .18s; }
  .seg button.active { background: var(--warm-white); color: var(--brown); box-shadow: 0 1px 3px rgba(61,43,31,0.08); }
  .freq-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .freq-chip { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--warm-white); font-size: 0.84rem; color: var(--text-secondary); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .18s; }
  .freq-chip.active { background: var(--blush); border-color: var(--terracotta); color: var(--brown); font-weight: 500; }
  .len-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .len-chip { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--warm-white); font-size: 0.84rem; color: var(--text-secondary); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .18s; }
  .len-chip:hover { border-color: var(--sage-light); }
  .len-chip.active { background: var(--blush); border-color: var(--terracotta); color: var(--brown); font-weight: 500; }
  /* Dual-handle time-window slider */
  .win-wrap { position: relative; height: 34px; margin: 8px 2px 2px; }
  .win-track { position: absolute; top: 15px; left: 0; right: 0; height: 4px; background: var(--border); border-radius: 2px; }
  .win-fill { position: absolute; top: 15px; height: 4px; background: var(--terracotta); border-radius: 2px; }
  .win-wrap input[type=range] { position: absolute; top: 0; left: 0; width: 100%; height: 34px; margin: 0; background: none; pointer-events: none; -webkit-appearance: none; appearance: none; }
  .win-wrap input[type=range]:focus { outline: none; }
  .win-wrap input[type=range]::-webkit-slider-thumb { pointer-events: auto; -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 2px solid var(--terracotta); cursor: pointer; margin-top: 7px; box-shadow: 0 1px 3px rgba(61,43,31,0.2); }
  .win-wrap input[type=range]::-moz-range-thumb { pointer-events: auto; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 2px solid var(--terracotta); cursor: pointer; }
  .win-wrap input[type=range]::-webkit-slider-runnable-track { background: none; }
  .win-label { font-size: 0.85rem; color: var(--text-secondary); }
  .win-label b { color: var(--text-primary); font-weight: 600; }
  .days-row { display: flex; gap: 6px; margin-bottom: 14px; }
  .day-btn { flex: 1; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid var(--border); background: var(--warm-white); color: var(--text-secondary); font-size: 0.78rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .18s; }
  .day-btn.active { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
  .end-row { display: flex; gap: 16px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .end-opt { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; }
  .end-opt input { accent-color: var(--terracotta); }
  .preview-box { background: var(--cream); border-radius: 10px; padding: 12px 14px; margin-top: 8px; }
  .preview-title { font-size: 0.72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .preview-item { font-size: 0.84rem; color: var(--text-secondary); padding: 3px 0; display: flex; align-items: center; gap: 8px; }
  .preview-item svg { color: var(--sage-dark); flex-shrink: 0; }
  .field-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

  .btn-row { display: flex; gap: 12px; margin-top: 1.5rem; }
  .btn { padding: 12px 28px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; outline: none; }
  .btn-primary { background: var(--terracotta); color: white; flex: 1; }
  .btn-primary:hover { background: var(--terracotta-light); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--text-muted); }

  .msg { padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 1.25rem; display: none; line-height: 1.5; }
  .msg.error { background: var(--error-bg); color: var(--error); display: block; }
  .msg.success { background: var(--success-bg); color: var(--success); display: block; }

  .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Provider summary card at top */
  .provider-summary {
    display: flex; align-items: center; gap: 14px; padding: 16px;
    background: var(--cream); border-radius: 12px; margin-bottom: 1.5rem;
  }
  .ps-avatar {
    width: 48px; height: 48px; border-radius: 50%; background: var(--blush);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; color: var(--brown); flex-shrink: 0;
  }
  .ps-name { font-size: 0.95rem; font-weight: 500; color: var(--text-primary); }
  .ps-suburb { font-size: 0.8rem; color: var(--text-muted); }
  .ps-verified {
    display: inline-flex; align-items: center; gap: 3px; font-size: 0.7rem; font-weight: 600;
    color: var(--sage-dark); background: var(--success-bg); padding: 2px 8px; border-radius: 20px; margin-left: 6px;
  }

  /* Service selection cards */
  .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .service-option {
    padding: 14px 12px; border: 2px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s; user-select: none; text-align: center;
  }
  .service-option:hover { border-color: var(--sage-light); }
  .service-option.selected { border-color: var(--terracotta); background: rgba(196,117,91,0.05); }
  .service-option .svc-name { font-size: 0.85rem; font-weight: 500; color: var(--text-primary); }
  .service-option input { display: none; }

  /* Pet selection cards */
  .pet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pet-option {
    padding: 14px 12px; border: 2px solid var(--border); border-radius: 12px;
    cursor: pointer; transition: all 0.2s; user-select: none;
    display: flex; align-items: center; gap: 10px;
  }
  .pet-option:hover { border-color: var(--sage-light); }
  .pet-option.selected { border-color: var(--terracotta); background: rgba(196,117,91,0.05); }
  .pet-option .pet-icon { display: inline-flex; color: var(--terracotta); }
  .pet-option .pet-icon svg { width: 22px; height: 22px; display: block; }
  .pet-option .pet-name { font-size: 0.88rem; font-weight: 500; color: var(--text-primary); }
  .pet-option .pet-breed { font-size: 0.75rem; color: var(--text-muted); }
  .pet-option input { display: none; }

  /* Success */
  .success-card { text-align: center; padding: 3rem 2rem; }
  .success-icon { width: 64px; height: 64px; background: var(--success-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .success-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 500; color: var(--brown); margin-bottom: 0.75rem; }
  .success-card p { color: var(--text-secondary); font-size: 0.92rem; line-height: 1.6; max-width: 400px; margin: 0 auto; }

  /* Login prompt */
  .login-prompt { text-align: center; padding: 3rem 2rem; }
  .login-prompt h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--brown); margin-bottom: 0.5rem; }
  .login-prompt p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .login-prompt a {
    display: inline-block; padding: 12px 32px; background: var(--terracotta); color: white;
    border-radius: 10px; font-weight: 500; text-decoration: none; transition: all 0.2s;
  }
  .login-prompt a:hover { background: var(--terracotta-light); }

  @media (max-width: 600px) {
    .page-wrapper { padding: 1.5rem 1rem 3rem; }
    .form-card { padding: 1.5rem; }
    .field-row { grid-template-columns: 1fr; }
    .service-grid { grid-template-columns: 1fr; }
    .pet-grid { grid-template-columns: 1fr; }
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
</style>
</head>

<div class="page-wrapper">
  <div id="formMsg" class="msg"></div>
  <div id="bookingContent">
    <div style="text-align:center;padding:3rem;"><div style="display:inline-flex;gap:6px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--terracotta);animation:bounce 1.2s infinite;"></span><span style="width:8px;height:8px;border-radius:50%;background:var(--terracotta);animation:bounce 1.2s infinite 0.15s;"></span><span style="width:8px;height:8px;border-radius:50%;background:var(--terracotta);animation:bounce 1.2s infinite 0.3s;"></span></div><div style="margin-top:1rem;font-size:0.85rem;color:var(--text-muted);">Loading...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';

const SERVICE_LABELS = {
  dog_walking: 'Dog walking', dog_sitting: 'Dog sitting', dog_boarding: 'Dog boarding',
  pet_sitting: 'Other pet sitting'
};

const MULTI_DAY_SERVICES = ['dog_boarding', 'dog_sitting'];

const PAW_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="8" cy="8" rx="1.5" ry="2"/><ellipse cx="16" cy="8" rx="1.5" ry="2"/><ellipse cx="5" cy="13" rx="1.3" ry="1.6"/><ellipse cx="19" cy="13" rx="1.3" ry="1.6"/><path d="M8.5 17.5c0-2.2 1.6-3.5 3.5-3.5s3.5 1.3 3.5 3.5-1.6 3-3.5 3-3.5-.8-3.5-3z"/></svg>';
const CAT_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l1-3 3 2.5M19 8l-1-3-3 2.5"/><path d="M5 8c-.5 2-.5 4 0 6 1 3 4 5 7 5s6-2 7-5c.5-2 .5-4 0-6"/><path d="M10 13h.01M14 13h.01M11 16c.5.4 1.5.4 2 0"/></svg>';
const SPECIES_ICONS = { dog: PAW_SVG, cat: CAT_SVG, other: PAW_SVG };

let authToken = null, authUid = null;
let providerData = null, providerProfile = null, providerServices = [];
let customerProfile = null, customerPets = [];
let selectedServiceId = null, selectedPetIds = [];

let bookingMode = 'oneoff'; // 'oneoff' | 'recurring'
let selectedSvcType = null;
const DAY_DEFS = [{ n: 1, l: 'M' }, { n: 2, l: 'T' }, { n: 3, l: 'W' }, { n: 4, l: 'T' }, { n: 5, l: 'F' }, { n: 6, l: 'S' }, { n: 7, l: 'S' }];
const DAY_FULL = { 1: 'Mon', 2: 'Tue', 3: 'Wed', 4: 'Thu', 5: 'Fri', 6: 'Sat', 7: 'Sun' };
const recurring = { frequency: 'weekdays', days: [], startDate: '', endMode: 'ongoing', endDate: '' };
function recurringAllowed(svcType) { return !MULTI_DAY_SERVICES.includes(svcType); }

/* Time window — a "between X and Y" range the carer fits the walk into.
   Slider works in 30-min indices over 6:00am–9:00pm. */
const WIN_MIN = 12, WIN_MAX = 42; // 6:00 .. 21:00 in half-hours
const win = { start: 18, end: 24 }; // default 9:00am–12:00pm
function idxToHHMM(i) { return String(Math.floor(i / 2)).padStart(2, '0') + ':' + ((i % 2) ? '30' : '00'); }
function idxToLabel(i) { const h = Math.floor(i / 2), m = (i % 2) ? 30 : 0; return ((h % 12) || 12) + ':' + String(m).padStart(2, '0') + ' ' + (h < 12 ? 'AM' : 'PM'); }
function durationsForType(svcType) {
  return providerServices.filter(s => s.service_type === svcType && s.is_available !== false)
    .sort((a, b) => (a.duration_mins || 0) - (b.duration_mins || 0));
}
function selectedDurationMins() {
  const svc = providerServices.find(s => s.id === selectedServiceId);
  return svc ? svc.duration_mins : null;
}
function minWindowIdx() { const d = selectedDurationMins(); return d ? Math.ceil(d / 30) : 1; } // window must fit the walk

function headers(token) {
  const h = { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  if (token) h['Authorization'] = `Bearer ${token}`;
  return h;
}

async function sbGet(table, params, token) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: headers(token) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Query failed'); }
  return await r.json();
}

async function sbInsert(table, row, token) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST', headers: { ...headers(token), 'Prefer': 'return=representation' }, body: JSON.stringify(row)
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Insert failed'); }
  return await r.json();
}

function showMsg(t, type) { const el = document.getElementById('formMsg'); el.textContent = t; el.className = `msg ${type}`; }
function clearMsg() { document.getElementById('formMsg').className = 'msg'; }
function setLoading(btn, on) {
  if (on) { btn.disabled = true; btn._t = btn.textContent; btn.innerHTML = '<span class="spinner"></span>Submitting...'; }
  else { btn.disabled = false; btn.textContent = btn._t || 'Submit'; }
}

function selectService(el, serviceId) {
  document.querySelectorAll('.service-option').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  selectedSvcType = el.querySelector('input')?.dataset.svcType;
  // Default to the first (shortest) duration the carer offers for this type.
  const durs = durationsForType(selectedSvcType);
  selectedServiceId = durs.length ? durs[0].id : serviceId;
  if (!recurringAllowed(selectedSvcType)) bookingMode = 'oneoff'; // boarding/sitting are one-off multi-day
  document.getElementById('whenSection').innerHTML = renderWhenSection(selectedSvcType);
  updateWindowUI();
  const sb = document.getElementById('submitBtn');
  if (sb) sb.textContent = (bookingMode === 'recurring') ? 'Request recurring schedule' : 'Send booking request';
  if (bookingMode === 'recurring') renderPreview();
  renderPriceEstimate();
}

/* Walk-length picker (provider's offered durations, each priced). Only shown
   when a service type has more than one duration. */
function renderLengthPicker(svcType) {
  const durs = durationsForType(svcType);
  if (durs.length <= 1) return '';
  return `
    <div class="field" style="margin-bottom:14px;">
      <label>Walk length</label>
      <div class="len-row">
        ${durs.map(d => `<button type="button" class="len-chip ${d.id === selectedServiceId ? 'active' : ''}" onclick="selectLength('${d.id}')">${d.duration_mins} min${d.price_cents != null ? ` · ${fmtPrice(d.price_cents)}` : ''}</button>`).join('')}
      </div>
    </div>`;
}
function selectLength(id) {
  selectedServiceId = id;
  document.querySelectorAll('.len-chip').forEach(c => c.classList.toggle('active', c.getAttribute('onclick').includes(id)));
  // ensure the window still fits the (possibly longer) walk
  if (win.end - win.start < minWindowIdx()) win.end = Math.min(WIN_MAX, win.start + minWindowIdx());
  updateWindowUI();
  renderPriceEstimate();
  if (bookingMode === 'recurring') renderPreview();
}

/* Dual-handle window slider. */
function renderWindowSlider() {
  return `
    <div class="field" style="margin-bottom:6px;">
      <label>Preferred time window</label>
      <div class="win-wrap" id="winWrap">
        <div class="win-track"></div>
        <div class="win-fill" id="winFill"></div>
        <input type="range" id="winStart" min="${WIN_MIN}" max="${WIN_MAX}" step="1" value="${win.start}" oninput="onWinInput('start')">
        <input type="range" id="winEnd" min="${WIN_MIN}" max="${WIN_MAX}" step="1" value="${win.end}" oninput="onWinInput('end')">
      </div>
      <div class="win-label">Between <b id="winStartLbl">${idxToLabel(win.start)}</b> and <b id="winEndLbl">${idxToLabel(win.end)}</b></div>
    </div>`;
}
function onWinInput(which) {
  const sEl = document.getElementById('winStart'), eEl = document.getElementById('winEnd');
  let s = parseInt(sEl.value, 10), e = parseInt(eEl.value, 10);
  const gap = minWindowIdx();
  if (which === 'start') { if (s > e - gap) { s = Math.max(WIN_MIN, e - gap); sEl.value = s; } }
  else { if (e < s + gap) { e = Math.min(WIN_MAX, s + gap); eEl.value = e; } }
  win.start = s; win.end = e;
  updateWindowUI();
  if (bookingMode === 'recurring') renderPreview();
}
function updateWindowUI() {
  const sEl = document.getElementById('winStart'), eEl = document.getElementById('winEnd');
  if (sEl) sEl.value = win.start;
  if (eEl) eEl.value = win.end;
  const sl = document.getElementById('winStartLbl'), el = document.getElementById('winEndLbl');
  if (sl) sl.textContent = idxToLabel(win.start);
  if (el) el.textContent = idxToLabel(win.end);
  const fill = document.getElementById('winFill');
  if (fill) {
    const range = WIN_MAX - WIN_MIN;
    fill.style.left = ((win.start - WIN_MIN) / range * 100) + '%';
    fill.style.width = ((win.end - win.start) / range * 100) + '%';
  }
}

function fmtPrice(cents) {
  const n = cents / 100;
  return '$' + (Number.isInteger(n) ? n : n.toFixed(2));
}

/* Informational price estimate (paid directly to the carer). Includes the
   per-extra-pet fee. Platform charging stays $0 during launch. */
function renderPriceEstimate() {
  const el = document.getElementById('priceEstimate');
  if (!el) return;
  const svc = providerServices.find(s => s.id === selectedServiceId);
  const n = selectedPetIds.length || 1;
  if (!svc || svc.price_cents == null) { el.innerHTML = ''; return; }

  const base = svc.price_cents;
  const extraFee = svc.additional_pet_price_cents || 0;
  const extraPets = Math.max(0, n - 1);
  const total = base + extraPets * extraFee;
  const unit = MULTI_DAY_SERVICES.includes(svc.service_type) ? ' / night'
    : (svc.duration_mins ? ` / ${svc.duration_mins}-min visit` : ' / visit');

  let breakdown = '';
  if (extraPets > 0 && extraFee > 0) {
    breakdown = `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">${fmtPrice(base)} base + ${fmtPrice(extraFee)} × ${extraPets} extra pet${extraPets > 1 ? 's' : ''}</div>`;
  } else if (extraPets > 0) {
    breakdown = `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">${n} pets · no extra-pet fee</div>`;
  }

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:0.85rem;color:var(--text-secondary);">Estimated price${unit}</span>
      <span style="font-size:0.95rem;font-weight:600;color:var(--text-primary);">${fmtPrice(total)}</span>
    </div>
    ${breakdown}
    <div style="border-top:1px solid var(--border);margin:10px 0;"></div>
  `;
}

function renderDateFields(isMultiDay) {
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const defaultDate = tomorrow.toISOString().split('T')[0];
  if (isMultiDay) {
    const dayAfter = new Date();
    dayAfter.setDate(dayAfter.getDate() + 2);
    const defaultEnd = dayAfter.toISOString().split('T')[0];
    return `
      <div class="field-row">
        <div class="field">
          <label>Check-in date</label>
          <input type="date" id="bookDate" value="${defaultDate}" min="${defaultDate}">
        </div>
        <div class="field">
          <label>Check-out date</label>
          <input type="date" id="bookDateEnd" value="${defaultEnd}" min="${defaultDate}">
        </div>
      </div>
    `;
  }
  return `
    <div class="field" style="margin-bottom:14px;">
      <label>Date</label>
      <input type="date" id="bookDate" value="${defaultDate}" min="${defaultDate}">
    </div>
    ${renderLengthPicker(selectedSvcType)}

function onPetToggle(input) {
  const petId = input.value;
  const i = selectedPetIds.indexOf(petId);
  if (input.checked && i < 0) selectedPetIds.push(petId);
  else if (!input.checked && i >= 0) selectedPetIds.splice(i, 1);
  const opt = input.closest('.pet-option');
  if (opt) opt.classList.toggle('selected', input.checked);
  renderPriceEstimate();
}

function timeOptionsHtml(selected) {
  let out = '';
  for (let h = 6; h <= 20; h++) {
    for (const m of [0, 30]) {
      const v = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      const disp = ((h % 12) || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h < 12 ? 'AM' : 'PM');
      out += `<option value="${v}" ${selected === v ? 'selected' : ''}>${disp}</option>`;
    }

  return out;

function renderWhenSection(svcType) {

  return `

      <div class="seg" id="modeSeg">

        <button type="button" class="${bookingMode === 'recurring' ? 'active' : ''}" onclick="setMode('recurring')">Recurring</button>

  bookingMode = m;
  document.querySelectorAll('#modeSeg button').forEach((b, i) => b.classList.toggle('active', (i === 0) === (m === 'oneoff')));
  document.getElementById('whenBody').innerHTML = (m === 'recurring') ? renderRecurringFields() : renderDateFields(false);

function renderRecurringFields() {
  if (!recurring.startDate) { const t = new Date(); t.setDate(t.getDate() + 1); recurring.startDate = t.toISOString().split('T')[0]; }
  const today = new Date().toISOString().split('T')[0];
  const freqs = [['weekdays', 'Weekdays'], ['daily', 'Every day'], ['specific_days', 'Specific days']];
  return `
    <div class="freq-row">

    </div>
    ${recurring.frequency === 'specific_days' ? `<div class="days-row">${DAY_DEFS.map(d => `<button type="button" class="day-btn ${recurring.days.includes(d.n) ? 'active' : ''}" onclick="toggleDay(${d.n})">${d.l}</button>`).join('')}</div>` : ''}
    <div class="field" style="margin-bottom:14px;"><label>Start date</label><input type="date" id="recStart" value="${recurring.startDate}" min="${today}" onchange="recurring.startDate=this.value;renderPreview()"></div>

        <label class="end-opt"><input type="radio" name="endMode" ${recurring.endMode === 'ongoing' ? 'checked' : ''} onchange="setEndMode('ongoing')"> Ongoing</label>
        <label class="end-opt"><input type="radio" name="endMode" ${recurring.endMode === 'until' ? 'checked' : ''} onchange="setEndMode('until')"> Until a date</label>
        ${recurring.endMode === 'until' ? `<input type="date" id="recEnd" value="${recurring.endDate}" min="${recurring.startDate}" onchange="recurring.endDate=this.value;renderPreview()" style="max-width:170px;">` : ''}
      </div>
    </div>
    <div class="preview-box"><div class="preview-title">Upcoming walks</div><div id="recPreview"></div></div>`;
}

function setFrequency(f) { recurring.frequency = f; document.getElementById('whenBody').innerHTML = renderRecurringFields(); updateWindowUI(); renderPreview(); }
function toggleDay(n) {
  const i = recurring.days.indexOf(n);
  if (i >= 0) recurring.days.splice(i, 1); else recurring.days.push(n);
  document.querySelectorAll('.day-btn').forEach((b, idx) => b.classList.toggle('active', recurring.days.includes(DAY_DEFS[idx].n)));
  renderPreview();
}
function setEndMode(m) { recurring.endMode = m; document.getElementById('whenBody').innerHTML = renderRecurringFields(); updateWindowUI(); renderPreview(); }

function computeUpcomingDates(limit) {
  const out = [];
  if (!recurring.startDate) return out;
  let d = new Date(recurring.startDate + 'T00:00:00');
  const today = new Date(); today.setHours(0, 0, 0, 0);
  if (d < today) d = today;
  const end = (recurring.endMode === 'until' && recurring.endDate) ? new Date(recurring.endDate + 'T00:00:00') : null;
  let guard = 0;
  while (out.length < limit && guard < 500) {
    guard++;
    if (end && d > end) break;
    const dow = ((d.getDay() + 6) % 7) + 1; // JS 0=Sun..6=Sat → isodow 1=Mon..7=Sun
    const want = recurring.frequency === 'daily' ? true
      : recurring.frequency === 'weekdays' ? (dow >= 1 && dow <= 5)
      : recurring.days.includes(dow);
    if (want) out.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return out;
}

function renderPreview() {
  const el = document.getElementById('recPreview');
  if (!el) return;
  const dates = computeUpcomingDates(6);
  if (!dates.length) { el.innerHTML = `<div class="preview-item" style="color:var(--text-muted);">Pick a frequency and start date to preview walks.</div>`; return; }
  const check = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const winTxt = `${idxToLabel(win.start)}–${idxToLabel(win.end)}`;
  el.innerHTML = dates.map(d => `<div class="preview-item">${check} ${d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' })} · ${winTxt}</div>`).join('')
    + (dates.length === 6 ? `<div class="preview-item" style="color:var(--text-muted);padding-left:22px;">…and so on</div>` : '');
}

async function submitBooking() {
  if (bookingMode === 'recurring') return submitSeries();
  clearMsg();
  if (!selectedServiceId) return showMsg('Please select a service.', 'error');
  if (!selectedPetIds.length && customerPets.length > 0) selectedPetIds = [customerPets[0].id];
  if (!selectedPetIds.length) return showMsg('Please select at least one pet.', 'error');

  const date = document.getElementById('bookDate').value;
  const notes = document.getElementById('bookNotes').value.trim();

  const selectedSvc = providerServices.find(s => s.id === selectedServiceId);
  const isMultiDay = MULTI_DAY_SERVICES.includes(selectedSvc?.service_type);

  let scheduledAt, endsAt = null, windowEndAt = null, durationMins = null;
  if (isMultiDay) {
    const dateEnd = document.getElementById('bookDateEnd')?.value;
    if (!date || !dateEnd) return showMsg('Please select both a check-in and check-out date.', 'error');
    if (dateEnd <= date) return showMsg('Check-out date must be after check-in date.', 'error');
    scheduledAt = new Date(`${date}T12:00:00`).toISOString();
    endsAt = new Date(`${dateEnd}T12:00:00`).toISOString();
  } else {
    if (!date) return showMsg('Please pick a date.', 'error');
    if (win.end <= win.start) return showMsg('The time window looks wrong — set an end after the start.', 'error');
    scheduledAt = new Date(`${date}T${idxToHHMM(win.start)}:00`).toISOString();
    windowEndAt = new Date(`${date}T${idxToHHMM(win.end)}:00`).toISOString();
    durationMins = selectedSvc?.duration_mins ?? null;
  }

  const btn = document.querySelector('.btn-primary');
  setLoading(btn, true);

  try {
    // pet_id keeps the first selected pet as the "primary" for backward compat;
    // every selected pet (including the primary) is recorded in booking_pets.
    const inserted = await sbInsert('bookings', {
      customer_id: customerProfile.id,
      provider_id: providerProfile.id,
      pet_id: selectedPetIds[0],
      service_id: selectedServiceId,
      status: 'pending',
      scheduled_at: scheduledAt,
      ends_at: endsAt,
      window_end_at: windowEndAt,
      duration_mins: durationMins,
      total_cents: 0,
      customer_notes: notes || null
    }, authToken);

    const booking = Array.isArray(inserted) ? inserted[0] : inserted;
    if (booking && booking.id) {
      await sbInsert('booking_pets', selectedPetIds.map(pid => ({ booking_id: booking.id, pet_id: pid })), authToken);
    }

    document.getElementById('bookingContent').innerHTML = `
      <div class="form-card success-card fade-in">
        <div class="success-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#5B8C5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h2>Booking request sent!</h2>
        <p>${providerData.first_name} will review your request and confirm. We'll let you know once they respond.</p>
        <p style="margin-top:0.75rem;font-size:0.82rem;color:var(--text-muted);">You can track the booking status and live walk from your dashboard.</p>
        <div style="margin-top:2rem;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="/profile/" style="display:inline-block;padding:12px 28px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">View my bookings</a>
          <a href="/search/" style="display:inline-block;padding:12px 28px;border:1px solid var(--border);color:var(--text-secondary);border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">Browse more carers</a>
        </div>
      </div>
    `;
    clearMsg();
  } catch(e) { showMsg(e.message, 'error'); } finally { setLoading(btn, false); }
}

function frequencyLabel() {
  if (recurring.frequency === 'daily') return 'every day';
  if (recurring.frequency === 'weekdays') return 'every weekday';
  return 'every ' + recurring.days.slice().sort((a, b) => a - b).map(n => DAY_FULL[n]).join(', ');
}

async function submitSeries() {
  clearMsg();
  const selectedSvc = providerServices.find(s => s.id === selectedServiceId);
  if (!selectedServiceId) return showMsg('Please select a service.', 'error');
  if (!recurringAllowed(selectedSvc && selectedSvc.service_type)) return showMsg('Recurring isn\'t available for this service.', 'error');
  if (!selectedPetIds.length && customerPets.length > 0) selectedPetIds = [customerPets[0].id];
  if (!selectedPetIds.length) return showMsg('Please select at least one pet.', 'error');
  if (recurring.frequency === 'specific_days' && !recurring.days.length) return showMsg('Pick at least one day of the week.', 'error');
  if (!recurring.startDate) return showMsg('Pick a start date.', 'error');
  if (recurring.endMode === 'until') {
    if (!recurring.endDate) return showMsg('Pick an end date, or choose Ongoing.', 'error');
    if (recurring.endDate < recurring.startDate) return showMsg('The end date must be after the start date.', 'error');
  }
  if (!computeUpcomingDates(1).length) return showMsg('That schedule has no upcoming walks — check the dates.', 'error');

  // Lock the per-walk price (base + extra-pet fees) at series creation.
  const base = selectedSvc.price_cents;
  const extraFee = selectedSvc.additional_pet_price_cents || 0;
  const lockedPrice = base != null ? base + Math.max(0, selectedPetIds.length - 1) * extraFee : null;

  const btn = document.querySelector('.btn-primary');
  setLoading(btn, true);
  try {
    const inserted = await sbInsert('booking_series', {
      customer_id: customerProfile.id,
      provider_id: providerProfile.id,
      service_id: selectedServiceId,
      frequency_type: recurring.frequency,
      days_of_week: recurring.frequency === 'specific_days' ? recurring.days.slice().sort((a, b) => a - b) : [],
      time_of_day: idxToHHMM(win.start),
      window_end_time: idxToHHMM(win.end),
      start_date: recurring.startDate,
      end_date: recurring.endMode === 'until' ? recurring.endDate : null,
      status: 'pending',
      locked_price_cents: lockedPrice
    }, authToken);
    const series = Array.isArray(inserted) ? inserted[0] : inserted;
    if (series && series.id) {
      await sbInsert('series_pets', selectedPetIds.map(pid => ({ series_id: series.id, pet_id: pid })), authToken);
    }

    const endText = recurring.endMode === 'until' ? ` until ${new Date(recurring.endDate + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })}` : ', ongoing';
    document.getElementById('bookingContent').innerHTML = `
      <div class="form-card success-card fade-in">
        <div class="success-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#5B8C5A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <h2>Recurring schedule requested!</h2>
        <p>${providerData.first_name} will review your recurring ${SERVICE_LABELS[selectedSvc.service_type] || 'booking'} schedule — <strong>${frequencyLabel()}</strong> from ${new Date(recurring.startDate + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}${endText}.</p>
        <p style="margin-top:0.75rem;font-size:0.82rem;color:var(--text-muted);">Once they accept, your walks will appear in your bookings. The price per walk is locked in now and won't change.</p>
        <div style="margin-top:2rem;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a href="/profile/" style="display:inline-block;padding:12px 28px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">View my bookings</a>
          <a href="/search/" style="display:inline-block;padding:12px 28px;border:1px solid var(--border);color:var(--text-secondary);border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">Browse more carers</a>
        </div>
      </div>
    `;
    clearMsg();
  } catch(e) { showMsg(e.message, 'error'); } finally { setLoading(btn, false); }
}

async function refreshMsgBadge() {
  if (!authToken || !authUid) return;
  try {
    const rows = await sbGet('messages', `sender_id=neq.${authUid}&read_at=is.null&select=id`, authToken);
    const badge = document.getElementById('navMsgBadge');
    if (badge) { badge.textContent = rows.length > 9 ? '9+' : String(rows.length); badge.style.display = rows.length > 0 ? '' : 'none'; }
  } catch (e) { /* non-fatal */ }
}

async function init() {
  const area = document.getElementById('bookingContent');
  const params = new URLSearchParams(window.location.search);
  const providerId = params.get('provider');

  if (!providerId) {
    area.innerHTML = `<div class="login-prompt"><h2>No carer specified</h2><p>Head to <a href="/search/" style="color:var(--terracotta);">search</a> to find a carer and book them.</p></div>`;
    return;
  }

  // Check if user is logged in — try to restore session from localStorage
  const storedSession = localStorage.getItem('truffl_session');
  if (storedSession) {
    try {
      const session = JSON.parse(storedSession);
      authToken = session.access_token;
      authUid = session.user_id;
    } catch(e) {}
  }

  if (authToken && authUid) {
    const nm = document.getElementById('navMsg');
    if (nm) nm.style.display = '';
    refreshMsgBadge();
    setInterval(refreshMsgBadge, 10000);
  }

  if (!authToken) {
    area.innerHTML = `
      <div class="login-prompt fade-in">
        <h2>Sign in to book</h2>
        <p>You need an account to request a booking. It only takes a minute.</p>
        <a href="/login/?redirect=/book/?provider=${providerId}">Sign in or create an account</a>
      </div>
    `;
    return;
  }

  try {
    // Load provider info
    const [users, profiles, services] = await Promise.all([
      sbGet('users', `id=eq.${providerId}&select=first_name,last_name`, authToken),
      sbGet('provider_profiles', `user_id=eq.${providerId}&select=*`, authToken),
      sbGet('provider_services', `provider_id=eq.${providerId}&select=id,service_type,is_available,price_cents,additional_pet_price_cents,duration_mins&is_available=eq.true`, authToken)
    ]);

    if (!users.length || !profiles.length) {
      area.innerHTML = `<div class="login-prompt"><h2>Carer not found</h2><p><a href="/search/" style="color:var(--terracotta);">Back to search</a></p></div>`;
      return;
    }

    providerData = users[0];
    providerProfile = profiles[0];
    providerServices = services;

    // Load customer info
    const custProfiles = await sbGet('customer_profiles', `user_id=eq.${authUid}&select=*`, authToken);
    if (!custProfiles.length) {
      area.innerHTML = `<div class="login-prompt fade-in"><h2>Complete your profile first</h2><p>You need to set up your profile and add a pet before booking.</p><a href="/login/">Complete your profile</a></div>`;
      return;
    }
    customerProfile = custProfiles[0];

    const pets = await sbGet('pets', `customer_id=eq.${customerProfile.id}&select=*&is_active=eq.true`, authToken);
    if (!pets.length) {
      area.innerHTML = `<div class="login-prompt fade-in"><h2>Add a pet first</h2><p>You need to add a pet to your account before you can book a carer.</p><a href="/login/">Add a pet</a></div>`;
      return;
    }
    customerPets = pets;

    renderBookingForm();
  } catch(e) {
    area.innerHTML = `<div class="login-prompt"><h2>Something went wrong</h2><p>${e.message}</p></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
