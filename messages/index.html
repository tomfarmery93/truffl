<style>
  :root {
    --cream:#FAF7F2; --warm-white:#FFFDF9; --sage:#8B9E7E; --sage-light:#C2D1B5;
    --sage-dark:#6B7E5E; --terracotta:#C4755B; --terracotta-light:#D4917B;
    --blush:#E8C4B8; --brown:#3D2B1F; --brown-muted:#8B7355;
    --text-primary:#3D2B1F; --text-secondary:#6B5B4E; --text-muted:#9B8B7E;
    --border:#E8E0D6; --border-focus:#C4755B;
    --error:#C0392B; --error-bg:#FDF0EE; --success:#5B8C5A; --success-bg:#EDF5ED;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;}

  .nav{position:sticky;top:0;z-index:100;background:var(--warm-white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{display:flex;align-items:center;text-decoration:none;}
  .nav-right{display:flex;align-items:center;gap:14px;}
  .nav-link{font-size:0.85rem;color:var(--text-secondary);text-decoration:none;}
  .nav-link:hover{color:var(--terracotta);}
  .nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;color:var(--brown);}

  .msg-shell{max-width:1080px;margin:0 auto;padding:1.25rem 1rem 1.5rem;}
  .msg-head{font-family:'Cormorant Garamond',serif;font-weight:500;font-style:italic;font-size:1.7rem;color:var(--brown);margin-bottom:0.9rem;}

  .msg-layout{display:grid;grid-template-columns:320px 1fr;gap:16px;height:calc(100vh - 64px - 6.2rem);min-height:420px;}

  /* Conversation list */
  .conv-list{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;overflow-y:auto;}
  .conv{display:flex;gap:10px;width:100%;text-align:left;padding:12px 14px;background:transparent;border:0;border-bottom:1px solid var(--border);cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
  .conv:hover{background:var(--cream);}
  .conv.active{background:var(--cream);}
  .conv-avatar{width:38px;height:38px;border-radius:50%;background:var(--blush);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:0.95rem;color:var(--brown);flex-shrink:0;}
  .conv-avatar-system{background:var(--terracotta);color:#fff;}
  .conv-verified{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--terracotta);color:#fff;font-size:0.62rem;font-weight:700;vertical-align:middle;}
  .sys-cta{display:inline-block;margin-top:8px;padding:8px 16px;border-radius:8px;background:var(--terracotta);color:#fff;font-size:0.84rem;font-weight:500;text-decoration:none;}
  .sys-cta:hover{background:var(--terracotta-light);}
  .composer-disabled{display:flex;align-items:center;gap:8px;padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;font-size:0.8rem;color:var(--text-muted);background:var(--cream);line-height:1.4;}
  .composer-disabled svg{flex-shrink:0;color:var(--sage-dark);}
  .composer-disabled a{color:var(--terracotta);}
  .conv-main{min-width:0;flex:1;}
  .conv-top{display:flex;justify-content:space-between;gap:6px;align-items:baseline;}
  .conv-name{font-size:0.9rem;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv-time{font-size:0.7rem;color:var(--text-muted);flex-shrink:0;}
  .conv-sub{font-size:0.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .conv-snippet{font-size:0.8rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .conv.unread .conv-snippet{color:var(--text-primary);font-weight:500;}
  .conv-dot{align-self:center;flex-shrink:0;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--terracotta);color:#fff;font-size:0.68rem;font-weight:600;display:flex;align-items:center;justify-content:center;}

  /* Thread */
  .thread{display:flex;flex-direction:column;background:var(--warm-white);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .thread-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .thread-back{display:none;background:transparent;border:0;color:var(--text-muted);cursor:pointer;padding:4px;margin-right:2px;}
  .thread-title{font-size:0.95rem;font-weight:500;color:var(--text-primary);}
  .thread-ctx{font-size:0.72rem;color:var(--text-muted);margin-top:1px;}
  .thread-link{font-size:0.78rem;color:var(--terracotta);text-decoration:none;white-space:nowrap;flex-shrink:0;}
  .thread-link:hover{text-decoration:underline;}
  .mg-banner{flex-shrink:0;background:rgba(196,117,91,0.08);border-bottom:1px solid var(--border);padding:12px 16px;}
  .mg-banner-title{font-size:0.78rem;font-weight:700;color:var(--terracotta);margin-bottom:4px;}
  .mg-banner-details{font-size:0.8rem;color:var(--text-secondary);margin-bottom:6px;}
  .mg-banner-copy{font-size:0.84rem;color:var(--text-secondary);margin:0 0 8px;}
  .mg-banner-copy a{color:var(--terracotta);}
  .mg-banner-btn{font:inherit;font-size:0.84rem;font-weight:500;padding:8px 16px;border-radius:8px;border:0;background:var(--terracotta);color:#fff;cursor:pointer;}

  .thread-body{flex:1;overflow-y:auto;padding:16px;background:var(--cream);display:flex;flex-direction:column;gap:8px;}
  .day-sep{align-self:center;font-size:0.7rem;color:var(--text-muted);background:var(--warm-white);border:1px solid var(--border);padding:2px 10px;border-radius:999px;margin:4px 0;}
  /* Booking-context separator inside a person thread */
  .ctx-sep{align-self:center;display:inline-flex;align-items:center;gap:6px;font-size:0.68rem;font-weight:500;color:var(--sage-dark);background:rgba(139,158,126,0.12);border:1px solid var(--sage-light);padding:3px 12px;border-radius:999px;margin:8px 0 2px;}
  .ctx-sep svg{flex-shrink:0;}
  .bubble{max-width:74%;border-radius:14px;padding:8px 12px;}
  .bubble.theirs{align-self:flex-start;background:var(--warm-white);border:1px solid var(--border);border-bottom-left-radius:4px;}
  .bubble.mine{align-self:flex-end;background:var(--blush);border-bottom-right-radius:4px;}
  .bubble-body{font-size:0.88rem;color:var(--text-primary);line-height:1.4;white-space:pre-wrap;word-wrap:break-word;}
  .bubble-meta{font-size:0.66rem;color:var(--text-muted);margin-top:3px;}
  .bubble.mine .bubble-meta{text-align:right;color:var(--brown-muted);}

  .composer{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end;}
  .composer textarea{flex:1;resize:none;max-height:120px;padding:9px 12px;border:1px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text-primary);background:var(--warm-white);outline:none;line-height:1.4;transition:border-color 0.15s;}
  .composer textarea:focus{border-color:var(--border-focus);}
  .composer button{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:var(--terracotta);border:0;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
  .composer button:hover{background:var(--terracotta-light);}
  .composer button:disabled{opacity:0.5;cursor:default;}

  .thread-empty,.list-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;color:var(--text-muted);}
  .thread-empty .te-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--brown);margin-bottom:0.4rem;}
  .thread-empty p,.list-empty p{font-size:0.88rem;max-width:280px;line-height:1.5;}
  .te-icon{color:var(--sage);margin-bottom:0.8rem;opacity:0.7;}

  .login-prompt{text-align:center;padding:4rem 2rem;}
  .login-prompt h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--brown);margin-bottom:0.5rem;}
  .login-prompt p{color:var(--text-muted);margin-bottom:1.25rem;}
  .login-prompt a{display:inline-block;padding:12px 28px;background:var(--terracotta);color:#fff;border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;}

  @media (max-width:768px){
    .msg-shell{padding:1rem 0.75rem 1.25rem;}
    .msg-layout{grid-template-columns:1fr;height:calc(100vh - 64px - 5rem);}
    .thread{display:none;}
    body.thread-open .conv-list{display:none;}
    body.thread-open .thread{display:flex;}
    .thread-back{display:inline-flex;}
  }
</style>

<script>
const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';

const SERVICE_LABELS = {
  dog_walking:'Dog walk', dog_sitting:'Dog sitting', dog_boarding:'Dog boarding',
  dog_daycare:'Dog daycare', drop_in:'Drop-in visit', pet_sitting:'Pet sitting'
};

let authToken = null, authUid = null, role = null;
let myProfileId = null;            // customer_profiles.id or provider_profiles.id
// Each conversation is one counterparty. `key` (the participant pair) is the stable UI id;
// `id` is the real conversations row (null until the first message creates it).
let conversations = [];            // [{key, id, counterpartyUserId, name, initials, lastMessageAt, bookings:[...], composeBookingId}]
let msgsByConv = {};               // conversationId -> [messages]
let bookingMap = {};               // bookingId -> {serviceType, scheduledAt, status, isMg, seriesId}
let mgSeriesById = {};             // pending_meet_greet series (TRU-14), keyed by id
let activeKey = null;
const SERVICE_NATURAL = { dog_walking:'walk', dog_sitting:'sitting', dog_boarding:'boarding stay', pet_sitting:'visit' };
const DAY_FULL_MG = { 1:'Mon', 2:'Tue', 3:'Wed', 4:'Thu', 5:'Fri', 6:'Sat', 7:'Sun' };
let pollTimer = null;
// One-way "Truffl" channel (TRU-15): system notifications rendered as a pinned,
// reply-disabled conversation. Not a real conversations row.
let systemConv = null;
const SYSTEM_KEY = '__truffl__';
const SYS_AVATAR = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>`;

async function loadSystemConversation(){
  let rows = [];
  try { rows = await sbGet('system_messages', `recipient_user_id=eq.${authUid}&select=*&order=created_at.asc`); }
  catch(e){ return null; }
  if (!rows.length) return null;
  return {
    key: SYSTEM_KEY, id: SYSTEM_KEY, isSystem: true,
    name: 'Truffl', initials: 'T', counterpartyUserId: null,
    lastMessageAt: rows[rows.length - 1].created_at, bookings: [], composeBookingId: null,
    sysMsgs: rows
  };
}

function h(token) {
  const hd = { 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY, 'Authorization':`Bearer ${SUPABASE_ANON_KEY}` };
  if (token) hd['Authorization'] = `Bearer ${token}`;
  return hd;
}
async function sbGet(t, p) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${p}`, { headers: h(authToken) });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || 'Query failed'); }
  return r.json();
}
async function sbInsert(t, row) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}`, { method:'POST', headers:{ ...h(authToken), 'Prefer':'return=representation' }, body: JSON.stringify(row) });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || 'Insert failed'); }
  return r.json();
}
async function sbPatchWhere(t, filter, upd) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${filter}`, { method:'PATCH', headers:{ ...h(authToken), 'Prefer':'return=minimal' }, body: JSON.stringify(upd) });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || 'Update failed'); }
}
async function sbRpc(fn, args){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, { method:'POST', headers:{ ...h(authToken), 'Prefer':'return=representation' }, body: JSON.stringify(args||{}) });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || 'Request failed'); }
  return r.json();
}

function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initialsOf(name){ const p=(name||'').trim().split(/\s+/); return ((p[0]||'')[0]||'').toUpperCase() + ((p[1]||'')[0]||'').toUpperCase(); }

function fmtMsgTime(iso){
  const d = new Date(iso), now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true});
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtListTime(iso){
  if(!iso) return '';
  const d=new Date(iso), now=new Date();
  if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true});
  const diff=(now-d)/86400000;
  if(diff<7) return d.toLocaleDateString('en-AU',{weekday:'short'});
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}
function bookingLabel(bookingId){
  const b = bookingMap[bookingId];
  if (!b) return 'Booking';
  const svc = SERVICE_LABELS[b.serviceType] || 'Booking';
  if (!b.scheduledAt) return svc;
  const d = new Date(b.scheduledAt);
  return svc + ' · ' + d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
}
function dayKey(iso){ return new Date(iso).toDateString(); }
function dayLabel(iso){
  const d=new Date(iso), now=new Date();
  if(d.toDateString()===now.toDateString()) return 'Today';
  const y=new Date(now); y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
}

function convByKey(key){ return conversations.find(c => c.key === key) || null; }
function convMsgs(conv){ if (conv && conv.isSystem) return conv.sysMsgs || []; return (conv && conv.id) ? (msgsByConv[conv.id] || []) : []; }
function unreadForConv(conv){ if (conv && conv.isSystem) return (conv.sysMsgs || []).filter(m => !m.read_at).length; return convMsgs(conv).filter(m => m.sender_id !== authUid && !m.read_at).length; }
function lastMsgForConv(conv){ const a = convMsgs(conv); return a.length ? a[a.length-1] : null; }

/* Compose target: the most relevant booking to attach a new message to —
   the latest active booking with this person, else their latest booking. */
function pickComposeBooking(conv){
  if (!conv.bookings.length) return null;
  const active = conv.bookings.filter(b => ['pending','confirmed','in_progress'].includes(b.status));
  const pool = active.length ? active : conv.bookings;
  return pool.slice().sort((a,b) => new Date(b.scheduledAt||0) - new Date(a.scheduledAt||0))[0].id;
}

/* ── Data loading ── */
async function loadConversations(){
  // My bookings (context: service label, schedule, status)
  let bookings = [];
  if (role === 'provider') {
    const pp = await sbGet('provider_profiles', `user_id=eq.${authUid}&select=id`);
    if (!pp.length) return [];
    myProfileId = pp[0].id;
    bookings = await sbGet('bookings', `provider_id=eq.${myProfileId}&select=id,customer_id,provider_id,service_id,scheduled_at,status,created_at,is_meet_and_greet,series_id`);
  } else {
    const cp = await sbGet('customer_profiles', `user_id=eq.${authUid}&select=id`);
    if (!cp.length) return [];
    myProfileId = cp[0].id;
    bookings = await sbGet('bookings', `customer_id=eq.${myProfileId}&select=id,customer_id,provider_id,service_id,scheduled_at,status,created_at,is_meet_and_greet,series_id`);
  }

  // Pending meet & greet series for this person (TRU-14) — proposed booking details.
  mgSeriesById = {};
  try {
    const col = role === 'provider' ? 'provider_id' : 'customer_id';
    const srows = await sbGet('booking_series', `${col}=eq.${myProfileId}&status=eq.pending_meet_greet&select=*`);
    if (srows.length) {
      const sids = srows.map(s => s.id);
      let nameMap = {};
      try {
        const names = await sbGet('series_party_names', `series_id=in.(${sids.join(',')})&select=*`);
        nameMap = Object.fromEntries(names.map(n => [n.series_id, n]));
      } catch(e) {}
      srows.forEach(s => { s._petNames = (nameMap[s.id] || {}).pet_names || 'your dog'; mgSeriesById[s.id] = s; });
    }
  } catch(e) { /* non-fatal */ }

  const serviceIds = [...new Set(bookings.map(b => b.service_id).filter(Boolean))];
  const svcMap = {};
  if (serviceIds.length) {
    const svcs = await sbGet('provider_services', `id=in.(${serviceIds.join(',')})&select=id,service_type`);
    svcs.forEach(s => svcMap[s.id] = s.service_type);
  }
  bookingMap = {};
  bookings.forEach(b => { bookingMap[b.id] = { serviceType: svcMap[b.service_id] || null, scheduledAt: b.scheduled_at, status: b.status, isMg: b.is_meet_and_greet, seriesId: b.series_id }; });

  // Per-booking participant pair + counterparty name (booking_party_names bypasses
  // per-table RLS and resolves the other party's name, scoped to my bookings).
  const pairByBooking = {}; // bookingId -> {custUser, provUser, name}
  if (bookings.length) {
    try {
      const parties = await sbGet('booking_party_names', `booking_id=in.(${bookings.map(b=>b.id).join(',')})&select=*`);
      parties.forEach(p => {
        const name = role === 'provider'
          ? `${p.customer_first_name||''} ${p.customer_last_name||''}`.trim()
          : `${p.provider_first_name||''} ${p.provider_last_name||''}`.trim();
        pairByBooking[p.booking_id] = { custUser: p.customer_user_id, provUser: p.provider_user_id, name };
      });
    } catch(e) { /* names fall back below */ }
  }

  // Existing conversation rows (RLS-scoped). May not exist yet for a brand-new booking.
  let convRows = [];
  try { convRows = await sbGet('conversations', `select=id,customer_user_id,provider_user_id,last_message_at&order=last_message_at.desc.nullslast`); }
  catch(e) { convRows = []; }
  const nameByConv = {};
  try {
    const cpn = await sbGet('conversation_party_names', `select=*`);
    cpn.forEach(r => {
      nameByConv[r.conversation_id] = role === 'provider'
        ? `${r.customer_first_name||''} ${r.customer_last_name||''}`.trim()
        : `${r.provider_first_name||''} ${r.provider_last_name||''}`.trim();
    });
  } catch(e) { /* fall back to booking party names */ }

  const fallback = role === 'provider' ? 'Customer' : 'Carer';
  const byKey = {};                  // pairKey -> conversation object
  function ensureConv(custUser, provUser){
    const key = `${custUser}|${provUser}`;
    if (!byKey[key]) {
      byKey[key] = { key, id: null, counterpartyUserId: role === 'provider' ? custUser : provUser,
                     name: fallback, initials: '?', lastMessageAt: null, bookings: [], composeBookingId: null };
    }
    return byKey[key];
  }

  // Seed from existing conversation rows.
  convRows.forEach(c => {
    const conv = ensureConv(c.customer_user_id, c.provider_user_id);
    conv.id = c.id;
    conv.lastMessageAt = c.last_message_at;
    const nm = nameByConv[c.id];
    if (nm) { conv.name = nm; conv.initials = initialsOf(nm) || '?'; }
  });

  // Attach every booking to its pair's conversation, creating a row-less ("pending")
  // conversation for pairs that have no messages yet so they still appear in the inbox.
  bookings.forEach(b => {
    const pair = pairByBooking[b.id];
    if (!pair) return;
    const conv = ensureConv(pair.custUser, pair.provUser);
    conv.bookings.push({ id: b.id, serviceType: bookingMap[b.id].serviceType, scheduledAt: b.scheduled_at, status: b.status, isMg: b.is_meet_and_greet, seriesId: b.series_id, viewHref: role === 'provider' ? '/dashboard/' : `/track/?booking=${b.id}` });
    if ((conv.name === fallback) && pair.name) { conv.name = pair.name; conv.initials = initialsOf(pair.name) || '?'; }
    // Surface a pending meet & greet on the conversation.
    if (b.is_meet_and_greet && b.series_id && mgSeriesById[b.series_id]) {
      conv.mg = { bookingId: b.id, mgStatus: b.status, series: mgSeriesById[b.series_id] };
    }
  });

  const convs = Object.values(byKey);
  convs.forEach(c => { c.bookings.sort((a,b)=> new Date(a.scheduledAt||0)-new Date(b.scheduledAt||0)); c.composeBookingId = pickComposeBooking(c); });

  await loadMessages(convs.map(c => c.id).filter(Boolean));
  return convs;
}

async function loadMessages(convIds){
  if (!convIds.length) { msgsByConv = {}; return; }
  const rows = await sbGet('messages', `conversation_id=in.(${convIds.join(',')})&select=id,conversation_id,booking_id,sender_id,body,read_at,created_at&order=created_at.asc`);
  const map = {};
  rows.forEach(m => { (map[m.conversation_id] = map[m.conversation_id] || []).push(m); });
  msgsByConv = map;
}

/* ── Rendering ── */
function convSortTime(c){
  const last = lastMsgForConv(c);
  if (last) return new Date(last.created_at);
  if (c.lastMessageAt) return new Date(c.lastMessageAt);
  if (c.composeBookingId && bookingMap[c.composeBookingId] && bookingMap[c.composeBookingId].scheduledAt) return new Date(bookingMap[c.composeBookingId].scheduledAt);
  return new Date(0);
}
function sortedConversations(){
  // Truffl's one-way channel is always pinned to the top.
  return [...conversations].sort((a,b) => {
    if (a.isSystem) return -1;
    if (b.isSystem) return 1;
    return convSortTime(b) - convSortTime(a);
  });
}
function convSubLine(c){
  if (c.isSystem) return 'Help & safety';
  const n = c.bookings.length;
  if (c.composeBookingId) {
    const lbl = bookingLabel(c.composeBookingId);
    return n > 1 ? `${lbl} · +${n-1} more` : lbl;
  }
  return n ? `${n} booking${n>1?'s':''}` : '';
}

function renderList(){
  const el = document.getElementById('convList');
  const list = sortedConversations();
  if (!list.length){
    el.innerHTML = `<div class="list-empty"><p>No messages yet. Once you have a booking you can message the other person here.</p></div>`;
    return;
  }
  el.innerHTML = list.map(c => {
    const last = lastMsgForConv(c);
    const unread = unreadForConv(c);
    const snippet = last ? (last.sender_id === authUid ? 'You: ' : '') + last.body : 'No messages yet';
    const avatar = c.isSystem
      ? `<div class="conv-avatar conv-avatar-system">${SYS_AVATAR}</div>`
      : `<div class="conv-avatar">${esc(c.initials)}</div>`;
    const nameHtml = c.isSystem ? `${esc(c.name)} <span class="conv-verified" title="Official Truffl channel">✓</span>` : esc(c.name);
    return `
      <button class="conv ${c.key===activeKey?'active':''} ${unread>0?'unread':''}" data-key="${esc(c.key)}">
        ${avatar}
        <div class="conv-main">
          <div class="conv-top"><span class="conv-name">${nameHtml}</span><span class="conv-time">${last?fmtListTime(last.created_at):''}</span></div>
          <div class="conv-sub">${esc(convSubLine(c))}</div>
          <div class="conv-snippet">${esc(snippet)}</div>
        </div>
        ${unread>0?`<span class="conv-dot">${unread}</span>`:''}
      </button>`;
  }).join('');
  el.querySelectorAll('.conv').forEach(btn => btn.addEventListener('click', () => openThread(btn.dataset.key)));
}

const CTX_ICON = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;

function renderThread(preserveInput){
  const el = document.getElementById('thread');
  const c = convByKey(activeKey);
  if (!c){
    el.innerHTML = `<div class="thread-empty">
      <svg class="te-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <div class="te-title">Select a conversation</div>
      <p>Choose a person on the left to view and send messages.</p>
    </div>`;
    return;
  }
  if (c.isSystem) { renderSystemThread(c); return; }
  const prevInput = preserveInput ? (document.getElementById('composerInput')||{}).value : '';
  const msgs = convMsgs(c);
  let body = '';
  if (!msgs.length){
    body = `<div class="thread-empty"><p>No messages yet. Say hello and share any details — gate codes, your dog's quirks, timings.</p></div>`;
  } else {
    let lastDay = null, lastBooking = undefined;
    body = msgs.map(m => {
      let pre = '';
      const dk = dayKey(m.created_at);
      if (dk !== lastDay){ pre += `<div class="day-sep">${dayLabel(m.created_at)}</div>`; lastDay = dk; }
      // Context chip whenever the related booking changes within the person thread.
      if (m.booking_id !== lastBooking){
        if (m.booking_id) pre += `<div class="ctx-sep">${CTX_ICON}${esc(bookingLabel(m.booking_id))}</div>`;
        lastBooking = m.booking_id;
      }
      const mine = m.sender_id === authUid;
      const read = mine && m.read_at ? ' · Read' : '';
      return `${pre}<div class="bubble ${mine?'mine':'theirs'}"><div class="bubble-body">${esc(m.body)}</div><div class="bubble-meta">${fmtMsgTime(m.created_at)}${read}</div></div>`;
    }).join('');
  }

  const ctxLine = c.composeBookingId ? bookingLabel(c.composeBookingId) : (c.bookings.length ? `${c.bookings.length} bookings` : '');
  const viewHref = c.composeBookingId ? (role === 'provider' ? '/dashboard/' : `/track/?booking=${c.composeBookingId}`) : '';
  const viewLink = viewHref ? `<a class="thread-link" href="${viewHref}">View booking →</a>` : '';

  el.innerHTML = `
    <div class="thread-head">
      <div style="display:flex;align-items:center;min-width:0;">
        <button class="thread-back" id="threadBack" aria-label="Back to conversations"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div style="min-width:0;">
          <div class="thread-title">${esc(c.name)}</div>
          <div class="thread-ctx">${esc(ctxLine)}</div>
        </div>
      </div>
      ${viewLink}
    </div>
    ${mgBannerHtml(c)}
    <div class="thread-body" id="threadBody">${body}</div>
    <form class="composer" id="composer">
      <textarea id="composerInput" rows="1" placeholder="Write a message…" aria-label="Write a message"></textarea>
      <button type="submit" aria-label="Send message"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </form>`;

  const input = document.getElementById('composerInput');
  input.value = prevInput || '';
  autosize(input);
  input.addEventListener('input', () => autosize(input));
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); document.getElementById('composer').requestSubmit(); } });
  document.getElementById('composer').addEventListener('submit', onSend);
  const back = document.getElementById('threadBack');
  if (back) back.addEventListener('click', closeThread);

  const tb = document.getElementById('threadBody');
  tb.scrollTop = tb.scrollHeight;
}

// The one-way Truffl channel: incoming-only bubbles (each can carry a CTA link),
// and a disabled composer making clear the customer can't reply.
function renderSystemThread(c){
  const el = document.getElementById('thread');
  const msgs = convMsgs(c);
  let lastDay = null;
  const body = msgs.map(m => {
    let pre = '';
    const dk = dayKey(m.created_at);
    if (dk !== lastDay){ pre += `<div class="day-sep">${dayLabel(m.created_at)}</div>`; lastDay = dk; }
    const cta = m.link_url ? `<a class="sys-cta" href="${esc(m.link_url)}">${esc(m.link_label || 'Open')}</a>` : '';
    return `${pre}<div class="bubble theirs"><div class="bubble-body">${esc(m.body)}</div>${cta}<div class="bubble-meta">${fmtMsgTime(m.created_at)}</div></div>`;
  }).join('');

  el.innerHTML = `
    <div class="thread-head">
      <div style="display:flex;align-items:center;min-width:0;gap:10px;">
        <button class="thread-back" id="threadBack" aria-label="Back to conversations"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div class="conv-avatar conv-avatar-system" style="width:34px;height:34px;">${SYS_AVATAR}</div>
        <div style="min-width:0;">
          <div class="thread-title">Truffl <span class="conv-verified" title="Official Truffl channel">✓</span></div>
          <div class="thread-ctx">Help &amp; safety · official updates</div>
        </div>
      </div>
    </div>
    <div class="thread-body" id="threadBody">${body}</div>
    <div class="composer-disabled" aria-disabled="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>This is a one-way channel from Truffl — you can't reply here. Need a hand? <a href="/trust-and-safety/reporting-a-concern/">Get in touch</a>.</span>
    </div>`;

  const back = document.getElementById('threadBack');
  if (back) back.addEventListener('click', closeThread);
  const tb = document.getElementById('threadBody');
  tb.scrollTop = tb.scrollHeight;
}

function autosize(t){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,120)+'px'; }

/* ── Meet & greet banner (TRU-14) ── */
function mgSchedSummary(s){
  if (!s) return '';
  const fdate = d => new Date(d + 'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  const ftime = hhmm => { if(!hhmm) return ''; const [h,m]=hhmm.split(':'); const dd=new Date(); dd.setHours(+h,+m,0); return dd.toLocaleTimeString('en-AU',{hour:'numeric',minute:'2-digit',hour12:true}); };
  if (s.booking_kind === 'multiday') return `${fdate(s.start_date)} → ${s.end_date?fdate(s.end_date):''}`.trim();
  if (s.booking_kind === 'oneoff') return `${fdate(s.start_date)} · ${ftime(s.time_of_day)}${s.window_end_time?'–'+ftime(s.window_end_time):''}`;
  let freq = 'every weekday';
  if (s.frequency_type==='daily') freq='every day';
  else if (s.frequency_type==='specific_days') freq='every '+(s.days_of_week||[]).slice().sort((a,b)=>a-b).map(n=>DAY_FULL_MG[n]).join(', ');
  return `${freq} from ${fdate(s.start_date)} · ${ftime(s.time_of_day)}${s.window_end_time?'–'+ftime(s.window_end_time):''}`;
}
function mgBannerHtml(c){
  if (!c || !c.mg) return '';
  const s = c.mg.series;
  const svcLabel = SERVICE_LABELS[s.service_type] || SERVICE_LABELS[bookingMap[c.mg.bookingId]?.serviceType] || 'Service';
  const svcNat = SERVICE_NATURAL[s.service_type] || SERVICE_NATURAL[bookingMap[c.mg.bookingId]?.serviceType] || 'visit';
  const who = esc((c.name || '').trim().split(/\s+/)[0] || c.name);
  const pets = esc(s._petNames || 'your dog');
  const details = `<div class="mg-banner-details"><strong>Proposed ${esc(svcNat)}</strong> · ${esc(svcLabel)} · ${esc(mgSchedSummary(s))} · ${pets}</div>`;

  let action;
  if (role === 'customer') {
    if (c.mg.mgStatus !== 'completed') {
      action = `<p class="mg-banner-copy">All done meeting ${who}? Mark it complete whenever you're ready to decide, no rush at all.</p>
        <button type="button" class="mg-banner-btn" onclick="markMgCompleteFromThread('${c.mg.bookingId}')">Mark meet &amp; greet complete</button>`;
    } else {
      action = `<p class="mg-banner-copy">Meet &amp; greet marked complete. Head to <a href="/profile/">your bookings</a> to go ahead or pass.</p>`;
    }
  } else {
    action = `<p class="mg-banner-copy">${who} would like a quick, free hello before the first paid ${esc(svcNat)}. Arrange a time below — they'll mark it complete once you've met.</p>`;
  }

  return `<div class="mg-banner">
    <div class="mg-banner-title">🐾 Meet &amp; greet</div>
    ${details}
    ${action}
  </div>`;
}
async function markMgCompleteFromThread(bookingId){
  try {
    await sbRpc('mark_meet_greet_complete', { p_booking_id: bookingId });
    if (bookingMap[bookingId]) bookingMap[bookingId].status = 'completed';
    const c = convByKey(activeKey);
    if (c && c.mg && c.mg.bookingId === bookingId) c.mg.mgStatus = 'completed';
    if (c) { const bk = c.bookings.find(b => b.id === bookingId); if (bk) bk.status = 'completed'; }
    renderThread(true);
  } catch(e){ alert(e.message); }
}

function syncUrl(){
  const c = convByKey(activeKey);
  const url = new URL(window.location);
  url.searchParams.delete('c'); url.searchParams.delete('booking');
  if (c && c.id) url.searchParams.set('c', c.id);
  else if (c && c.composeBookingId) url.searchParams.set('booking', c.composeBookingId);
  history.replaceState({}, '', url);
}

async function openThread(key){
  activeKey = key;
  document.body.classList.add('thread-open');
  renderList();
  renderThread(false);
  syncUrl();
  const c = convByKey(key);
  if (c && c.id) await markRead(c);
}

/* Deep-link from a booking: open that person's conversation and target replies
   at the clicked booking's context. */
async function openByBooking(bookingId){
  const conv = conversations.find(c => c.bookings.some(b => b.id === bookingId));
  if (!conv) return false;
  conv.composeBookingId = bookingId;
  await openThread(conv.key);
  return true;
}

function closeThread(){
  activeKey = null;
  document.body.classList.remove('thread-open');
  const url = new URL(window.location); url.searchParams.delete('c'); url.searchParams.delete('booking'); history.replaceState({}, '', url);
  renderList();
  renderThread(false);
}

async function markRead(conv){
  if (!conv) return;
  if (conv.isSystem){
    const unread = (conv.sysMsgs || []).filter(m => !m.read_at);
    if (!unread.length) return;
    try {
      await sbPatchWhere('system_messages', `recipient_user_id=eq.${authUid}&read_at=is.null`, { read_at: new Date().toISOString() });
      const now = new Date().toISOString();
      unread.forEach(m => m.read_at = now);
      renderList();
    } catch(e){ /* non-fatal */ }
    return;
  }
  if (!conv.id) return;
  const unread = convMsgs(conv).filter(m => m.sender_id !== authUid && !m.read_at);
  if (!unread.length) return;
  try {
    await sbPatchWhere('messages', `conversation_id=eq.${conv.id}&sender_id=neq.${authUid}&read_at=is.null`, { read_at: new Date().toISOString() });
    unread.forEach(m => m.read_at = new Date().toISOString());
    renderList();
  } catch(e){ /* non-fatal */ }
}

async function onSend(e){
  e.preventDefault();
  const input = document.getElementById('composerInput');
  const text = (input.value||'').trim();
  const c = convByKey(activeKey);
  if (!text || !c || c.isSystem) return;
  // Need somewhere to attach: an existing conversation, or a booking (the trigger
  // creates the conversation from booking_id on the first message).
  if (!c.id && !c.composeBookingId) { alert('No booking to message about yet.'); return; }
  input.value=''; autosize(input);
  try {
    const payload = { sender_id: authUid, body: text };
    if (c.id) payload.conversation_id = c.id;
    if (c.composeBookingId) payload.booking_id = c.composeBookingId; // context (and grouping seed)
    const res = await sbInsert('messages', payload);
    const row = Array.isArray(res) ? res[0] : res;
    if (row){
      if (!c.id && row.conversation_id) { c.id = row.conversation_id; c.lastMessageAt = row.created_at; }
      (msgsByConv[c.id] = msgsByConv[c.id] || []).push(row);
    }
    renderThread(true);
    renderList();
    syncUrl();
  } catch(err){
    input.value = text; autosize(input);
    alert('Could not send: ' + err.message);
  }
}

/* ── Polling ── */
async function poll(){
  if (!conversations.length) return;
  try {
    const active = convByKey(activeKey);
    const before = active ? convMsgs(active).length : 0;
    await loadMessages(conversations.map(c => c.id).filter(id => id && id !== SYSTEM_KEY));
    renderList();
    if (active){
      const after = convMsgs(active).length;
      if (after !== before) { renderThread(true); }
      markRead(active);
    }
  } catch(e){ /* transient; try again next tick */ }
}

/* ── Boot ── */
async function init(){
  const shell = document.getElementById('shell');
  try {
    const stored = localStorage.getItem('truffl_session');
    if (stored){ const s = JSON.parse(stored); authToken = s.access_token; authUid = s.user_id; role = s.role; }
  } catch(e){}

  if (!authToken){
    shell.innerHTML = `<div class="login-prompt"><h2>Sign in to view messages</h2><p>You need to be logged in to message your ${role==='provider'?'customers':'carers'}.</p><a href="/login/?redirect=/messages/">Sign in</a></div>`;
    return;
  }

  // Nav: role-aware home link + avatar
  try {
    const users = await sbGet('users', `id=eq.${authUid}&select=first_name,last_name,role`);
    if (users.length){
      if (!role) role = users[0].role;
      const ini = ((users[0].first_name||'')[0]||'').toUpperCase() + ((users[0].last_name||'')[0]||'').toUpperCase();
      const home = role === 'provider' ? '/dashboard/' : '/profile/';
      document.getElementById('navRight').innerHTML = `<a class="nav-link" href="${home}">${role==='provider'?'Dashboard':'My account'}</a><div class="nav-avatar">${esc(ini)}</div>`;
    }
  } catch(e){}

  try {
    conversations = await loadConversations();
    systemConv = await loadSystemConversation();
    if (systemConv) conversations.unshift(systemConv);
    renderList();
    const params = new URLSearchParams(window.location.search);
    const wantConv = params.get('c');
    const wantBooking = params.get('booking');
    const byId = wantConv ? conversations.find(c => c.id === wantConv) : null;
    if (byId) {
      await openThread(byId.key);
    } else if (wantBooking) {
      const opened = await openByBooking(wantBooking);
      if (!opened) renderThread(false);
    } else {
      renderThread(false);
    }
    pollTimer = setInterval(poll, 10000);
  } catch(e){
    shell.innerHTML = `<div class="login-prompt"><h2>Couldn't load messages</h2><p>${esc(e.message)}</p><a href="/messages/">Try again</a></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
window.addEventListener('beforeunload', () => { if (pollTimer) clearInterval(pollTimer); });
</script>
