<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Track Walk — Truffl Pets</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --cream:#FAF7F2; --warm-white:#FFFDF9; --sage:#8B9E7E; --sage-light:#C2D1B5;
    --sage-dark:#6B7E5E; --terracotta:#C4755B; --terracotta-light:#D4917B;
    --blush:#E8C4B8; --brown:#3D2B1F; --brown-muted:#8B7355;
    --text-primary:#3D2B1F; --text-secondary:#6B5B4E; --text-muted:#9B8B7E;
    --border:#E8E0D6; --border-focus:#C4755B;
    --error:#C0392B; --error-bg:#FDF0EE; --success:#5B8C5A; --success-bg:#EDF5ED;
    --warning:#C0862B; --warning-bg:#FEF3E2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-primary);min-height:100vh;-webkit-font-smoothing:antialiased;}

  .nav{position:sticky;top:0;z-index:200;background:var(--warm-white);border-bottom:1px solid var(--border);padding:0 1.25rem;height:56px;display:flex;align-items:center;}
  .nav-msg{margin-left:auto;position:relative;display:inline-flex;align-items:center;color:var(--text-secondary);text-decoration:none;}
  .nav-msg:hover{color:var(--terracotta);}
  .nav-msg-badge{position:absolute;top:-6px;right:-7px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--terracotta);color:#fff;font-size:0.62rem;line-height:16px;text-align:center;font-weight:600;}
  .nav-logo{display:flex;align-items:center;text-decoration:none;}

  .page-wrapper{max-width:560px;margin:0 auto;padding:1rem 1rem 6rem;}

  .status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border-radius:10px;font-size:0.85rem;font-weight:500;margin-bottom:1rem;}
  .status-bar.active{background:var(--success-bg);color:var(--success);}
  .status-bar.waiting{background:var(--warning-bg);color:var(--warning);}
  .status-bar.done{background:var(--cream);color:var(--text-muted);border:1px solid var(--border);}
  .pulse{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem;}
  .stat-card{background:var(--warm-white);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
  .stat-value{font-size:1.3rem;font-weight:600;color:var(--brown);}
  .stat-label{font-size:0.72rem;color:var(--text-muted);margin-top:2px;}

  .map-container{border-radius:14px;overflow:hidden;border:1px solid var(--border);margin-bottom:1rem;position:relative;}
  #map{height:300px;width:100%;background:var(--cream);}
  .map-overlay{position:absolute;top:10px;left:10px;z-index:400;background:white;border-radius:8px;padding:6px 12px;font-size:0.78rem;font-weight:500;color:var(--text-secondary);box-shadow:0 2px 8px rgba(0,0,0,0.1);}

  .section-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.1rem;color:var(--brown);margin-bottom:0.75rem;}

  .update-feed{display:flex;flex-direction:column;gap:8px;margin-top:1rem;}
  .update-item{display:flex;gap:10px;padding:10px 12px;background:var(--warm-white);border:1px solid var(--border);border-radius:10px;font-size:0.82rem;}
  .update-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.75rem;}
  .update-icon svg{width:15px;height:15px;}
  .update-icon.mood{background:var(--success-bg);color:var(--success);}
  .update-icon.comment{background:rgba(196,117,91,0.1);color:var(--terracotta);}
  .update-icon.photo{background:rgba(139,158,126,0.1);color:var(--sage-dark);}
  .update-text{color:var(--text-secondary);line-height:1.4;}
  .update-time{font-size:0.7rem;color:var(--text-muted);margin-top:2px;}
  .update-photo{width:100%;max-width:200px;border-radius:8px;margin-top:6px;}

  .booking-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;}

  .info-notice{background:var(--warning-bg);border-radius:10px;padding:12px 14px;font-size:0.82rem;color:var(--warning);line-height:1.5;margin-bottom:1rem;display:flex;align-items:start;gap:10px;}
  .info-notice svg{flex-shrink:0;margin-top:2px;}

  .summary-card{background:var(--warm-white);border:1px solid var(--border);border-radius:14px;padding:1.5rem;text-align:center;}
  .summary-card h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--brown);margin-bottom:0.5rem;}
  .summary-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:1.5rem 0;}
  .summary-stat{padding:12px;background:var(--cream);border-radius:10px;}
  .summary-stat .stat-value{font-size:1.1rem;}

  .login-prompt{text-align:center;padding:4rem 2rem;}
  .login-prompt h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--brown);margin-bottom:0.5rem;}
  .login-prompt p{color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;}
  .login-prompt a{display:inline-block;padding:12px 32px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn 0.3s ease;}

  @media(max-width:600px){
    .page-wrapper{padding:0.75rem 0.75rem 6rem;}
    #map{height:220px;}
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo" aria-label="Truffl Pets home">
    <svg width="120" height="40" viewBox="0 0 180 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="5.5" r="6" fill="none" stroke="#C4866A" stroke-width="2.5"/>
      <circle cx="20" cy="5.5" r="2.8" fill="#FFFDF9"/>
      <rect x="16.5" y="10.5" width="7" height="9" rx="3" fill="#C4866A"/>
      <circle cx="20" cy="33" r="20" fill="#C4866A"/>
      <circle cx="20" cy="33" r="15.5" fill="none" stroke="#B8795C" stroke-width="0.6" opacity="0.45"/>
      <line x1="7" y1="33" x2="33" y2="33" stroke="#FFFDF9" stroke-width="0.5" opacity="0.3"/>
      <text x="20" y="35.5" font-family="'Cormorant Garamond',Georgia,serif" font-size="14" font-style="italic" font-weight="400" fill="#FFFDF9" text-anchor="middle" letter-spacing="-0.3">truffl</text>
      <text x="52" y="30" font-family="'Cormorant Garamond',Georgia,serif" font-size="32" font-style="italic" font-weight="400" fill="#3D2B1F" letter-spacing="-0.5">truffl</text>

    <span class="nav-msg-badge" id="navMsgBadge" style="display:none;">0</span>

</nav>

<div class="page-wrapper">
  <div id="trackContent">
    <div style="text-align:center;padding:3rem;color:var(--text-muted);font-size:0.85rem;">Loading...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';

const UPDATE_ICONS = {
  mood: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9.5h.01M15 9.5h.01"/></svg>',
  photo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5A1.5 1.5 0 0 1 4.5 7H7l1-2h8l1 2h2.5A1.5 1.5 0 0 1 21 8.5V18a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 18z"/><circle cx="12" cy="13" r="3.2"/></svg>',
  comment: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'
};

let authToken = null, authUid = null;
let booking = null, walkSession = null, bookingId = null;
let providerName = '', petName = '', petBreed = '';
let map = null, polyline = null;
let gpsPoints = [];
let timerInterval = null, pollInterval = null;
let lastPingTime = null, lastUpdateTime = null;

function h(token) {
  const hd = { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  if (token) hd['Authorization'] = `Bearer ${token}`;
  return hd;
}
async function sbGet(t, p) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${t}?${p}`, { headers: h(authToken) });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
  return await r.json();
}

function formatDuration(seconds) {
  const m = Math.floor(seconds / 60), s = seconds % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}
function formatDistance(metres) {
  return metres >= 1000 ? (metres / 1000).toFixed(2) + ' km' : metres + ' m';
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
}
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371e3, p = Math.PI / 180;
  const a = Math.sin((lat2 - lat1) * p / 2) ** 2 + Math.cos(lat1 * p) * Math.cos(lat2 * p) * Math.sin((lng2 - lng1) * p / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
function getTotalDistance(points) {
  let d = 0;
  for (let i = 1; i < points.length; i++) {
    d += calcDistance(points[i-1].lat, points[i-1].lng, points[i].lat, points[i].lng);
  }
  return Math.round(d);
}

function getElapsedSeconds() {
  if (!walkSession || !walkSession.started_at) return 0;
  return Math.floor((Date.now() - new Date(walkSession.started_at).getTime()) / 1000);
}

function formatScheduledAt(iso) {
  return new Date(iso).toLocaleString('en-AU', { weekday: 'short', day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit', hour12: true });
}

function updateStats() {
  const distEl = document.getElementById('statDistance');
  const durEl = document.getElementById('statDuration');
  const pingsEl = document.getElementById('statPings');
  if (distEl) distEl.textContent = formatDistance(getTotalDistance(gpsPoints));
  if (durEl) durEl.textContent = formatDuration(getElapsedSeconds());
  if (pingsEl) pingsEl.textContent = gpsPoints.length;
}

function initMap(lat, lng) {
  if (map) return;
  map = L.map('map').setView([lat, lng], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
  polyline = L.polyline([], { color: '#C4755B', weight: 4, opacity: 0.8 }).addTo(map);
  L.circleMarker([lat, lng], { radius: 6, color: '#5B8C5A', fillColor: '#5B8C5A', fillOpacity: 1 }).addTo(map);
}

function updateMapPoints() {
  if (!map || !polyline || gpsPoints.length === 0) return;
  polyline.setLatLngs(gpsPoints.map(p => [p.lat, p.lng]));
  const latest = gpsPoints[gpsPoints.length - 1];
  if (window._currentMarker) map.removeLayer(window._currentMarker);
  window._currentMarker = L.circleMarker([latest.lat, latest.lng], { radius: 8, color: '#C4755B', fillColor: '#C4755B', fillOpacity: 1 }).addTo(map);
  map.setView([latest.lat, latest.lng], map.getZoom());
}

function addUpdateToFeed(update) {
  const feed = document.getElementById('updateFeed');
  if (!feed) return;
  const emptyState = feed.querySelector('.empty-state');
  if (emptyState) emptyState.remove();
  const iconClass = update.update_type === 'mood' ? 'mood' : update.update_type === 'photo' ? 'photo' : 'comment';
  const iconSymbol = update.update_type === 'mood' ? UPDATE_ICONS.mood : update.update_type === 'photo' ? UPDATE_ICONS.photo : UPDATE_ICONS.comment;
  const photoHtml = update.photo_url ? `<img src="${update.photo_url}" class="update-photo" alt="Walk photo">` : '';
  const item = document.createElement('div');
  item.className = 'update-item fade-in';
  item.innerHTML = `
    <div class="update-icon ${iconClass}">${iconSymbol}</div>
    <div>
      <div class="update-text">${update.message || ''}</div>
      ${photoHtml}
      <div class="update-time">${formatTime(update.created_at)}</div>
    </div>
  `;
  feed.insertBefore(item, feed.firstChild);
}

async function poll() {
  try {
    const sessions = await sbGet('walk_sessions', `booking_id=eq.${bookingId}&select=*&order=created_at.desc&limit=1`);
    if (!sessions.length) return;
    walkSession = sessions[0];

    if (walkSession.status === 'completed') {
      clearInterval(pollInterval);
      clearInterval(timerInterval);
      pollInterval = null;
      timerInterval = null;
      const allPings = await sbGet('gps_pings', `walk_session_id=eq.${walkSession.id}&order=recorded_at.asc&select=*`);
      gpsPoints = allPings.map(p => ({ lat: p.lat, lng: p.lng }));
      const allUpdates = await sbGet('walk_updates', `walk_session_id=eq.${walkSession.id}&order=created_at.asc&select=*`);
      renderSummary(allUpdates);
      return;
    }

    const pingQuery = lastPingTime
      ? `walk_session_id=eq.${walkSession.id}&recorded_at=gt.${lastPingTime}&order=recorded_at.asc&select=*`
      : `walk_session_id=eq.${walkSession.id}&order=recorded_at.asc&select=*`;
    const newPings = await sbGet('gps_pings', pingQuery);
    if (newPings.length) {
      gpsPoints.push(...newPings.map(p => ({ lat: p.lat, lng: p.lng })));
      lastPingTime = newPings[newPings.length - 1].recorded_at;
      if (!map && gpsPoints.length > 0) {
        setTimeout(() => {
          initMap(gpsPoints[0].lat, gpsPoints[0].lng);
          updateMapPoints();
        }, 100);
      } else {
        updateMapPoints();
      }
    }

    const updateQuery = lastUpdateTime
      ? `walk_session_id=eq.${walkSession.id}&created_at=gt.${lastUpdateTime}&order=created_at.asc&select=*`
      : `walk_session_id=eq.${walkSession.id}&order=created_at.asc&select=*`;
    const newUpdates = await sbGet('walk_updates', updateQuery);
    if (newUpdates.length) {
      newUpdates.forEach(u => addUpdateToFeed(u));
      lastUpdateTime = newUpdates[newUpdates.length - 1].created_at;
    }

    updateStats();
  } catch (e) {
    console.error('Poll error:', e);
  }
}

async function pollForWalkStart() {
  try {
    const sessions = await sbGet('walk_sessions', `booking_id=eq.${bookingId}&select=*&order=created_at.desc&limit=1`);
    if (sessions.length && sessions[0].status === 'active') {
      clearInterval(pollInterval);
      pollInterval = null;
      walkSession = sessions[0];
      await renderActiveWalk([]);
    }
  } catch (e) {
    console.error('Poll error:', e);
  }
}

function renderWaitingState() {
  const area = document.getElementById('trackContent');
  let scheduledStr = 'Time TBC';
  if (booking.scheduled_at) {
    if (booking.window_end_at) {
      const d = new Date(booking.scheduled_at);
      const day = d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
      const t1 = d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
      const t2 = new Date(booking.window_end_at).toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
      scheduledStr = `${day} · ${booking.duration_mins ? booking.duration_mins + '-min · ' : ''}between ${t1}–${t2}`;
    } else {
      scheduledStr = formatScheduledAt(booking.scheduled_at);
    }
  }
  area.innerHTML = `
    <div class="status-bar waiting">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Waiting for walk to start
    </div>

    <div class="booking-card">
      <div style="font-size:0.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Your booking</div>
      <div style="font-size:0.95rem;font-weight:500;color:var(--text-primary);margin-bottom:2px;">${petName}${petBreed ? ' · ' + petBreed : ''}</div>
      <div style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:6px;">Walker: ${providerName}</div>
      <div style="font-size:0.82rem;color:var(--text-muted);">${scheduledStr}</div>
      <a href="/messages/?booking=${bookingId}" style="display:inline-flex;align-items:center;gap:7px;margin-top:14px;padding:9px 16px;border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);text-decoration:none;font-size:0.85rem;font-weight:500;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Message your carer
      </a>
    </div>

    <div class="info-notice">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div>We'll update this page automatically when your walker starts. Keep it open!</div>
    </div>
  `;

  pollInterval = setInterval(pollForWalkStart, 15000);
}

async function renderActiveWalk(existingUpdates) {
  const area = document.getElementById('trackContent');
  area.innerHTML = `
    <div class="status-bar active"><div class="pulse"></div> Walk in progress</div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" id="statDuration">0s</div><div class="stat-label">Duration</div></div>
      <div class="stat-card"><div class="stat-value" id="statDistance">0 m</div><div class="stat-label">Distance</div></div>
      <div class="stat-card"><div class="stat-value" id="statPings">0</div><div class="stat-label">GPS pings</div></div>
    </div>

    <div class="map-container">
      <div class="map-overlay">Live tracking</div>
      <div id="map"></div>
    </div>

    <div class="section-title">Updates from your walker</div>
    <div class="update-feed" id="updateFeed">
      <div class="empty-state" style="text-align:center;padding:1rem;color:var(--text-muted);font-size:0.82rem;">No updates yet — your walker will send updates during the walk</div>
    </div>
  `;

  if (gpsPoints.length > 0) {
    setTimeout(() => {
      initMap(gpsPoints[0].lat, gpsPoints[0].lng);
      updateMapPoints();
    }, 100);
  } else {
    setTimeout(() => initMap(-33.87, 151.21), 100);
  }

  existingUpdates.forEach(u => addUpdateToFeed(u));
  if (existingUpdates.length > 0) {
    lastUpdateTime = existingUpdates[existingUpdates.length - 1].created_at;
  }

  updateStats();
  timerInterval = setInterval(updateStats, 1000);
  pollInterval = setInterval(poll, 10000);
}

function renderSummary(allUpdates) {
  const area = document.getElementById('trackContent');
  const dist = walkSession.distance_metres != null ? walkSession.distance_metres : getTotalDistance(gpsPoints);
  const dur = walkSession.duration_seconds != null ? walkSession.duration_seconds
    : (walkSession.ended_at ? Math.floor((new Date(walkSession.ended_at) - new Date(walkSession.started_at)) / 1000) : getElapsedSeconds());

  area.innerHTML = `
    <div class="summary-card fade-in">
      <div style="margin-bottom:0.5rem;color:var(--success);display:flex;justify-content:center;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8 12.5l2.5 2.5L16 9"/></svg></div>
      <h2>Walk complete!</h2>
      <p style="color:var(--text-secondary);font-size:0.9rem;">Here's how ${petName}'s walk went.</p>

      <div class="summary-stats">
        <div class="summary-stat"><div class="stat-value">${formatDuration(dur)}</div><div class="stat-label">Duration</div></div>
        <div class="summary-stat"><div class="stat-value">${formatDistance(dist)}</div><div class="stat-label">Distance</div></div>
        <div class="summary-stat"><div class="stat-value">${gpsPoints.length}</div><div class="stat-label">GPS pings</div></div>
      </div>

      ${gpsPoints.length > 0 ? '<div class="map-container" style="margin-bottom:1rem;"><div id="summaryMap" style="height:200px;"></div></div>' : ''}

      <div style="margin-top:0.5rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <a href="/review/?booking=${booking.id}" id="reviewCtaBtn" style="display:inline-block;padding:12px 32px;background:var(--terracotta);color:white;border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">Leave a review</a>
        <a href="/my/" style="display:inline-block;padding:12px 28px;background:transparent;color:var(--text-secondary);border:1px solid var(--border);border-radius:10px;font-weight:500;text-decoration:none;font-size:0.9rem;">Back to dashboard</a>
      </div>
    </div>

    ${allUpdates.length > 0 ? `
      <div style="margin-top:1.5rem;">
        <div class="section-title">Walk updates</div>
        <div class="update-feed" id="updateFeed"></div>
      </div>
    ` : ''}
  `;

  // Update CTA label if review already exists for this booking
  (async () => {
    try {
      const existing = await sbGet('reviews', `booking_id=eq.${booking.id}&select=id`);
      if (existing.length) {
        const btn = document.getElementById('reviewCtaBtn');
        if (btn) btn.textContent = 'Edit your review';
      }
    } catch (e) {}
  })();

  if (gpsPoints.length > 0) {
    setTimeout(() => {
      const sMap = L.map('summaryMap').fitBounds(gpsPoints.map(p => [p.lat, p.lng]));
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(sMap);
      L.polyline(gpsPoints.map(p => [p.lat, p.lng]), { color: '#C4755B', weight: 4 }).addTo(sMap);
      L.circleMarker([gpsPoints[0].lat, gpsPoints[0].lng], { radius: 6, color: '#5B8C5A', fillColor: '#5B8C5A', fillOpacity: 1 }).addTo(sMap).bindPopup('Start');
      const last = gpsPoints[gpsPoints.length - 1];
      L.circleMarker([last.lat, last.lng], { radius: 6, color: '#C0392B', fillColor: '#C0392B', fillOpacity: 1 }).addTo(sMap).bindPopup('End');
    }, 100);
  }

  if (allUpdates.length > 0) {
    allUpdates.forEach(u => addUpdateToFeed(u));
  }
}

async function refreshMsgBadge() {
  if (!authToken || !authUid) return;
  try {
    const rows = await sbGet('messages', `sender_id=neq.${authUid}&read_at=is.null&select=id`);
    const badge = document.getElementById('navMsgBadge');
    if (badge) { badge.textContent = rows.length > 9 ? '9+' : String(rows.length); badge.style.display = rows.length > 0 ? '' : 'none'; }
  } catch (e) { /* non-fatal */ }
}

async function init() {
  const area = document.getElementById('trackContent');
  const stored = localStorage.getItem('truffl_session');
  if (stored) { try { const s = JSON.parse(stored); authToken = s.access_token; authUid = s.user_id; } catch (e) {} }

  if (!authToken) {
    area.innerHTML = `<div class="login-prompt"><h2>Sign in required</h2><p>You need to be logged in to track a walk.</p><a href="/login/?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}">Sign in</a></div>`;
    return;
  }

  refreshMsgBadge();
  setInterval(refreshMsgBadge, 10000);

  const params = new URLSearchParams(window.location.search);
  bookingId = params.get('booking');

  if (!bookingId) {
    area.innerHTML = `<div class="login-prompt"><h2>No booking found</h2><p>No booking was specified.</p><a href="/">Back to home</a></div>`;
    return;
  }

  try {
    const profiles = await sbGet('customer_profiles', `user_id=eq.${authUid}&select=id`);
    if (!profiles.length) {
      area.innerHTML = `<div class="login-prompt"><h2>Access denied</h2><p>You don't have a customer profile.</p><a href="/">Back to home</a></div>`;
      return;
    }
    const customerProfileId = profiles[0].id;

    const bookings = await sbGet('bookings', `id=eq.${bookingId}&select=*`);
    if (!bookings.length) {
      area.innerHTML = `<div class="login-prompt"><h2>Booking not found</h2><p>This booking doesn't exist.</p><a href="/">Back to home</a></div>`;
      return;
    }
    booking = bookings[0];

    if (booking.customer_id !== customerProfileId) {
      area.innerHTML = `<div class="login-prompt"><h2>Access denied</h2><p>You don't have access to this booking.</p><a href="/">Back to home</a></div>`;
      return;
    }

    try {
      const provProfiles = await sbGet('provider_profiles', `id=eq.${booking.provider_id}&select=user_id`);
      if (provProfiles.length) {
        const users = await sbGet('users', `id=eq.${provProfiles[0].user_id}&select=first_name,last_name`);
        if (users.length) providerName = `${users[0].first_name} ${users[0].last_name}`;
      }
    } catch (e) {}

    try {
      let pets = [];
      try {
        const bp = await sbGet('booking_pets', `booking_id=eq.${bookingId}&select=pet_id`);
        const ids = bp.map(r => r.pet_id).filter(Boolean);
        if (ids.length) pets = await sbGet('pets', `id=in.(${ids.join(',')})&select=name,breed`);
      } catch (e) {}
      if (!pets.length && booking.pet_id) pets = await sbGet('pets', `id=eq.${booking.pet_id}&select=name,breed`);
      if (pets.length) {
        petName = pets.map(p => p.name).filter(Boolean).join(' + ');
        petBreed = pets.length === 1 ? (pets[0].breed || '') : '';
      }
    } catch (e) {}

    const sessions = await sbGet('walk_sessions', `booking_id=eq.${bookingId}&select=*&order=created_at.desc&limit=1`);

    if (!sessions.length || booking.status === 'confirmed') {
      renderWaitingState();
      return;
    }

    walkSession = sessions[0];

    if (walkSession.status === 'active') {
      const existingPings = await sbGet('gps_pings', `walk_session_id=eq.${walkSession.id}&order=recorded_at.asc&select=*`);
      gpsPoints = existingPings.map(p => ({ lat: p.lat, lng: p.lng }));
      if (existingPings.length) lastPingTime = existingPings[existingPings.length - 1].recorded_at;

      const existingUpdates = await sbGet('walk_updates', `walk_session_id=eq.${walkSession.id}&order=created_at.asc&select=*`);
      if (existingUpdates.length) lastUpdateTime = existingUpdates[existingUpdates.length - 1].created_at;

      await renderActiveWalk(existingUpdates);
    } else if (walkSession.status === 'completed') {
      const allPings = await sbGet('gps_pings', `walk_session_id=eq.${walkSession.id}&order=recorded_at.asc&select=*`);
      gpsPoints = allPings.map(p => ({ lat: p.lat, lng: p.lng }));
      const allUpdates = await sbGet('walk_updates', `walk_session_id=eq.${walkSession.id}&order=created_at.asc&select=*`);
      renderSummary(allUpdates);
    } else {
      renderWaitingState();
    }
  } catch (e) {
    area.innerHTML = `<div class="login-prompt"><h2>Something went wrong</h2><p>${e.message}</p><a href="/">Back to home</a></div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
