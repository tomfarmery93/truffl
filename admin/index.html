<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Truffl Pets</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F7F3EE;--brown:#5C4033;--terracotta:#C4866A;--terracottaDark:#B8795C;--border:#E7DFD6;--text:#3A2E28;--muted:#7A6860;--success:#5B8C5A;--error:#b3261e;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--cream);color:var(--text);}
  a{color:var(--terracottaDark);}
  .wrap{max-width:840px;margin:0 auto;padding:20px 16px 64px;}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;color:var(--brown);font-size:1.7rem;margin:0;}
  .sub{color:var(--muted);font-size:0.88rem;margin:4px 0 0;line-height:1.5;}
  /* header + nav */
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:16px;}
  .brand{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:1.5rem;color:var(--brown);}
  .brand b{font-style:normal;font-size:0.62rem;font-weight:700;letter-spacing:3px;color:var(--muted);vertical-align:middle;margin-left:6px;}
  .signout{font-size:0.82rem;background:none;border:none;color:var(--muted);cursor:pointer;text-decoration:underline;}
  .nav{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .nav a{font-size:0.86rem;padding:6px 14px;border-radius:20px;text-decoration:none;color:var(--brown);border:1px solid var(--border);cursor:pointer;}
  .nav a.active{background:var(--brown);color:#fff;border-color:var(--brown);}
  /* cards */
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
  .row-top{display:flex;justify-content:space-between;gap:12px;align-items:baseline;flex-wrap:wrap;}
  .amount{font-weight:600;color:var(--brown);}
  .meta{font-size:0.84rem;color:var(--muted);margin-top:2px;}
  .badge{display:inline-block;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:20px;vertical-align:middle;margin-left:6px;}
  .b-paid{background:#e7f1e6;color:var(--success);}
  .b-failed{background:#fdeeee;color:#9a3b3b;}
  .b-refunded{background:#f0ebe4;color:var(--muted);}
  button.btn{font:inherit;cursor:pointer;border-radius:8px;padding:8px 14px;border:1px solid var(--terracotta);background:var(--terracotta);color:#fff;font-size:0.86rem;}
  button.btn:disabled{opacity:.55;cursor:default;}
  .actions{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  input.fld{font:inherit;padding:9px 11px;border:1px solid var(--border);border-radius:8px;width:100%;}
  input.reason{font:inherit;padding:7px 10px;border:1px solid var(--border);border-radius:8px;flex:1;min-width:160px;}
  .msg{font-size:0.85rem;margin:8px 0;min-height:1em;}
  .msg.error{color:var(--error);}
  .msg.ok{color:var(--success);}
  .empty{color:var(--muted);text-align:center;padding:40px 0;}
  /* login */
  .login{max-width:360px;margin:8vh auto 0;background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px 24px;}
  .login h1{margin-bottom:4px;}
  .login .field{margin:14px 0;}
  .login label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:5px;}
  .login button{width:100%;margin-top:6px;}
</style>

</head>
<body>
<div id="app"><p class="empty" style="padding-top:12vh;">Loading…</p></div>
<script>
const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';
let authToken = null, authUid = null, currentSection = 'refunds';
try { const s = JSON.parse(localStorage.getItem('truffl_session') || 'null'); if (s) { authToken = s.access_token; authUid = s.user_id; } } catch (e) {}

function h(t) { const o = { 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY, 'Authorization':'Bearer ' + SUPABASE_ANON_KEY }; if (t) o['Authorization'] = 'Bearer ' + t; return o; }
async function sbFn(name, body) {
  const r = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, { method:'POST', headers:h(authToken), body:JSON.stringify(body || {}) });
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.error || ('Request failed (' + r.status + ')'));
  return d;
}
function esc(s) { return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function money(c) { return '$' + ((c || 0) / 100).toFixed(2); }
function when(iso) { if (!iso) return ''; try { return new Date(iso).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' }); } catch (e) { return ''; } }

const app = () => document.getElementById('app');

// ── Auth ──
async function checkAdmin() {
  // True only if the stored token is valid AND the user is an admin.
  const r = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${authUid}&select=is_admin`, { headers:h(authToken) });
  if (!r.ok) return false;
  const d = await r.json().catch(() => []);
  return !!(d[0] && d[0].is_admin);
}
function signOut() { localStorage.removeItem('truffl_session'); authToken = null; authUid = null; render(); }

async function render() {
  if (authToken && authUid) {
    let ok = false;
    try { ok = await checkAdmin(); } catch (e) { ok = false; }
    if (ok) return showConsole();
    // token expired or not an admin — fall through to login
    if (!authToken) {/* cleared */}
  }
  showLogin();
}

function showLogin(msg) {
  app().innerHTML = `
    <div class="login">
      <h1>Truffl Admin</h1>
      <p class="sub">Sign in with your admin account.</p>
      <form id="loginForm">
        <div class="field"><label for="al-email">Email</label><input class="fld" id="al-email" type="email" autocomplete="username" required></div>
        <div class="field"><label for="al-pw">Password</label><input class="fld" id="al-pw" type="password" autocomplete="current-password" required></div>
        <div id="al-msg" class="msg ${msg ? 'error' : ''}">${msg ? esc(msg) : ''}</div>
        <button class="btn" id="al-btn" type="submit">Sign in</button>
      </form>
    </div>`;
  document.getElementById('loginForm').addEventListener('submit', onLogin);
}

async function onLogin(e) {
  e.preventDefault();
  const email = document.getElementById('al-email').value.trim();
  const pw = document.getElementById('al-pw').value;
  const btn = document.getElementById('al-btn'); const msg = document.getElementById('al-msg');
  btn.disabled = true; btn.textContent = 'Signing in…'; msg.textContent = ''; msg.className = 'msg';
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, { method:'POST', headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_ANON_KEY }, body:JSON.stringify({ email, password:pw }) });
    const d = await r.json();
    if (!d.access_token) throw new Error(d.error_description || d.msg || 'Wrong email or password.');
    authToken = d.access_token; authUid = d.user.id;
    const ur = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${authUid}&select=role,is_admin`, { headers:h(authToken) });
    const us = await ur.json().catch(() => []);
    if (!us[0] || !us[0].is_admin) { authToken = null; authUid = null; throw new Error("This account doesn't have admin access."); }
    localStorage.setItem('truffl_session', JSON.stringify({ access_token:authToken, refresh_token:d.refresh_token, user_id:authUid, role:us[0].role }));
    showConsole();
  } catch (err) {
    msg.textContent = err.message; msg.className = 'msg error';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

// ── Console shell ──
const SECTIONS = [ { id:'refunds', label:'Refunds' }, { id:'cover', label:'Cover' }, { id:'requests', label:'Requests' } ];
function showConsole() {
  currentSection = SECTIONS.some(s => s.id === currentSection) ? currentSection : 'refunds';
  app().innerHTML = `
    <div class="wrap">
      <div class="topbar">
        <span class="brand">truffl<b>ADMIN</b></span>
        <button class="signout" onclick="signOut()">Sign out</button>
      </div>
      <div class="nav">${SECTIONS.map(s => `<a data-s="${s.id}" class="${s.id === currentSection ? 'active' : ''}" onclick="switchSection('${s.id}')">${s.label}</a>`).join('')}</div>
      <div id="adm-content"></div>
    </div>`;
  renderSection(currentSection);
}
function switchSection(name) {
  currentSection = name;
  document.querySelectorAll('.nav a').forEach(a => a.classList.toggle('active', a.dataset.s === name));
  renderSection(name);
}
function renderSection(name) {
  const c = document.getElementById('adm-content');
  if (name === 'refunds') return renderRefunds(c);
  if (name === 'cover') return renderCover(c);
  if (name === 'requests') return renderRequests(c);
  c.innerHTML = '<p class="empty">Coming soon.</p>';
}

// ── Cover section (TRU-139) ──
function coverWhen(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleString('en-AU', { weekday:'short', day:'numeric', month:'short', hour:'numeric', minute:'2-digit' }); } catch (e) { return ''; }
}
function coverCard(cv) {
  const badge = cv.cover_status === 'triggered' ? '<span class="badge b-failed">needs cover</span>'
    : cv.cover_status === 'reassigned' ? '<span class="badge b-paid">covered</span>'
    : '<span class="badge b-refunded">fell through</span>';
  const late = cv.late_cancellation ? ' · <b>late (&lt;3h)</b>' : '';
  let actions = '';
  if (cv.cover_status === 'triggered') {
    actions = `<div class="actions">
      <button class="btn" onclick="coverReassign('${cv.id}')">I'll cover it</button>
      <span style="font-size:0.84rem;color:var(--muted);">or credit $</span>
      <input class="reason" id="cred-${cv.id}" type="number" value="10" min="0" step="1" style="max-width:80px;flex:0 1 auto;">
      <button class="btn" style="background:#fff;color:var(--terracottaDark);" onclick="coverFellThrough('${cv.id}')">Couldn't cover</button>
    </div>`;
  } else if (cv.cover_status === 'reassigned') {
    actions = `<div class="meta">Assigned to you — run it from the <a href="/dashboard/">dashboard</a> like any walk. Completing it charges the owner in full; Truffl retains the walker share.</div>`;
  }
  return `<div class="card">
    <div class="row-top"><div><b>${esc(cv.pet)}</b> · ${esc(cv.customer)}${badge}</div><div class="meta">${coverWhen(cv.scheduled_at)}</div></div>
    <div class="meta">Walker: ${esc(cv.walker)} · ${esc(cv.cancel_reason || 'no reason recorded')}${late}</div>
    <div class="meta">${money(cv.total_cents)} · cancelled ${coverWhen(cv.cancelled_at)}</div>
    ${actions}
  </div>`;
}
function creditCard(cr) {
  const state = cr.redeemed_at
    ? `<div class="meta">Applied ${when(cr.redeemed_at)}${cr.redeemed_note ? ' · ' + esc(cr.redeemed_note) : ''}</div>`
    : `<div class="actions"><input class="reason" id="crednote-${cr.id}" placeholder="How it was applied (optional)"><button class="btn" onclick="creditRedeem('${cr.id}')">Mark applied</button></div>`;
  return `<div class="card">
    <div class="row-top"><div><span class="amount">${money(cr.amount_cents)}</span><span class="badge ${cr.redeemed_at ? 'b-refunded' : 'b-paid'}">${cr.redeemed_at ? 'applied' : 'outstanding'}</span></div><div class="meta">${when(cr.created_at)}</div></div>
    <div class="meta">${esc(cr.customer)} · ${esc(cr.reason || '')}</div>
    ${state}
  </div>`;
}
async function renderCover(c) {
  c.innerHTML = '<div id="adm-msg" class="msg"></div><p class="empty">Loading…</p>';
  try {
    const { cover, credits } = await sbFn('stripe-api', { action:'cover_list' });
    const coverHtml = (cover && cover.length) ? cover.map(coverCard).join('') : '<p class="empty">No covered cancellations yet.</p>';
    const outstanding = (credits || []).filter(cr => !cr.redeemed_at);
    const applied = (credits || []).filter(cr => cr.redeemed_at);
    const creditsHtml = (outstanding.length + applied.length)
      ? outstanding.map(creditCard).join('') + applied.map(creditCard).join('')
      : '<p class="empty">No credits issued.</p>';
    c.innerHTML = `
      <p class="sub" style="margin-bottom:14px;">Covered cancellations. "I'll cover it" reassigns the walk to you (owner keeps the original price; the walker share is retained). "Couldn't cover" applies the fall-through promise: no charge + a manual credit.</p>
      <div id="adm-msg" class="msg"></div>
      ${coverHtml}
      <h1 style="font-size:1.2rem;margin:22px 0 10px;">Credits (manual)</h1>
      ${creditsHtml}`;
  } catch (e) {
    if (e.message === 'Not authenticated') return signOut();
    c.innerHTML = `<p class="empty">${esc(e.message)}</p>`;
  }
}
async function coverReassign(id) {
  if (!confirm('Take this walk? It will be reassigned to you and confirmed for the owner.')) return;
  admMsg('');
  try {
    await sbFn('stripe-api', { action:'cover_reassign', booking_id:id });
    admMsg('Reassigned to you ✓ — it now shows in your dashboard.', 'ok');
    renderCover(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}
async function coverFellThrough(id) {
  const dollars = parseFloat((document.getElementById('cred-' + id) || {}).value || '10') || 0;
  if (!confirm(`Mark as couldn't cover? The owner is not charged and gets a $${dollars} credit.`)) return;
  admMsg('');
  try {
    await sbFn('stripe-api', { action:'cover_fell_through', booking_id:id, credit_cents: Math.round(dollars * 100) });
    admMsg('Recorded — owner messaged and credit issued.', 'ok');
    renderCover(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}
async function creditRedeem(id) {
  const note = (document.getElementById('crednote-' + id) || {}).value || '';
  try {
    await sbFn('stripe-api', { action:'credit_redeem', credit_id:id, note });
    admMsg('Credit marked applied ✓', 'ok');
    renderCover(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}

// ── Requests section (TRU-121 capture leads · TRU-221 pipeline view) ──
const SVC_LABELS = { dog_walking:'Dog walking', dog_sitting:'Dog sitting', dog_boarding:'Dog boarding', dog_daycare:'Dog daycare', drop_in:'Drop-in visit', pet_sitting:'Pet sitting' };
function svcLabel(t) { return t ? (SVC_LABELS[t] || t) : 'Any service'; }
// Pipeline order drives the board grouping; terminal statuses only appear in the select.
const LEAD_STATUSES = [
  ['captured', 'Captured'], ['called', 'Called'], ['founder_walking', 'Founder walking'],
  ['sourcing_walker', 'Sourcing walker'], ['meet_greet_booked', 'Meet & greet booked'],
];
const LEAD_TERMINAL = [['transitioned', 'Transitioned ✓'], ['lost', 'Lost'], ['closed', 'Closed']];
const FREQ_LABELS = { one_off:'once', weekly:'weekly', few_per_week:'a few times a week', daily:'every weekday' };
function reqWhen(rq) {
  const bits = [];
  if (rq.frequency) bits.push(FREQ_LABELS[rq.frequency] || rq.frequency);
  else if (rq.recurring) bits.push('recurring');
  if (rq.wanted_date) bits.push(rq.wanted_date);
  if (rq.window_start) bits.push(rq.window_start + (rq.window_end ? '–' + rq.window_end : ''));
  if (rq.preferred_times && rq.preferred_times.length) bits.push(rq.preferred_times.join('/'));
  return bits.join(' · ') || 'Flexible';
}
// The 14-day sourcing clock (GTM two-week rule) — visible per lead, loud from day 10.
function clockBadge(rq) {
  const d = rq.days_in_status ?? 0;
  if (rq.status === 'founder_walking') {
    const cls = d >= 10 ? 'b-failed' : 'b-paid';
    return `<span class="badge ${cls}">day ${d + 1} of 14</span>`;
  }
  return `<span class="badge b-refunded">${d === 0 ? 'today' : d + 'd in status'}</span>`;
}
function requestCard(rq) {
  const dogBits = [rq.dog_name, rq.dog_breed, rq.dog_size, rq.puppy ? 'puppy' : ''].filter(Boolean).join(' · ');
  const acct = rq.can_assign ? '<span class="badge b-paid">assignable</span>'
    : rq.customer_id ? '<span class="badge b-refunded">no pet</span>'
    : '<span class="badge b-refunded">guest</span>';
  const dtVal = rq.wanted_date ? (rq.wanted_date + 'T' + (rq.window_start || '09:00')) : '';
  const assignUi = rq.can_assign ? `
    <div class="actions">
      <label style="font-size:0.8rem;color:var(--muted);">Start</label>
      <input class="reason" id="reqdt-${rq.id}" type="datetime-local" value="${dtVal}" style="flex:0 1 auto;min-width:0;">
      <button class="btn" onclick="reqFindCarers('${rq.id}')">Find carers</button>
    </div>
    <div id="reqcarers-${rq.id}"></div>` : '';
  const statusOpts = LEAD_STATUSES.concat(LEAD_TERMINAL)
    .map(([v, l]) => `<option value="${v}"${rq.status === v ? ' selected' : ''}>${l}</option>`).join('');
  // TRU-224: conversion controls. Guest leads get a one-click account link once the owner
  // registers; linked leads get the founder stop-gap booking form (rate + schedule → M&G
  // series via admin_create_lead_series). Real-carer assignment stays via "Find carers".
  const linkUi = !rq.customer_id
    ? (rq.account_exists
        ? `<div class="actions"><button class="btn" onclick="reqLinkCustomer('${rq.id}')">Link account (${esc(rq.email)})</button></div>`
        : `<div class="meta">No account yet — they register via the confirmation email, then a link button appears here.</div>`)
    : '';
  const founderUi = rq.customer_id && !rq.assigned_series_id ? `
    <div class="meta" style="margin-top:8px;"><b>Founder stop-gap</b> — books you as the walker at an interim rate; free M&G first, card captured at proceed.</div>
    <div class="actions" style="flex-wrap:wrap;">
      <input class="reason" id="fRate-${rq.id}" type="number" min="1" step="1" placeholder="$/walk" style="flex:0 1 90px;min-width:0;">
      <select class="reason" id="fDur-${rq.id}" style="flex:0 1 auto;"><option value="30">30 min</option><option value="60">60 min</option></select>
      <input class="reason" id="fMg-${rq.id}" type="datetime-local" title="Meet & greet time" style="flex:0 1 auto;min-width:0;">
      <input class="reason" id="fStart-${rq.id}" type="date" title="First walk date" style="flex:0 1 auto;min-width:0;">
      <input class="reason" id="fTime-${rq.id}" type="time" value="09:00" title="Walk time" style="flex:0 1 auto;min-width:0;">
    </div>
    <div class="actions" style="flex-wrap:wrap;">
      ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d, i) => `<button type="button" class="btn" data-d="${i + 1}" onclick="fDayToggle('${rq.id}', this)" style="background:#fff;color:var(--terracottaDark);">${d}</button>`).join('')}
      <button class="btn" onclick="founderBook('${rq.id}','${esc(rq.service_type || 'dog_walking')}','${rq.pet_id || ''}')">Book me as stop-gap</button>
    </div>` : '';
  // TRU-225: handover state on the card. Once nominated, "Complete handover" runs the
  // transition (marks the 3-way M&G complete, repoints the series + future walks at the
  // nominee's rate, lead → transitioned).
  const handoverUi = rq.handover_mg_booking_id
    ? `<div class="meta"><b>Handover nominated</b> — 3-way M&G ${esc(rq.handover_mg_status || 'confirmed')}${rq.handover_mg_at ? ' · ' + when(rq.handover_mg_at) : ''}</div>
       <div class="actions"><button class="btn" onclick="handoverComplete('${rq.id}')">Complete handover</button></div>`
    : (rq.assigned_series_id
        ? `<div class="meta">Sourcing the permanent walker? "Find carers" → nominate for handover (needs their payouts set up).</div>`
        : '');
  const seriesNote = rq.assigned_series_id && !rq.handover_mg_booking_id
    ? `<div class="meta"><b>Series live</b> — M&G booked; owner proceeds in their profile (card capture) to activate.</div>` : '';
  return `<div class="card" id="reqcard-${rq.id}">
    <div class="row-top"><div><b>${esc(svcLabel(rq.service_type))}</b> in ${esc(rq.suburb || '—')} ${acct} ${clockBadge(rq)}</div><div class="meta">${when(rq.created_at)}</div></div>
    <div class="meta"><b>${esc(rq.contact)}</b>${rq.contact_phone ? ` · <a href="tel:${esc(rq.contact_phone)}">${esc(rq.contact_phone)}</a>` : ' · ⚠ no phone'}${rq.email ? ' · ' + esc(rq.email) : ''}</div>
    <div class="meta">${dogBits ? esc(dogBits) : 'Dog: —'}${rq.pet ? ' · pet on file: ' + esc(rq.pet) : ''}</div>
    ${rq.dog_temperament_note ? `<div class="meta">Temperament: “${esc(rq.dog_temperament_note)}”</div>` : ''}
    <div class="meta">${esc(reqWhen(rq))}</div>
    ${rq.note ? `<div class="meta">“${esc(rq.note)}”</div>` : ''}
    ${linkUi}
    ${seriesNote}
    ${handoverUi}
    ${assignUi}
    ${founderUi}
    <div class="actions">
      <select class="reason" id="reqstatus-${rq.id}" style="flex:0 1 auto;">${statusOpts}</select>
      <input class="reason" id="reqnote-${rq.id}" placeholder="Admin note (optional)" value="${esc(rq.admin_note || '')}">
      <button class="btn" onclick="reqUpdate('${rq.id}')">Save</button>
    </div>
  </div>`;
}
// TRU-224/225: per-lead context the candidate cards need (filled by renderRequests).
const leadInfo = {};
// TRU-224: founder stop-gap booking helpers.
const founderDays = {}; // per-lead selected isodow set (Mon=1 … Sun=7)
function fDayToggle(id, btn) {
  const set = (founderDays[id] ||= new Set());
  const d = +btn.dataset.d;
  if (set.has(d)) { set.delete(d); btn.style.background = '#fff'; btn.style.color = 'var(--terracottaDark)'; }
  else { set.add(d); btn.style.background = 'var(--terracotta)'; btn.style.color = '#fff'; }
}
async function reqLinkCustomer(id) {
  admMsg('');
  try {
    const r = await sbFn('stripe-api', { action:'request_link_customer', request_id:id });
    admMsg('Account linked ✓' + ((r.pets && r.pets.length) ? '' : ' — owner has no pets yet; they must add one before booking.'), 'ok');
    renderRequests(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}
async function founderBook(rqId, serviceType, petId) {
  const val = s => (document.getElementById(s + '-' + rqId) || {}).value || '';
  const rate = Math.round(parseFloat(val('fRate')) * 100);
  const mg = val('fMg'), start = val('fStart'), time = val('fTime');
  const days = Array.from(founderDays[rqId] || []);
  if (!(rate > 0)) { admMsg('Set the stop-gap rate first.', 'error'); return; }
  if (!mg || !start || !time) { admMsg('Set the meet & greet time, start date and walk time.', 'error'); return; }
  if (!days.length) { admMsg('Pick at least one walk day.', 'error'); return; }
  if (!confirm(`Book yourself as the stop-gap walker at $${(rate / 100).toFixed(0)}/walk? This creates the free meet & greet and the recurring series.`)) return;
  admMsg('');
  try {
    const r = await sbFn('stripe-api', { action:'founder_service_ensure', service_type:serviceType, duration_mins:+val('fDur') || 30, price_cents:rate });
    await sbFn('stripe-api', {
      action:'request_create_series', request_id:rqId, service_id:r.service_id,
      mg_scheduled_at:new Date(mg).toISOString(), start_date:start, time_of_day:time,
      days_of_week:days, frequency_type:'specific_days', pet_id: petId || null,
    });
    admMsg('Stop-gap series created ✓ — meet & greet booked and owner notified.', 'ok');
    renderRequests(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}
function signalRow(s) {
  return `<tr><td class="meta">${esc(s.week_start)}</td><td class="meta">${esc(s.suburb)}${s.postcode ? ' ' + esc(s.postcode) : ''}</td><td class="meta">${esc(svcLabel(s.service_type).toLowerCase())}</td><td class="meta" style="text-align:right;"><b>×${s.misses}</b></td></tr>`;
}
async function renderRequests(c) {
  c.innerHTML = '<div id="adm-msg" class="msg"></div><p class="empty">Loading…</p>';
  try {
    const { requests, signal } = await sbFn('stripe-api', { action:'requests_list' });
    // Group the board by pipeline stage so the founder-walking clock is impossible to miss.
    const byStatus = {};
    (requests || []).forEach(r => {
      leadInfo[r.id] = { hasSeries: !!r.assigned_series_id };
      (byStatus[r.status] ||= []).push(r);
    });
    const reqHtml = (requests && requests.length)
      ? LEAD_STATUSES.filter(([v]) => byStatus[v] && byStatus[v].length)
          .map(([v, l]) => `<h1 style="font-size:1.05rem;margin:18px 0 6px;">${l} <span class="meta">(${byStatus[v].length})</span></h1>` + byStatus[v].map(requestCard).join(''))
          .join('')
      : '<p class="empty">No live leads.</p>';
    const sigHtml = (signal && signal.length)
      ? `<table style="width:100%;border-collapse:collapse;">${signal.map(signalRow).join('')}</table>`
      : '<p class="empty">No unmet searches in the last 8 weeks.</p>';
    c.innerHTML = `
      <p class="sub" style="margin-bottom:14px;">Captured leads, grouped by pipeline stage. Same-day call is the bar; the 14-day sourcing clock runs while the founder walks. "Find carers" surfaces nearby matches you can assign — this creates a pending booking request and messages the customer.</p>
      <div id="adm-msg" class="msg"></div>
      ${reqHtml}
      <h1 style="font-size:1.2rem;margin:22px 0 8px;">Unmet searches by week</h1>
      <p class="sub" style="margin-bottom:10px;">Zero-result searches — the recruitment targeting map, even when nobody submitted.</p>
      ${sigHtml}`;
  } catch (e) {
    if (e.message === 'Not authenticated') return signOut();
    c.innerHTML = `<p class="empty">${esc(e.message)}</p>`;
  }
}
function carerCandidate(reqId, cr) {
  const dist = (cr.distance_km != null) ? cr.distance_km + ' km' : '';
  const rating = cr.avg_rating ? '★' + (+cr.avg_rating).toFixed(1) : 'new';
  // TRU-225: when the lead already has a live (founder) series, candidates are handover
  // nominees rather than direct assignments.
  const handoverMode = !!(leadInfo[reqId] && leadInfo[reqId].hasSeries);
  const svcBtns = (cr.services || []).map(s => {
    const label = svcLabel(s.service_type) + (s.price_cents != null ? ' ' + money(s.price_cents) : '') + (s.duration_mins ? ' / ' + s.duration_mins + 'm' : '');
    return handoverMode
      ? `<button class="btn" onclick="handoverNominate('${reqId}','${cr.provider_id}','${s.id}')">Nominate · ${esc(label)}</button>`
      : `<button class="btn" onclick="reqAssign('${reqId}','${cr.provider_id}','${s.id}')">Assign · ${esc(label)}</button>`;
  }).join(' ');
  return `<div class="card" style="margin:8px 0 0;background:var(--cream);">
    <div class="row-top"><div><b>${esc(cr.name)}</b>${cr.is_verified ? ' <span class="badge b-paid">verified</span>' : ''}</div><div class="meta">${esc(cr.suburb || '')}${dist ? ' · ' + dist : ''} · ${rating}</div></div>
    <div class="actions">${svcBtns || '<span class="meta">No matching service</span>'}</div>
  </div>`;
}
async function handoverNominate(reqId, providerId, serviceId) {
  const dtEl = document.getElementById('reqdt-' + reqId);
  const dt = dtEl && dtEl.value ? dtEl.value : '';
  if (!dt) { admMsg('Set the 3-way meet & greet date/time first (the Start field).', 'error'); return; }
  if (!confirm('Nominate this carer for handover? It books the 3-way meet & greet (you + owner + carer) and messages the owner with their rate.')) return;
  admMsg('');
  try {
    const iso = new Date(dt).toISOString();
    await sbFn('stripe-api', { action:'handover_nominate', request_id:reqId, provider_id:providerId, service_id:serviceId, mg_scheduled_at:iso });
    admMsg('Handover nominated ✓ — 3-way meet & greet booked and owner introduced.', 'ok');
    renderRequests(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}
async function handoverComplete(reqId) {
  if (!confirm('Complete the handover? Future walks move to the new carer at THEIR listed rate; completed founder walks keep their history. This also marks the 3-way meet & greet done.')) return;
  admMsg('');
  try {
    const r = await sbFn('stripe-api', { action:'handover_complete', request_id:reqId });
    admMsg(`Handover complete ✓ — ${r.reassigned ?? 0} future walk(s) moved to the new carer. Lead transitioned.`, 'ok');
    renderRequests(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}
async function reqFindCarers(id) {
  const box = document.getElementById('reqcarers-' + id);
  box.innerHTML = '<p class="meta">Searching…</p>';
  try {
    const { carers } = await sbFn('stripe-api', { action:'request_find_carers', request_id:id });
    box.innerHTML = (carers && carers.length)
      ? carers.map(cr => carerCandidate(id, cr)).join('')
      : '<p class="meta">No matching carers nearby — onboarding may be the move.</p>';
  } catch (e) { box.innerHTML = `<p class="meta" style="color:var(--error);">${esc(e.message)}</p>`; }
}
async function reqAssign(reqId, providerId, serviceId) {
  const dtEl = document.getElementById('reqdt-' + reqId);
  const dt = dtEl && dtEl.value ? dtEl.value : '';
  if (!dt) { admMsg('Set a start date/time first.', 'error'); return; }
  if (!confirm('Assign this carer? It creates a pending booking request they can accept, and messages the customer.')) return;
  admMsg('');
  try {
    const iso = new Date(dt).toISOString(); // datetime-local (browser local) → UTC ISO
    await sbFn('stripe-api', { action:'request_assign', request_id:reqId, provider_id:providerId, service_id:serviceId, scheduled_at:iso });
    admMsg('Carer assigned ✓ — booking request created and customer notified.', 'ok');
    renderRequests(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}
async function reqUpdate(reqId) {
  const status = (document.getElementById('reqstatus-' + reqId) || {}).value || '';
  const note = (document.getElementById('reqnote-' + reqId) || {}).value || '';
  const terminal = ['transitioned', 'lost', 'closed'].includes(status);
  if (terminal && !confirm(`Mark this lead ${status}? It drops off the board.`)) return;
  admMsg('');
  try {
    await sbFn('stripe-api', { action:'request_update', request_id:reqId, status, admin_note:note });
    admMsg('Lead updated ✓', 'ok');
    renderRequests(document.getElementById('adm-content'));
  } catch (e) { admMsg(e.message, 'error'); }
}

// ── Refunds section ──
function chargeCard(ch) {
  const cls = ch.payment_status === 'paid' ? 'b-paid' : ch.payment_status === 'failed' ? 'b-failed' : 'b-refunded';
  const dateStr = ch.charged_at ? when(ch.charged_at) : when(ch.scheduled_at);
  const ctl = ch.payment_status === 'paid'
    ? `<div class="actions"><input class="reason" id="reason-${ch.id}" placeholder="Reason (optional)"><button class="btn" onclick="refund('${ch.id}')">Refund ${money(ch.total_cents)}</button></div>`
    : ch.payment_status === 'refunded'
      ? `<div class="meta">Refunded${ch.refunded_at ? ' · ' + when(ch.refunded_at) : ''}</div>`
      : `<div class="meta">Charge failed — awaiting customer retry</div>`;
  return `<div class="card" id="card-${ch.id}">
    <div class="row-top"><div><span class="amount">${money(ch.total_cents)}</span><span class="badge ${cls}">${ch.payment_status}</span></div><div class="meta">${dateStr}</div></div>
    <div class="meta">${esc(ch.customer)} &rarr; ${esc(ch.carer)}</div>
    ${ctl}
  </div>`;
}
async function renderRefunds(c) {
  c.innerHTML = '<div id="adm-msg" class="msg"></div><p class="empty">Loading…</p>';
  try {
    const { charges } = await sbFn('stripe-api', { action:'list_recent_charges' });
    const list = (charges && charges.length) ? charges.map(chargeCard).join('') : '<p class="empty">No charges yet.</p>';
    c.innerHTML = `<p class="sub" style="margin-bottom:14px;">Recent charges. Refunding returns the full amount to the customer and reverses the carer's payout (including the platform fee).</p><div id="adm-msg" class="msg"></div>${list}`;
  } catch (e) {
    if (e.message === 'Not authenticated') return signOut(); // expired mid-session
    c.innerHTML = `<p class="empty">${esc(e.message)}</p>`;
  }
}
function admMsg(t, type) { const m = document.getElementById('adm-msg'); if (m) { m.textContent = t || ''; m.className = 'msg' + (type ? ' ' + type : ''); } }
async function refund(id) {
  if (!confirm("Refund this booking in full? This returns the money to the customer and reverses the carer's payout.")) return;
  const reasonEl = document.getElementById('reason-' + id);
  const reason = reasonEl ? reasonEl.value : '';
  const card = document.getElementById('card-' + id);
  const btn = card ? card.querySelector('button') : null;
  if (btn) { btn.disabled = true; btn.textContent = 'Refunding…'; }
  admMsg('');
  try {
    await sbFn('stripe-api', { action:'refund_booking', booking_id:id, reason });
    admMsg('Refunded ✓', 'ok');
    renderRefunds(document.getElementById('adm-content'));
  } catch (e) {
    admMsg(e.message, 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Refund'; }
  }
}

render();
</script>
</body>
</html>
