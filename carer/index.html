<style>
  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --sage: #8B9E7E;
    --sage-light: #C2D1B5;
    --sage-dark: #6B7E5E;
    --terracotta: #C4755B;
    --terracotta-light: #D4917B;
    --blush: #E8C4B8;
    --brown: #3D2B1F;
    --brown-light: #5C4033;
    --brown-muted: #8B7355;
    --text-primary: #3D2B1F;
    --text-secondary: #6B5B4E;
    --text-muted: #9B8B7E;
    --border: #E8E0D6;
    --success: #5B8C5A;
    --success-bg: #EDF5ED;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--cream);
    color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  .nav {
    position: sticky; top: 0; z-index: 100; background: var(--warm-white);
    border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 20px; font-size: 13px; }
  .nav-right a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
  .nav-right a:hover { color: var(--terracotta); }
  .nav-msg { position: relative; display: inline-flex; align-items: center; color: var(--text-secondary); }
  .nav-msg:hover { color: var(--terracotta); }
  .nav-msg-badge { position: absolute; top: -7px; right: -8px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px; background: var(--terracotta); color: #fff; font-size: 10px; line-height: 16px; text-align: center; font-weight: 600; }
  .btn-nav {
    background: var(--terracotta); color: white; padding: 8px 18px;
    border-radius: 8px; font-weight: 500; transition: all 0.2s; text-decoration: none; font-size: 13px;
  }
  .btn-nav:hover { background: var(--terracotta-light); color: white; }

  .page-wrapper { max-width: 800px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem;
    color: var(--text-muted); text-decoration: none; margin-bottom: 1.5rem; transition: color 0.2s;
  }
  .back-link:hover { color: var(--terracotta); }

  /* Profile header */
  .profile-header {
    display: flex; gap: 24px; align-items: start; margin-bottom: 2rem;
  }
  .avatar {
    width: 88px; height: 88px; border-radius: 50%; background: var(--blush);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600;
    color: var(--brown); flex-shrink: 0;
  }
  .profile-info { flex: 1; }
  .profile-name {
    font-family: 'Cormorant Garamond', serif; font-weight: 500;
    font-size: 1.8rem; color: var(--brown); margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .verified-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 600;
    color: var(--sage-dark); background: var(--success-bg);
    padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .profile-suburb { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; }
  .profile-rating { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
  .stars { color: var(--terracotta); letter-spacing: 2px; }
  .rating-text { color: var(--text-muted); font-size: 0.82rem; }

  /* Sections */
  .section {
    background: var(--warm-white); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif; font-weight: 500;
    font-size: 1.15rem; color: var(--brown); margin-bottom: 0.75rem;
  }

  /* Bio */
  .bio-text { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }

  /* Tags */
  .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    font-size: 0.8rem; padding: 6px 14px; background: var(--cream);
    border: 1px solid var(--border); border-radius: 20px; color: var(--text-secondary);
  }
  .tag.service { background: rgba(139,158,126,0.08); border-color: var(--sage-light); color: var(--sage-dark); }

  /* Verification cards */
  .checks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .check-card {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: var(--cream); border-radius: 10px;
  }
  .check-icon {
    width: 32px; height: 32px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .check-icon.approved { background: var(--success-bg); }
  .check-icon.pending { background: #FEF3E2; }
  .check-icon.missing { background: #F5F5F5; }
  .check-name { font-size: 0.82rem; font-weight: 500; color: var(--text-primary); }
  .check-status { font-size: 0.72rem; color: var(--text-muted); }
  .check-status.approved { color: var(--success); }
  .check-status.pending { color: #C0862B; }

  /* Attributes */
  .attr-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .attr-pill {
    display: flex; align-items: center; gap: 6px; font-size: 0.8rem;
    padding: 6px 14px; background: var(--cream); border-radius: 20px;
    color: var(--text-secondary); border: 1px solid var(--border);
  }
  .attr-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sage); flex-shrink: 0; }

  /* CTA */
  .cta-bar {
    background: var(--warm-white); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem; text-align: center;
  }
  .cta-bar h3 {
    font-family: 'Cormorant Garamond', serif; font-weight: 500;
    font-size: 1.2rem; color: var(--brown); margin-bottom: 6px;
  }
  .cta-bar p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
  .btn-book {
    display: inline-block; padding: 12px 36px; background: var(--terracotta);
    color: white; border-radius: 10px; font-weight: 500; font-size: 0.9rem;
    text-decoration: none; transition: all 0.2s; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-book:hover { background: var(--terracotta-light); transform: translateY(-1px); }

  /* Experience badge */
  .exp-badge {
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem;
    color: var(--text-muted); margin-top: 6px;
  }

  /* Reviews */
  .reviews-summary {
    display: flex; align-items: baseline; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap;
  }
  .reviews-avg {
    font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 500; color: var(--brown);
  }
  .reviews-stars { color: var(--terracotta); letter-spacing: 2px; font-size: 1rem; }
  .reviews-count { font-size: 0.82rem; color: var(--text-muted); }
  .review-item {
    padding: 1rem 0; border-top: 1px solid var(--border);
  }
  .review-item:first-child { border-top: none; padding-top: 0; }
  .review-header {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px;
  }
  .review-author {
    display: flex; align-items: center; gap: 10px;
  }
  .review-author-avatar {
    width: 32px; height: 32px; border-radius: 50%; background: var(--blush);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 0.85rem; font-weight: 600;
    color: var(--brown); flex-shrink: 0;
  }
  .review-author-name { font-size: 0.88rem; font-weight: 500; color: var(--text-primary); }
  .review-date { font-size: 0.75rem; color: var(--text-muted); }
  .review-rating { color: var(--terracotta); letter-spacing: 1px; font-size: 0.85rem; margin-bottom: 6px; }
  .review-comment {
    font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6;
  }
  .reviews-empty {
    text-align: center; padding: 1rem; color: var(--text-muted); font-size: 0.85rem;
  }
  .reviews-show-more {
    margin-top: 0.75rem; text-align: center;
  }
  .reviews-show-more button {
    background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    padding: 8px 18px; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: border-color 0.2s, color 0.2s;
  }
  .reviews-show-more button:hover { border-color: var(--text-muted); color: var(--text-primary); }

  /* Customer review CTA on profile */
  .your-review-cta {
    background: rgba(139,158,126,0.08); border: 1px solid var(--sage-light);
    border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .your-review-cta-text { font-size: 0.88rem; color: var(--sage-dark); }
  .your-review-cta a {
    background: var(--sage-dark); color: white; padding: 8px 16px; border-radius: 8px;
    font-size: 0.82rem; font-weight: 500; text-decoration: none; transition: opacity 0.2s;
    white-space: nowrap;
  }
  .your-review-cta a:hover { opacity: 0.9; }

  /* Loading & Error */
  .loading-state { text-align: center; padding: 4rem 2rem; }
  .loading-dots { display: inline-flex; gap: 6px; }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%; background: var(--terracotta);
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { opacity:0.3; transform:scale(0.8); } 40% { opacity:1; transform:scale(1.2); } }
  .loading-text { margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); }

  .error-state { text-align: center; padding: 4rem 2rem; }
  .error-state h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 1.6rem;
    color: var(--brown); margin-bottom: 0.5rem;
  }
  .error-state p { color: var(--text-muted); font-size: 0.9rem; }

  @media (max-width: 600px) {
    .page-wrapper { padding: 1.5rem 1rem 3rem; }
    .profile-header { flex-direction: column; align-items: center; text-align: center; }
    .profile-name { justify-content: center; }
    .checks-grid { grid-template-columns: 1fr; }
    .avatar { width: 72px; height: 72px; font-size: 1.6rem; }
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
</style>

<script>
const SUPABASE_URL = 'https://gadflsntbnbnnxbpiral.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZGZsc250Ym5ibm54YnBpcmFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcwNTcsImV4cCI6MjA5MDY0MzA1N30.g5ZrqeAX9U5l7oDZEbQFrU5j10828dUF0QuJ0ZlHXK8';

const SERVICE_LABELS = {
  dog_walking: 'Dog walking', dog_sitting: 'Dog sitting', dog_boarding: 'Dog boarding',
  pet_sitting: 'Other pet sitting'
};

// Hint shown after non-walk services so customers know what the price covers.
const SERVICE_UNIT_HINT = {
  dog_sitting:  'per visit',
  dog_boarding: 'per night',
  pet_sitting:  'per visit',
};

// Format a provider_services row into a customer-facing label.
//   { service_type:'dog_walking', duration_mins:60 } → "60 minute walk"
//   { service_type:'dog_walking', duration_mins:120 } → "2 hour walk"
//   { service_type:'dog_sitting' } → "Dog sitting · per visit"
function formatServiceLabel(s) {
  if (s.service_type === 'dog_walking' && s.duration_mins) {
    const m = s.duration_mins;
    if (m >= 60 && m % 60 === 0) {
      const h = m / 60;
      return `${h} hour walk`;
    }
    return `${m} minute walk`;
  }
  const base = SERVICE_LABELS[s.service_type] || s.service_type.replace(/_/g, ' ');
  const unit = SERVICE_UNIT_HINT[s.service_type];
  return unit ? `${base} · ${unit}` : base;
}

function formatPrice(cents) {
  if (cents == null) return '';
  const n = cents / 100;
  return Number.isInteger(n) ? `$${n}` : `$${n.toFixed(2)}`;
}

const ATTR_LABELS = {
  has_car: 'Own vehicle', outdoor_space: 'Garden / yard', large_dogs_ok: 'Large dogs OK',
  puppy_experience: 'Puppy experience',
  senior_pets_ok: 'Senior / special needs', reactive_dogs_ok: 'Reactive dogs OK',
  water_confident: 'Water / swim confident'
};

const CHECK_LABELS = {
  police_check: 'Police check', identity: 'Identity verified', pet_first_aid: 'Pet first aid',
  animal_training: 'Animal training', public_liability: 'Public liability insurance',
  walk_demo: 'Walk demonstration', interview: 'Formal interview', emergency_protocol: 'Emergency protocol'
};

async function sbGet(table, params) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
  });
  if (!r.ok) throw new Error('Failed to load data');
  return await r.json();
}

function getInitials(first, last) {
  return ((first || '')[0] || '') + ((last || '')[0] || '');
}

function renderStars(rating) {
  if (!rating) return '';
  const full = Math.floor(rating);
  let s = '';
  for (let i = 0; i < 5; i++) s += i < full ? '★' : '☆';
  return s;
}

function formatReviewDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const days = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  if (days < 7) return days <= 0 ? 'Today' : (days === 1 ? 'Yesterday' : `${days} days ago`);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: now.getFullYear() === d.getFullYear() ? undefined : 'numeric' });
}

function renderReviewItem(review, reviewerName) {
  const initials = getInitials((reviewerName || '').split(' ')[0], (reviewerName || '').split(' ')[1] || '');
  const displayName = reviewerName ? reviewerName.split(' ')[0] : 'Customer';
  return `
    <div class="review-item">
      <div class="review-header">
        <div class="review-author">
          <div class="review-author-avatar">${esc(initials || 'C')}</div>
          <div>
            <div class="review-author-name">${esc(displayName)}</div>
            <div class="review-date">${esc(formatReviewDate(review.created_at))}${review.updated_at && review.updated_at !== review.created_at ? ' · edited' : ''}</div>
          </div>
        </div>
      </div>
      <div class="review-rating" aria-label="${review.rating} out of 5 stars">${renderStars(review.rating)}</div>
      ${review.comment ? `<div class="review-comment">${esc(review.comment).replace(/\n/g, '<br>')}</div>` : ''}
    </div>
  `;
}

function esc(s) {
  return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderReviewsSection(reviews, reviewerNames, totalCount, avgRating) {
  if (!reviews || reviews.length === 0) {
    return `<div class="section fade-in"><div class="section-title">Reviews</div><div class="reviews-empty">No reviews yet — be the first to share your experience.</div></div>`;
  }
  const summary = `
    <div class="reviews-summary">
      <span class="reviews-avg">${avgRating.toFixed(1)}</span>
      <span class="reviews-stars">${renderStars(avgRating)}</span>
      <span class="reviews-count">${totalCount} review${totalCount !== 1 ? 's' : ''}</span>
    </div>
  `;
  const items = reviews.map(r => renderReviewItem(r, reviewerNames[r.customer_id] || '')).join('');
  const showMore = totalCount > reviews.length
    ? `<div class="reviews-show-more"><button id="loadMoreReviewsBtn">Show all ${totalCount} reviews</button></div>`
    : '';
  return `<div class="section fade-in"><div class="section-title">Reviews</div>${summary}${items}${showMore}</div>`;
}

function renderProfile(user, profile, services, attributes, checks, reviewsBlock, yourReviewCtaBlock) {
  const name = `${user.first_name} ${user.last_name}`;
  const initials = getInitials(user.first_name, user.last_name);
  const hasRating = profile.avg_rating && profile.total_reviews > 0;

  document.title = `${name} — Truffl Pets`;

  const verifiedHtml = profile.is_verified
    ? `<span class="verified-badge"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5L5 9L9.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Verified</span>`
    : '';

  const ratingHtml = hasRating
    ? `<div class="profile-rating"><span class="stars">${renderStars(profile.avg_rating)}</span><span>${profile.avg_rating.toFixed(1)}</span><span class="rating-text">(${profile.total_reviews} review${profile.total_reviews !== 1 ? 's' : ''})</span></div>`
    : `<div class="profile-rating"><span class="rating-text">New carer — no reviews yet</span></div>`;

  const expHtml = profile.experience_years
    ? `<div class="exp-badge"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v3l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>${profile.experience_years} years experience</div>`
    : '';

  const servicesHtml = services.length > 0
    ? `<div class="section fade-in"><div class="section-title">Services &amp; pricing</div><div class="tag-grid">${
        services.map(s => {
          const label = esc(formatServiceLabel(s));
          const price = formatPrice(s.price_cents);
          return `<span class="tag service">${label}${price ? ` · <strong style="font-weight:600;">${price}</strong>` : ''}</span>`;
        }).join('')
      }</div></div>`
    : '';

  const attrsHtml = attributes.length > 0
    ? `<div class="section fade-in"><div class="section-title">Capabilities</div><div class="attr-grid">${attributes.map(a => `<span class="attr-pill"><span class="attr-dot"></span>${ATTR_LABELS[a.attribute] || a.attribute.replace(/_/g, ' ')}</span>`).join('')}</div></div>`
    : '';

  const approvedChecks = checks.filter(c => c.status === 'approved');
  const pendingChecks = checks.filter(c => c.status === 'pending');

  let checksHtml = '';
  if (approvedChecks.length > 0 || pendingChecks.length > 0) {
    const cards = [...approvedChecks.map(c => `
      <div class="check-card">
        <div class="check-icon approved"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 8.5L7 11.5L12.5 5" stroke="#5B8C5A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div><div class="check-name">${CHECK_LABELS[c.check_type] || c.check_type.replace(/_/g, ' ')}</div><div class="check-status approved">Verified</div></div>
      </div>
    `), ...pendingChecks.map(c => `
      <div class="check-card">
        <div class="check-icon pending"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5" stroke="#C0862B" stroke-width="1.5"/><path d="M8 5.5v3" stroke="#C0862B" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r="0.5" fill="#C0862B"/></svg></div>
        <div><div class="check-name">${CHECK_LABELS[c.check_type] || c.check_type.replace(/_/g, ' ')}</div><div class="check-status pending">Pending</div></div>
      </div>
    `)];
    checksHtml = `<div class="section fade-in"><div class="section-title">Verification & checks</div><div class="checks-grid">${cards.join('')}</div></div>`;
  }

  // If verified but no individual checks recorded, show a generic verified message
  if (profile.is_verified && approvedChecks.length === 0 && pendingChecks.length === 0) {
    checksHtml = `<div class="section fade-in"><div class="section-title">Verification</div><div class="check-card"><div class="check-icon approved"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 8.5L7 11.5L12.5 5" stroke="#5B8C5A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div class="check-name">Truffl Verified</div><div class="check-status approved">This carer has completed our full vetting process</div></div></div></div>`;
  }

  const radiusHtml = profile.radius_km
    ? `<span style="font-size:0.82rem;color:var(--text-muted);margin-left:8px;">· Services within ${profile.radius_km}km</span>`
    : '';

  return `
    <div class="profile-header fade-in">
      <div class="avatar">${initials}</div>
      <div class="profile-info">
        <div class="profile-name">${name}${verifiedHtml}</div>
        <div class="profile-suburb">${profile.suburb || 'Sydney'}${radiusHtml}</div>
        ${ratingHtml}
        ${expHtml}
      </div>
    </div>

    ${yourReviewCtaBlock || ''}

    ${profile.bio ? `<div class="section fade-in"><div class="section-title">About</div><div class="bio-text">${profile.bio.replace(/\n/g, '<br>')}</div></div>` : ''}

    ${servicesHtml}
    ${attrsHtml}
    ${checksHtml}
    ${reviewsBlock || ''}

    <div class="cta-bar fade-in" style="margin-top:1.5rem;">
      <h3>Want to book ${user.first_name}?</h3>
      <p>All bookings are confirmed directly with the carer. No hidden fees.</p>
      <button class="btn-book" onclick="window.location.href='/book/?provider=' + new URLSearchParams(window.location.search).get('id')">Request a booking</button>
    </div>
  `;
}

async function loadProfile() {
  const area = document.getElementById('profileContent');
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('id');

  if (!userId) {
    area.innerHTML = `<div class="error-state"><h2>No carer specified</h2><p>Head back to <a href="/search/" style="color:var(--terracotta);">search</a> and click on a carer to view their profile.</p></div>`;
    return;
  }

  try {
    // Fetch all data in parallel
    const [users, profiles, services, attributes, checks] = await Promise.all([
      sbGet('users', `id=eq.${userId}&select=first_name,last_name`),
      sbGet('provider_profiles', `user_id=eq.${userId}&select=*`),
      sbGet('provider_services', `provider_id=eq.${userId}&select=service_type,is_available,duration_mins,price_cents&is_available=eq.true&order=service_type.asc,duration_mins.asc.nullsfirst`),
      sbGet('provider_attributes', `provider_id=eq.${userId}&select=attribute,value&value=eq.true`),
      sbGet('provider_checks', `provider_id=eq.${userId}&select=check_type,status`).catch(() => [])
    ]);

    if (!users.length || !profiles.length) {
      area.innerHTML = `<div class="error-state"><h2>Carer not found</h2><p>This profile doesn't exist or isn't available. <a href="/search/" style="color:var(--terracotta);">Back to search</a></p></div>`;
      return;
    }

    const profile = profiles[0];

    // ── Reviews block (TRU-28): pull recent reviews + reviewer first names + view-based aggregate ──
    let reviewsBlock = '';
    let allReviews = [];
    let reviewerNames = {};
    try {
      // Pull up to 20 most recent reviews; show 5 by default with "show all"
      allReviews = await sbGet('reviews', `provider_id=eq.${profile.id}&select=id,rating,comment,created_at,updated_at,customer_id&order=created_at.desc&limit=20`);
      // Resolve reviewer names: customer_profiles.id → user_id → users.first_name/last_name
      if (allReviews.length) {
        const customerIds = [...new Set(allReviews.map(r => r.customer_id))];
        const customerProfiles = await sbGet('customer_profiles', `id=in.(${customerIds.join(',')})&select=id,user_id`);
        const userIds = customerProfiles.map(cp => cp.user_id).filter(Boolean);
        let usersById = {};
        if (userIds.length) {
          const reviewerUsers = await sbGet('users', `id=in.(${userIds.join(',')})&select=id,first_name,last_name`);
          usersById = Object.fromEntries(reviewerUsers.map(u => [u.id, `${u.first_name} ${u.last_name || ''}`.trim()]));
        }
        const cpById = Object.fromEntries(customerProfiles.map(cp => [cp.id, cp.user_id]));
        reviewerNames = Object.fromEntries(allReviews.map(r => [r.customer_id, usersById[cpById[r.customer_id]] || '']));
      }
      // Use view-based aggregate so it stays in sync even if provider_profiles.avg_rating is stale
      let totalCount = allReviews.length, avgRating = 0;
      try {
        const view = await sbGet('provider_rating_view', `provider_id=eq.${profile.id}&select=review_count,avg_rating`);
        if (view.length && view[0].review_count != null) {
          totalCount = Number(view[0].review_count);
          avgRating = Number(view[0].avg_rating) || 0;
        } else if (allReviews.length) {
          avgRating = allReviews.reduce((s, r) => s + r.rating, 0) / allReviews.length;
        }
      } catch (e) {
        if (allReviews.length) avgRating = allReviews.reduce((s, r) => s + r.rating, 0) / allReviews.length;
      }
      const initialReviews = allReviews.slice(0, 5);
      reviewsBlock = renderReviewsSection(initialReviews, reviewerNames, totalCount, avgRating);
    } catch (e) {
      reviewsBlock = `<div class="section fade-in"><div class="section-title">Reviews</div><div class="reviews-empty">No reviews yet — be the first to share your experience.</div></div>`;
    }

    // ── Customer review CTA (signed-in user with a completed booking with this provider) ──
    let yourReviewCtaBlock = '';
    try {
      const stored = localStorage.getItem('truffl_session');
      if (stored) {
        const s = JSON.parse(stored);
        if (s && s.user_id && s.user_id !== userId) {
          const myProfiles = await sbGet('customer_profiles', `user_id=eq.${s.user_id}&select=id`);
          if (myProfiles.length) {
            const myCustomerId = myProfiles[0].id;
            const myBookings = await sbGet('bookings', `customer_id=eq.${myCustomerId}&provider_id=eq.${profile.id}&status=eq.completed&select=id&order=completed_at.desc.nullslast,scheduled_at.desc&limit=10`);
            if (myBookings.length) {
              const myReviews = await sbGet('reviews', `customer_id=eq.${myCustomerId}&provider_id=eq.${profile.id}&select=booking_id`);
              const reviewedSet = new Set(myReviews.map(r => r.booking_id));
              const unreviewed = myBookings.find(b => !reviewedSet.has(b.id));
              if (unreviewed) {
                yourReviewCtaBlock = `
                  <div class="your-review-cta fade-in">
                    <div class="your-review-cta-text">You've had a booking with ${esc(users[0].first_name)} — share how it went.</div>
                    <a href="/review/?booking=${esc(unreviewed.id)}">Leave a review</a>
                  </div>`;
              } else if (myBookings.length) {
                yourReviewCtaBlock = `
                  <div class="your-review-cta fade-in">
                    <div class="your-review-cta-text">You've reviewed ${esc(users[0].first_name)} — want to update it?</div>
                    <a href="/review/?booking=${esc(myBookings[0].id)}">Edit your review</a>
                  </div>`;
              }
            }
          }
        }
      }
    } catch (e) { /* logged-out or query failure — silently skip */ }

    area.innerHTML = renderProfile(users[0], profile, services, attributes, checks, reviewsBlock, yourReviewCtaBlock);

    // Wire "Show all" button if present
    const moreBtn = document.getElementById('loadMoreReviewsBtn');
    if (moreBtn) {
      moreBtn.addEventListener('click', () => {
        const section = moreBtn.closest('.section');
        const summary = section.querySelector('.reviews-summary').outerHTML;
        const items = allReviews.map(r => renderReviewItem(r, reviewerNames[r.customer_id] || '')).join('');
        section.innerHTML = `<div class="section-title">Reviews</div>${summary}${items}`;
      });
    }
  } catch (err) {
    area.innerHTML = `<div class="error-state"><h2>Something went wrong</h2><p>${err.message}. <a href="/search/" style="color:var(--terracotta);">Back to search</a></p></div>`;
  }
}

document.addEventListener('DOMContentLoaded', loadProfile);

/* Messages entry point — shown only to logged-in visitors */
(function () {
  let tok = null, uid = null, role = null;
  try { const s = JSON.parse(localStorage.getItem('truffl_session') || 'null'); if (s) { tok = s.access_token; uid = s.user_id; role = s.role; } } catch (e) {}
  if (!tok || !uid) return;
  const nm = document.getElementById('navMsg');
  const si = document.getElementById('navSignIn');
  if (nm) nm.style.display = '';
  // Signed in → swap "Sign in" for "My account".
  if (si) { si.textContent = 'My account'; si.href = role === 'provider' ? '/dashboard/' : '/profile/'; }
  async function refresh() {
    try {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/messages?sender_id=neq.${uid}&read_at=is.null&select=id`, { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${tok}` } });
      if (!r.ok) return;
      const rows = await r.json();
      const badge = document.getElementById('navMsgBadge');
      if (badge) { badge.textContent = rows.length > 9 ? '9+' : String(rows.length); badge.style.display = rows.length > 0 ? '' : 'none'; }
    } catch (e) {}
  }
  refresh();
  setInterval(refresh, 10000);
})();
</script>
